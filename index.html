<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>K-SCORE | Neural Evolution</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;700;900&display=swap');
        body { 
            background-color: #020617; 
            font-family: 'Inter', sans-serif;
            overflow-x: hidden;
        }
        .glass { background: rgba(15, 23, 42, 0.6); backdrop-filter: blur(12px); border: 1px solid rgba(255,255,255,0.1); }
        .neon-glow { box-shadow: 0 0 20px rgba(6, 182, 212, 0.2); }
        .page-transition { animation: fadeIn 0.4s ease-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        const Icon = ({ name, className }) => {
            useEffect(() => { lucide.createIcons(); }, [name]);
            return <i data-lucide={name.toLowerCase().replace(/([a-z0-9])([A-Z])/g, '$1-$2')} className={className}></i>;
        };

        function App() {
            const [page, setPage] = useState('home');
            const [stats, setStats] = useState({ kScore: 527, xp: 4200, level: 8, streak: 12 });
            const [animating, setAnimating] = useState(false);

            const addXP = (amount) => {
                setAnimating(true);
                setStats(prev => ({ ...prev, kScore: prev.kScore + 5, xp: prev.xp + amount }));
                setTimeout(() => setAnimating(false), 500);
            };

            return (
                <div className="min-h-screen text-slate-100 max-w-md mx-auto relative pb-32">
                    {/* Background Orbs */}
                    <div className="fixed top-[-10%] left-[-20%] w-64 h-64 bg-cyan-600/20 rounded-full blur-[100px]"></div>
                    <div className="fixed bottom-[10%] right-[-20%] w-64 h-64 bg-purple-600/20 rounded-full blur-[100px]"></div>

                    {/* Header */}
                    <header className="sticky top-0 z-50 p-6 flex justify-between items-center bg-slate-950/50 backdrop-blur-md">
                        <div>
                            <h1 className="text-2xl font-black tracking-tighter bg-gradient-to-r from-cyan-400 to-blue-500 bg-clip-text text-transparent">K-SCORE</h1>
                            <p className="text-[10px] text-slate-500 font-bold tracking-[0.2em] uppercase">Neural Interface v2.0</p>
                        </div>
                        <div className={`flex items-center gap-2 glass px-4 py-2 rounded-full transition-all ${animating ? 'scale-110 border-cyan-400' : ''}`}>
                            <Icon name="Zap" className="w-4 h-4 text-cyan-400" />
                            <span className="font-black text-sm">{stats.kScore}</span>
                        </div>
                    </header>

                    {/* Content */}
                    <main className="p-6 page-transition">
                        {page === 'home' ? (
                            <div className="space-y-6">
                                {/* Level Card */}
                                <div className="glass rounded-3xl p-8 neon-glow relative overflow-hidden">
                                    <div className="relative z-10">
                                        <div className="flex justify-between items-start mb-6">
                                            <div>
                                                <p className="text-slate-400 text-xs font-bold uppercase tracking-widest">Current Rank</p>
                                                <h2 className="text-5xl font-black">Lvl {stats.level}</h2>
                                            </div>
                                            <div className="bg-amber-500/20 text-amber-400 px-3 py-1 rounded-full text-xs font-bold border border-amber-500/30">
                                                {stats.streak} DAY STREAK
                                            </div>
                                        </div>
                                        <div className="space-y-2">
                                            <div className="flex justify-between text-xs font-bold text-slate-500 uppercase">
                                                <span>XP Progress</span>
                                                <span>{stats.xp % 1000}/1000</span>
                                            </div>
                                            <div className="h-2 w-full bg-slate-800 rounded-full overflow-hidden">
                                                <div className="h-full bg-gradient-to-r from-cyan-400 to-blue-600 transition-all duration-1000" style={{width: `${(stats.xp % 1000)/10}%`}}></div>
                                            </div>
                                        </div>
                                    </div>
                                </div>

                                {/* Quick Actions */}
                                <div className="grid grid-cols-2 gap-4">
                                    <div onClick={() => setPage('lessons')} className="glass rounded-2xl p-6 flex flex-col items-center gap-3 cursor-pointer hover:border-cyan-400/50 transition-all group">
                                        <div className="w-12 h-12 rounded-xl bg-cyan-500/10 flex items-center justify-center group-hover:scale-110 transition-transform">
                                            <Icon name="BookOpen" className="w-6 h-6 text-cyan-400" />
                                        </div>
                                        <span className="font-bold text-sm">Library</span>
                                    </div>
                                    <div className="glass rounded-2xl p-6 flex flex-col items-center gap-3 opacity-50 cursor-not-allowed">
                                        <div className="w-12 h-12 rounded-xl bg-slate-800 flex items-center justify-center">
                                            <Icon name="Target" className="w-6 h-6 text-slate-400" />
                                        </div>
                                        <span className="font-bold text-sm">Dilemmas</span>
                                    </div>
                                </div>
                            </div>
                        ) : (
                            <div className="space-y-4">
                                <h3 className="text-sm font-bold text-slate-500 uppercase tracking-widest mb-6">Archives: Philosophy</h3>
                                {[
                                    {t: 'Stoicism', a: 'Marcus Aurelius', xp: 150, c: 'cyan'},
                                    {t: 'The Underground Man', a: 'Dostoevsky', xp: 250, c: 'purple'},
                                    {t: 'Kafkaesque Absurdity', a: 'Franz Kafka', xp: 200, c: 'amber'}
                                ].map((l, i) => (
                                    <div key={i} onClick={() => addXP(l.xp)} className="glass rounded-2xl p-5 flex items-center justify-between cursor-pointer hover:bg-slate-800/50 transition-all active:scale-95">
                                        <div>
                                            <h4 className="font-bold">{l.t}</h4>
                                            <p className="text-xs text-slate-500">{l.a}</p>
                                        </div>
                                        <div className="text-right">
                                            <span className="text-[10px] font-bold text-cyan-400">+{l.xp} XP</span>
                                            <Icon name="ChevronRight" className="w-4 h-4 text-slate-600 ml-2" />
                                        </div>
                                    </div>
                                ))}
                            </div>
                        )}
                    </main>

                    {/* Floating Navigation */}
                    <nav className="fixed bottom-8 left-1/2 -translate-x-1/2 w-[80%] max-w-[300px] glass rounded-full p-2 flex justify-between items-center shadow-2xl border-white/20">
                        <button onClick={() => setPage('home')} className={`p-4 rounded-full transition-all ${page === 'home' ? 'bg-cyan-500 text-slate-950 scale-110' : 'text-slate-400'}`}>
                            <Icon name="Home" className="w-5 h-5" />
                        </button>
                        <button onClick={() => setPage('lessons')} className={`p-4 rounded-full transition-all ${page === 'lessons' ? 'bg-cyan-500 text-slate-950 scale-110' : 'text-slate-400'}`}>
                            <Icon name="BookOpen" className="w-5 h-5" />
                        </button>
                        <button className="p-4 rounded-full text-slate-400 opacity-30">
                            <Icon name="Activity" className="w-5 h-5" />
                        </button>
                    </nav>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
