<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>K-SCORE OS</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap');
        body { background: #020617; font-family: 'Plus Jakarta Sans', sans-serif; color: white; }
        .glass { background: rgba(15, 23, 42, 0.7); backdrop-filter: blur(12px); border: 1px solid rgba(255,255,255,0.1); }
        .skill-node { transition: all 0.3s ease; border: 2px solid rgba(255,255,255,0.1); }
        .skill-node.active { border-color: #22d3ee; box-shadow: 0 0 15px rgba(34, 211, 238, 0.3); }
        .nav-btn { transition: all 0.2s; }
        .nav-btn.active { color: #22d3ee; transform: translateY(-4px); }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        const Icon = ({ name, className }) => {
            useEffect(() => { lucide.createIcons(); }, [name]);
            return <i data-lucide={name.toLowerCase().replace(/([a-z0-9])([A-Z])/g, '$1-$2')} className={className}></i>;
        };

        function App() {
            const [tab, setTab] = useState('home');
            const [stats, setStats] = useState({ kScore: 527, xp: 420, level: 1, streak: 12, completed: 0 });
            const [skills, setSkills] = useState({ logic: 40, empathy: 30, discipline: 50, regulation: 20, integrity: 60 });

            const renderContent = () => {
                switch(tab) {
                    case 'home': return (
                        <div className="p-6 space-y-6 animate-in fade-in slide-in-from-bottom-4">
                            <div className="glass p-8 rounded-[2.5rem] text-center border-b-4 border-cyan-500/30">
                                <h1 className="text-4xl font-800 italic uppercase tracking-tighter">ANIKA</h1>
                                <p className="text-cyan-400 font-bold text-xs tracking-[0.3em] mt-2">K-SCORE SYSTEM ACTIVE</p>
                                <div className="mt-8 flex justify-center gap-4">
                                    <div className="glass px-4 py-2 rounded-2xl"><p className="text-[10px] text-slate-500 font-bold uppercase">Streak</p><p className="text-xl font-black text-orange-400">{stats.streak}D</p></div>
                                    <div className="glass px-4 py-2 rounded-2xl"><p className="text-[10px] text-slate-500 font-bold uppercase">K-Score</p><p className="text-xl font-black text-cyan-400">{stats.kScore}</p></div>
                                </div>
                            </div>
                            <div className="glass p-6 rounded-3xl">
                                <h3 className="text-sm font-black uppercase text-slate-500 mb-4">Daily Challenge</h3>
                                <p className="text-lg font-bold">Practice 5 minutes of "Box Breathing" during a stress peak.</p>
                                <button className="mt-4 w-full py-3 bg-cyan-500 text-slate-950 rounded-xl font-black">COMPLETE +50 XP</button>
                            </div>
                        </div>
                    );
                    case 'skills': return (
                        <div className="p-6 space-y-8 animate-in fade-in">
                            <h2 className="text-2xl font-800 tracking-tight">Skill Tree</h2>
                            <div className="relative h-[400px] flex items-center justify-center">
                                {/* Core Node */}
                                <div className="skill-node active w-20 h-20 rounded-full glass flex items-center justify-center z-10">
                                    <Icon name="User" className="text-cyan-400" />
                                </div>
                                {/* Branching Nodes */}
                                {[
                                    { name: 'Logic', angle: 0, val: skills.logic, icon: 'Cpu' },
                                    { name: 'Empathy', angle: 72, val: skills.empathy, icon: 'Heart' },
                                    { name: 'Discipline', angle: 144, val: skills.discipline, icon: 'Shield' },
                                    { name: 'Regulation', angle: 216, val: skills.regulation, icon: 'Wind' },
                                    { name: 'Integrity', angle: 288, val: skills.integrity, icon: 'Anchor' }
                                ].map((s, i) => (
                                    <div key={i} className="absolute flex flex-col items-center gap-2" 
                                         style={{ transform: `rotate(${s.angle}deg) translateY(-120px) rotate(-${s.angle}deg)` }}>
                                        <div className={`w-12 h-12 rounded-xl glass flex items-center justify-center ${s.val > 30 ? 'active' : ''}`}>
                                            <Icon name={s.icon} className="w-5 h-5" />
                                        </div>
                                        <p className="text-[10px] font-black uppercase tracking-widest">{s.name}</p>
                                    </div>
                                ))}
                            </div>
                        </div>
                    );
                    case 'lessons': return (
                        <div className="p-6 space-y-4 animate-in fade-in">
                            <h2 className="text-2xl font-800">Curriculum</h2>
                            <p className="text-xs text-slate-500 font-bold uppercase">{stats.completed}/23 Progress to Level 2</p>
                            <div className="space-y-3">
                                <div className="glass p-5 rounded-2xl border-l-4 border-cyan-500 flex justify-between items-center">
                                    <div><h4 className="font-bold">Neural Plasticity 101</h4><p className="text-xs text-slate-400">Psychology</p></div>
                                    <Icon name="ChevronRight" />
                                </div>
                                <div className="glass p-5 rounded-2xl border-l-4 border-slate-700 opacity-50">
                                    <div><h4 className="font-bold">The Ego's Armor</h4><p className="text-xs text-slate-400">Psychology</p></div>
                                    <Icon name="Lock" className="w-4 h-4" />
                                </div>
                            </div>
                        </div>
                    );
                    default: return <div className="p-10 text-center text-slate-500">System loading content...</div>;
                }
            };

            return (
                <div className="max-w-md mx-auto min-h-screen pb-32">
                    <header className="p-6 border-b border-white/5 bg-slate-950/50 backdrop-blur-md flex justify-between items-center sticky top-0 z-50">
                        <span className="font-black text-xl tracking-tighter text-cyan-400">K-SCORE v2</span>
                        <div className="bg-slate-900 px-3 py-1 rounded-full text-[10px] font-black uppercase">LVL {stats.level}</div>
                    </header>

                    {renderContent()}

                    <nav className="fixed bottom-0 left-0 right-0 max-w-md mx-auto h-24 glass border-t border-white/10 flex justify-around items-center px-2 z-50">
                        <button onClick={() => setTab('home')} className={`nav-btn flex flex-col items-center ${tab === 'home' ? 'active' : 'text-slate-500'}`}>
                            <Icon name="Home" className="w-5 h-5" /><span className="text-[8px] font-black mt-1 uppercase">Dash</span>
                        </button>
                        <button onClick={() => setTab('lessons')} className={`nav-btn flex flex-col items-center ${tab === 'lessons' ? 'active' : 'text-slate-500'}`}>
                            <Icon name="Book" className="w-5 h-5" /><span className="text-[8px] font-black mt-1 uppercase">Learn</span>
                        </button>
                        <button onClick={() => setTab('dilemmas')} className={`nav-btn flex flex-col items-center ${tab === 'dilemmas' ? 'active' : 'text-slate-500'}`}>
                            <Icon name="Scale" className="w-5 h-5" /><span className="text-[8px] font-black mt-1 uppercase">Moral</span>
                        </button>
                        <button onClick={() => setTab('skills')} className={`nav-btn flex flex-col items-center ${tab === 'skills' ? 'active' : 'text-slate-500'}`}>
                            <Icon name="GitBranch" className="w-5 h-5" /><span className="text-[8px] font-black mt-1 uppercase">Tree</span>
                        </button>
                        <button onClick={() => setTab('affirmations')} className={`nav-btn flex flex-col items-center ${tab === 'affirmations' ? 'active' : 'text-slate-500'}`}>
                            <Icon name="Heart" className="w-5 h-5" /><span className="text-[8px] font-black mt-1 uppercase">Mind</span>
                        </button>
                    </nav>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
