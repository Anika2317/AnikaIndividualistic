<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>K-SCORE | Neural OS</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;800&display=swap');
        body { background: #020617; font-family: 'Plus Jakarta Sans', sans-serif; color: white; margin: 0; padding: 0; overflow: hidden; }
        .glass { background: rgba(15, 23, 42, 0.85); backdrop-filter: blur(20px); border: 1px solid rgba(255,255,255,0.1); }
        .mandala-rotate { animation: rotate 100s linear infinite; }
        @keyframes rotate { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
        .tab-active { color: #22d3ee !important; filter: drop-shadow(0 0 8px #22d3ee); }
        .view-container { height: calc(100vh - 160px); overflow-y: auto; }
        .btn-active:active { transform: scale(0.95); background: rgba(34, 211, 238, 0.2); }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState } = React;

        const SKILLS = [
            { id: 'logic', n: 'Logic', desc: 'Deconstructing reality via First Principles.', sub: 'Socratic Inquiry' },
            { id: 'empathy', n: 'Empathy', desc: 'Cognitive mapping of internal worlds.', sub: 'Perspective Shifting' },
            { id: 'discipline', n: 'Discipline', desc: 'Subordinating impulse to strategy.', sub: 'Dopamine Control' },
            { id: 'reg', n: 'Regulation', desc: 'Buffer zone between stimulus and response.', sub: 'Stoic Breath' },
            { id: 'int', n: 'Integrity', n: 'Integrity', desc: 'Alignment of values and actions.', sub: 'Radical Honesty' }
        ];

        function App() {
            const [tab, setTab] = useState('dashboard');
            const [stats, setStats] = useState({ kScore: 527, xp: 420, level: 1, streak: 12 });
            const [activeSkill, setActiveSkill] = useState(null);

            const addXP = (amt) => setStats(s => ({...s, xp: s.xp + amt, kScore: s.kScore + Math.floor(amt/5)}));

            return (
                <div className="max-w-md mx-auto h-screen flex flex-col relative">
                    {/* Header */}
                    <header className="p-6 flex justify-between items-center bg-slate-950/90 border-b border-white/5 z-50">
                        <span className="font-black italic text-cyan-400 tracking-tighter">K-SCORE OS</span>
                        <div className="flex gap-2">
                            <div className="glass px-3 py-1 rounded-full text-[10px] font-bold text-amber-400">⚡ {stats.kScore}</div>
                            <div className="bg-cyan-500 px-3 py-1 rounded-full text-[10px] font-black text-slate-900 uppercase">Lvl {stats.level}</div>
                        </div>
                    </header>

                    {/* Skill Info Overlay */}
                    {activeSkill && (
                        <div className="fixed inset-0 z-[100] bg-slate-950/90 flex items-center justify-center p-6 backdrop-blur-md">
                            <div className="glass p-8 rounded-[3rem] border border-cyan-500/30 w-full text-center">
                                <h3 className="text-3xl font-800 text-cyan-400 mb-2">{activeSkill.n}</h3>
                                <p className="text-slate-300 italic mb-4">"{activeSkill.desc}"</p>
                                <p className="text-[10px] font-black uppercase text-slate-500 tracking-widest mb-6 underline decoration-cyan-500/30">Mastering: {activeSkill.sub}</p>
                                <button onClick={() => setActiveSkill(null)} className="w-full py-4 bg-slate-800 rounded-2xl font-black text-xs uppercase tracking-widest">Close Interface</button>
                            </div>
                        </div>
                    )}

                    <main className="view-container">
                        {tab === 'dashboard' && (
                            <div className="p-6 space-y-6">
                                <div className="glass p-10 rounded-[3rem] text-center border-b-4 border-cyan-500/20">
                                    <h1 className="text-4xl font-800 italic uppercase mb-2">ANIKA</h1>
                                    <p className="text-cyan-400 font-bold text-[10px] tracking-[0.4em] mb-6">{stats.streak} DAY STREAK</p>
                                    <div className="h-1.5 w-full bg-slate-800 rounded-full overflow-hidden">
                                        <div className="h-full bg-cyan-400" style={{width: '45%'}}></div>
                                    </div>
                                </div>
                            </div>
                        )}

                        {tab === 'tree' && (
                            <div className="h-full w-full flex items-center justify-center relative pt-10">
                                <div className="absolute mandala-rotate w-72 h-72 border border-white/5 rounded-full"></div>
                                <div className="z-10 w-20 h-20 glass rounded-full flex flex-col items-center justify-center border-2 border-cyan-500 shadow-[0_0_20px_rgba(34,211,238,0.3)]">
                                    <span className="font-black text-[8px] text-slate-500 uppercase">Neural</span>
                                    <span className="font-black text-xs">CORE</span>
                                </div>
                                {SKILLS.map((s, i) => {
                                    const angle = (i * 72) * (Math.PI / 180);
                                    const x = Math.cos(angle) * 120;
                                    const y = Math.sin(angle) * 120;
                                    return (
                                        <div key={s.id} onClick={() => setActiveSkill(s)}
                                             style={{ transform: `translate(${x}px, ${y}px)` }}
                                             className="absolute glass w-14 h-14 rounded-2xl flex items-center justify-center cursor-pointer border border-white/10 hover:border-cyan-400 transition-all">
                                            <span className="text-lg uppercase font-black text-cyan-400">{s.n[0]}</span>
                                        </div>
                                    );
                                })}
                            </div>
                        )}

                        {tab === 'dilemmas' && (
                            <div className="p-6 space-y-4">
                                <h2 className="text-2xl font-800 text-amber-500 tracking-tight">Moral Library</h2>
                                <div className="glass p-6 rounded-3xl border-l-4 border-amber-500 relative group">
                                    <h4 className="font-bold text-lg">The Hospital Choice</h4>
                                    <p className="text-sm text-slate-400 mt-2 italic">Five patients vs One traveler.</p>
                                    <button onClick={() => {alert("Moral Analysis Initializing..."); addXP(100);}} 
                                            className="mt-4 w-full py-4 bg-amber-500/10 text-amber-500 rounded-xl font-black text-[10px] uppercase border border-amber-500/30 btn-active">
                                        Begin Analysis
                                    </button>
                                </div>
                            </div>
                        )}

                        {tab === 'challenges' && (
                            <div className="p-6 space-y-4">
                                <h2 className="text-2xl font-800 text-green-400">Daily Task</h2>
                                <div className="glass p-8 rounded-3xl text-center">
                                    <p className="font-bold text-slate-200 leading-relaxed mb-8 italic">"Log 10 minutes of disciplined reflection."</p>
                                    <button onClick={() => addXP(50)} className="w-full py-5 bg-green-500 text-slate-950 rounded-2xl font-black shadow-lg btn-active">
                                        LOG COMPLETION
                                    </button>
                                </div>
                            </div>
                        )}
                    </main>

                    {/* Navigation Bar */}
                    <nav className="fixed bottom-0 left-0 right-0 max-w-md mx-auto h-24 bg-slate-950/95 border-t border-white/10 flex justify-around items-center px-1 z-[60]">
                        <button onClick={() => setTab('dashboard')} className={`flex flex-col items-center flex-1 ${tab === 'dashboard' ? 'tab-active' : 'text-slate-600'}`}>
                            <span className="text-xs font-black uppercase">Dash</span>
                        </button>
                        <button onClick={() => setTab('dilemmas')} className={`flex flex-col items-center flex-1 ${tab === 'dilemmas' ? 'tab-active' : 'text-slate-600'}`}>
                            <span className="text-xs font-black uppercase">Moral</span>
                        </button>
                        <button onClick={() => setTab('lessons')} className={`flex flex-col items-center flex-1 ${tab === 'lessons' ? 'tab-active' : 'text-slate-600'}`}>
                            <span className="text-xs font-black uppercase">Learn</span>
                        </button>
                        <button onClick={() => setTab('tree')} className={`flex flex-col items-center flex-1 ${tab === 'tree' ? 'tab-active' : 'text-slate-600'}`}>
                            <span className="text-xs font-black uppercase">Tree</span>
                        </button>
                        <button onClick={() => setTab('challenges')} className={`flex flex-col items-center flex-1 ${tab === 'challenges' ? 'tab-active' : 'text-slate-600'}`}>
                            <span className="text-xs font-black uppercase">Task</span>
                        </button>
                        <button onClick={() => setTab('mind')} className={`flex flex-col items-center flex-1 ${tab === 'mind' ? 'tab-active' : 'text-slate-600'}`}>
                            <span className="text-xs font-black uppercase">Mind</span>
                        </button>
                    </nav>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
