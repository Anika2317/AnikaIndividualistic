<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>K-SCORE | Neural Evolution</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap');
        body { background: #020617; font-family: 'Plus Jakarta Sans', sans-serif; color: white; overflow-x: hidden; }
        .glass { background: rgba(15, 23, 42, 0.8); backdrop-filter: blur(12px); border: 1px solid rgba(255,255,255,0.1); }
        .tab-active { color: #22d3ee; border-top: 3px solid #22d3ee; }
        .page-fade { animation: fadeIn 0.3s ease-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        const Icon = ({ name, className }) => {
            useEffect(() => { lucide.createIcons(); }, [name]);
            return <i data-lucide={name.toLowerCase().replace(/([a-z0-9])([A-Z])/g, '$1-$2')} className={className}></i>;
        };

        function App() {
            const [tab, setTab] = useState('front'); // front, lessons, dilemmas, affirmations, insights, stats
            const [stats, setStats] = useState({ kScore: 527, level: 8, xp: 4200 });

            const renderContent = () => {
                switch(tab) {
                    case 'front':
                        return (
                            <div className="page-fade space-y-6 pt-10 text-center">
                                <div className="w-24 h-24 bg-cyan-500 rounded-full mx-auto flex items-center justify-center shadow-[0_0_30px_rgba(6,182,212,0.5)]">
                                    <Icon name="Zap" className="w-12 h-12 text-slate-900" />
                                </div>
                                <h1 className="text-4xl font-black italic">WELCOME, ANIKA</h1>
                                <p className="text-slate-400 text-sm tracking-widest uppercase font-bold">System Status: Optimal</p>
                                <div className="glass p-6 rounded-3xl mx-4">
                                    <p className="text-xs text-slate-500 font-bold uppercase mb-2">Daily Progress</p>
                                    <div className="h-4 w-full bg-slate-800 rounded-full overflow-hidden">
                                        <div className="h-full bg-cyan-400 w-[65%]"></div>
                                    </div>
                                </div>
                                <button onClick={() => setTab('lessons')} className="w-[80%] py-5 bg-cyan-500 rounded-2xl text-slate-900 font-black text-xl hover:scale-105 transition-transform">
                                    START EVOLUTION
                                </button>
                            </div>
                        );
                    case 'lessons':
                        return (
                            <div className="page-fade space-y-4 p-6">
                                <h2 className="text-2xl font-black mb-6">Curriculum</h2>
                                <div className="p-5 glass rounded-2xl border-l-4 border-blue-500">
                                    <h3 className="font-bold">Stoic Principles</h3>
                                    <p className="text-sm text-slate-400 italic">Marcus Aurelius</p>
                                </div>
                                <div className="p-5 glass rounded-2xl border-l-4 border-purple-500">
                                    <h3 className="font-bold">The Shadow Self</h3>
                                    <p className="text-sm text-slate-400 italic">Fyodor Dostoevsky</p>
                                </div>
                            </div>
                        );
                    case 'dilemmas':
                        return (
                            <div className="page-fade p-6">
                                <h2 className="text-2xl font-black mb-6">Moral Puzzles</h2>
                                <div className="p-8 glass rounded-3xl border-2 border-dashed border-slate-700 text-center">
                                    <Icon name="Lock" className="w-8 h-8 mx-auto text-slate-600 mb-2" />
                                    <p className="text-slate-500 font-bold">New Dilemma in 4 Hours</p>
                                </div>
                            </div>
                        );
                    case 'affirmations':
                        return (
                            <div className="page-fade p-6 flex flex-col items-center justify-center min-h-[60vh] text-center">
                                <Icon name="Heart" className="w-12 h-12 text-pink-500 mb-6" />
                                <p className="text-2xl font-bold leading-relaxed">"My growth is not a destination, but a consistent practice of awareness."</p>
                            </div>
                        );
                    case 'insights':
                        return (
                            <div className="page-fade p-6 space-y-4">
                                <h2 className="text-2xl font-black mb-6">Philosophical Deep-Dives</h2>
                                <div className="p-5 bg-gradient-to-r from-slate-900 to-slate-800 rounded-2xl border border-white/5">
                                    <p className="text-cyan-400 text-xs font-bold mb-1">POETRY</p>
                                    <h3 className="font-bold">The Guest House</h3>
                                    <p className="text-sm text-slate-400">Rumi's take on emotional regulation.</p>
                                </div>
                            </div>
                        );
                    case 'stats':
                        return (
                            <div className="page-fade p-6 space-y-6">
                                <h2 className="text-2xl font-black mb-6">Metrics</h2>
                                <div className="grid grid-cols-2 gap-4">
                                    <div className="glass p-6 rounded-2xl text-center">
                                        <p className="text-xs text-slate-500 font-bold uppercase mb-1">K-Score</p>
                                        <p className="text-3xl font-black text-cyan-400">{stats.kScore}</p>
                                    </div>
                                    <div className="glass p-6 rounded-2xl text-center">
                                        <p className="text-xs text-slate-500 font-bold uppercase mb-1">Level</p>
                                        <p className="text-3xl font-black text-purple-400">{stats.level}</p>
                                    </div>
                                </div>
                            </div>
                        );
                }
            };

            return (
                <div className="max-w-md mx-auto min-h-screen relative pb-32">
                    {/* Header */}
                    <header className="p-6 flex justify-between items-center border-b border-white/5 bg-slate-950/50 backdrop-blur-md sticky top-0 z-50">
                        <span className="font-black tracking-tighter text-xl">K-SCORE</span>
                        <div className="flex items-center gap-1 text-amber-400 font-bold">
                            <Icon name="Zap" className="w-4 h-4" /> {stats.kScore}
                        </div>
                    </header>

                    {renderContent()}

                    {/* Navbar */}
                    <nav className="fixed bottom-0 left-0 right-0 max-w-md mx-auto h-20 glass border-t border-white/10 flex justify-around items-center px-4 z-50">
                        <button onClick={() => setTab('lessons')} className={`flex flex-col items-center transition-all ${tab === 'lessons' ? 'text-cyan-400 scale-110' : 'text-slate-500'}`}>
                            <Icon name="Book" className="w-5 h-5" />
                            <span className="text-[10px] font-bold mt-1 uppercase">Learn</span>
                        </button>
                        <button onClick={() => setTab('dilemmas')} className={`flex flex-col items-center transition-all ${tab === 'dilemmas' ? 'text-cyan-400 scale-110' : 'text-slate-500'}`}>
                            <Icon name="Scale" className="w-5 h-5" />
                            <span className="text-[10px] font-bold mt-1 uppercase">Dilemmas</span>
                        </button>
                        <button onClick={() => setTab('front')} className={`-mt-10 bg-cyan-500 p-4 rounded-full shadow-[0_10px_20px_rgba(6,182,212,0.3)] ${tab === 'front' ? 'scale-125' : ''}`}>
                            <Icon name="Home" className="w-6 h-6 text-slate-900" />
                        </button>
                        <button onClick={() => setTab('affirmations')} className={`flex flex-col items-center transition-all ${tab === 'affirmations' ? 'text-cyan-400 scale-110' : 'text-slate-500'}`}>
                            <Icon name="Sun" className="w-5 h-5" />
                            <span className="text-[10px] font-bold mt-1 uppercase">Insights</span>
                        </button>
                        <button onClick={() => setTab('stats')} className={`flex flex-col items-center transition-all ${tab === 'stats' ? 'text-cyan-400 scale-110' : 'text-slate-500'}`}>
                            <Icon name="BarChart2" className="w-5 h-5" />
                            <span className="text-[10px] font-bold mt-1 uppercase">Stats</span>
                        </button>
                    </nav>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
