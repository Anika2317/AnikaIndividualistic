<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>K-SCORE | Neural OS</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;800&display=swap');
        body { background: #020617; font-family: 'Plus Jakarta Sans', sans-serif; color: white; margin: 0; padding: 0; overflow: hidden; }
        .glass { background: rgba(15, 23, 42, 0.85); backdrop-filter: blur(25px); border: 1px solid rgba(255,255,255,0.1); }
        .mandala-rotate { animation: rotate 100s linear infinite; }
        @keyframes rotate { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
        .tab-active { color: #22d3ee !important; filter: drop-shadow(0 0 10px #22d3ee); border-top: 2px solid #22d3ee; }
        .view-container { height: calc(100vh - 160px); overflow-y: auto; -webkit-overflow-scrolling: touch; }
        .node-pulse { animation: pulse 3s infinite; }
        @keyframes pulse { 0% { box-shadow: 0 0 0 0 rgba(34, 211, 238, 0.2); } 70% { box-shadow: 0 0 0 20px rgba(34, 211, 238, 0); } 100% { box-shadow: 0 0 0 0 rgba(34, 211, 238, 0); } }
    </style>
</head>
<body>
    <div id="root"></div>
    <script type="text/babel">
        const { useState } = React;

        const SKILL_DATA = {
            logic: { title: "Strategic Logic", icon: "⚛", color: "text-cyan-400", summary: "First Principles thinking.", sub: "Socratic Inquiry" },
            empathy: { title: "Radical Empathy", icon: "♥", color: "text-pink-400", summary: "Mapping internal states.", sub: "Shadow Work" },
            discipline: { title: "Iron Discipline", icon: "🛡", color: "text-orange-400", summary: "Impulse control.", sub: "Dopamine Management" },
            regulation: { title: "Mind Regulation", icon: "≋", color: "text-blue-400", summary: "Stimulus-response buffer.", sub: "Metacognition" },
            integrity: { title: "Total Integrity", icon: "⚓", color: "text-green-400", summary: "Values alignment.", sub: "Radical Honesty" }
        };

        const LESSONS = [
            { id: 1, title: "The Control Dichotomy", pages: [
                {h: "01. The What", b: "Stoicism is the art of separating what we control from what we don't."},
                {h: "02. The Who", b: "Pioneered by Epictetus, a slave, and Marcus Aurelius, an Emperor."},
                {h: "03. The When", b: "Founded in 300 BC Athens, it is the base of modern CBT."},
                {h: "04. The Where", b: "The 'Stoa Poikile' - a public porch in the heart of the city."},
                {h: "05. The Why", b: "To achieve 'Ataraxia' - unshakeable mental peace."},
                {h: "06. How: Step 1", b: "Identify if a stressor is 100% in your control. If not, ignore it."},
                {h: "07. How: Step 2", b: "Stop seeking external validation; you are then their slave."},
                {h: "08. How: Step 3", b: "Direct all energy into your effort, never the result."},
                {h: "09. Exercise", b: "Imagine losing everything. Realize your character is still yours."},
                {h: "10. End", b: "Mastery of self is the only true freedom. +500 XP"}
            ]}
        ];

        function App() {
            const [tab, setTab] = useState('dashboard');
            const [activeSkill, setActiveSkill] = useState(null);
            const [page, setPage] = useState(-1);
            const [stats, setStats] = useState({ kScore: 527, xp: 420, level: 1, streak: 12 });

            return (
                <div className="max-w-md mx-auto h-screen flex flex-col relative bg-slate-950">
                    {/* LESSON STUDY ENGINE */}
                    {page >= 0 && (
                        <div className="fixed inset-0 z-[100] bg-slate-950 p-8 flex flex-col">
                            <div className="flex justify-between items-center mb-8">
                                <span className="text-[10px] font-black text-cyan-400">PAGE {page + 1} / 10</span>
                                <button onClick={() => setPage(-1)} className="text-slate-500 font-bold text-xs">EXIT</button>
                            </div>
                            <div className="flex-1">
                                <h2 className="text-4xl font-800 mb-6 text-white uppercase">{LESSONS[0].pages[page].h}</h2>
                                <div className="glass p-8 rounded-[2.5rem] border-l-4 border-cyan-500 text-xl italic text-slate-200">
                                    "{LESSONS[0].pages[page].b}"
                                </div>
                            </div>
                            <div className="flex gap-4 mt-8">
                                {page > 0 && <button onClick={() => setPage(p => p - 1)} className="flex-1 py-4 glass rounded-2xl font-black">BACK</button>}
                                {page < 9 ? (
                                    <button onClick={() => setPage(p => p + 1)} className="flex-2 py-4 bg-cyan-500 text-slate-950 rounded-2xl font-black">NEXT</button>
                                ) : (
                                    <button onClick={() => {setPage(-1); setStats(s => ({...s, kScore: s.kScore + 100}))}} className="flex-2 py-4 bg-green-500 text-slate-950 rounded-2xl font-black">MASTERED</button>
                                )}
                            </div>
                        </div>
                    )}

                    {/* SKILL DOSSIER */}
                    {activeSkill && (
                        <div className="fixed inset-0 z-[100] bg-slate-950/95 flex items-center justify-center p-6 backdrop-blur-md">
                            <div className="glass p-8 rounded-[3rem] border border-cyan-500/30 w-full text-center shadow-2xl">
                                <h3 className={`text-3xl font-800 ${activeSkill.color} mb-4`}>{activeSkill.title}</h3>
                                <p className="text-slate-300 italic mb-6 leading-relaxed">"{activeSkill.summary}"</p>
                                <p className="text-[10px] font-black uppercase text-slate-500 tracking-widest mb-8">NEXUS: {activeSkill.sub}</p>
                                <button onClick={() => setActiveSkill(null)} className="w-full py-4 bg-slate-800 rounded-2xl font-black uppercase text-xs">Close</button>
                            </div>
                        </div>
                    )}

                    <header className="p-6 flex justify-between items-center bg-slate-950 border-b border-white/5">
                        <span className="font-black italic text-cyan-400 text-2xl">K-SCORE OS</span>
                        <div className="glass px-3 py-1 rounded-full text-[11px] font-black text-amber-400">⚡ {stats.kScore}</div>
                    </header>

                    <main className="view-container">
                        {tab === 'dashboard' && (
                            <div className="p-6 space-y-6">
                                <div className="glass p-10 rounded-[3.5rem] text-center border-b-4 border-cyan-500/20">
                                    <h1 className="text-5xl font-800 italic mb-2">ANIKA</h1>
                                    <p className="text-cyan-400 font-bold text-[10px] tracking-[0.4em]">{stats.streak} DAY STREAK</p>
                                </div>
                            </div>
                        )}
                        {tab === 'tree' && (
                            <div className="h-[450px] w-full flex items-center justify-center relative">
                                <div className="absolute mandala-rotate w-80 h-80 border border-white/5 rounded-full"></div>
                                <div className="z-10 w-24 h-24 glass rounded-full flex flex-col items-center justify-center border-2 border-cyan-400/40 node-pulse">
                                    <span className="text-xl font-800 italic">CORE</span>
                                </div>
                                {Object.entries(SKILL_DATA).map(([key, data], i) => {
                                    const angle = (i * 72) * (Math.PI / 180);
                                    return (
                                        <div key={key} onClick={() => setActiveSkill(data)}
                                             style={{ transform: `translate(${Math.cos(angle)*135}px, ${Math.sin(angle)*135}px)` }}
                                             className="absolute glass w-16 h-16 rounded-2xl flex items-center justify-center cursor-pointer hover:border-cyan-400 shadow-2xl transition-all">
                                            <span className={`text-2xl font-black ${data.color}`}>{data.icon}</span>
                                        </div>
                                    );
                                })}
                            </div>
                        )}
                        {tab === 'lessons' && (
                            <div className="p-6 space-y-4">
                                <div onClick={() => setPage(0)} className="glass p-7 rounded-[2rem] border-l-4 border-cyan-500 cursor-pointer">
                                    <h4 className="font-bold text-lg">1. The Control Dichotomy</h4>
                                    <p className="text-[10px] text-slate-500 uppercase mt-2">10 Page Module • +500 XP</p>
                                </div>
                            </div>
                        )}
                    </main>

                    <nav className="fixed bottom-0 left-0 right-0 h-24 bg-slate-950 border-t border-white/10 flex justify-around items-center px-2 z-[60]">
                        {['Dashboard', 'Moral', 'Lessons', 'Tree', 'Tasks', 'Mind'].map((t) => (
                            <button key={t} onClick={() => setTab(t.toLowerCase())} 
                                    className={`flex flex-col items-center flex-1 h-full justify-center ${tab === t.toLowerCase() ? 'tab-active' : 'text-slate-600'}`}>
                                <span className="text-[9px] font-black uppercase">{t}</span>
                            </button>
                        ))}
                    </nav>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
