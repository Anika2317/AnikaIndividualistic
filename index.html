<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>K-SCORE | Neural OS</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;800&display=swap');
        body { background: #020617; font-family: 'Plus Jakarta Sans', sans-serif; color: white; margin: 0; padding: 0; overflow: hidden; }
        .glass { background: rgba(15, 23, 42, 0.85); backdrop-filter: blur(25px); border: 1px solid rgba(255,255,255,0.1); }
        .mandala-rotate { animation: rotate 120s linear infinite; }
        .mandala-rotate-rev { animation: rotate-rev 80s linear infinite; }
        @keyframes rotate { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
        @keyframes rotate-rev { from { transform: rotate(360deg); } to { transform: rotate(0deg); } }
        .tab-active { color: #22d3ee !important; filter: drop-shadow(0 0 15px #22d3ee); border-top: 2px solid #22d3ee; }
        .view-container { height: calc(100vh - 160px); overflow-y: auto; scroll-behavior: smooth; }
        .flow-line { width: 2px; background: linear-gradient(to bottom, #ef4444, #22d3ee); height: 30px; margin: 0 auto; }
        .branch-node { animation: nodePop 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards; }
        @keyframes nodePop { from { opacity: 0; transform: scale(0.8); } to { opacity: 1; transform: scale(1); } }
        .glow-ring { border: 2px solid #22d3ee; box-shadow: 0 0 25px rgba(34, 211, 238, 0.3), inset 0 0 20px rgba(34, 211, 238, 0.1); }
        .node-pulse { animation: pulse 3s infinite; }
        @keyframes pulse { 0% { box-shadow: 0 0 0 0 rgba(34, 211, 238, 0.4); } 70% { box-shadow: 0 0 0 20px rgba(34, 211, 238, 0); } 100% { box-shadow: 0 0 0 0 rgba(34, 211, 238, 0); } }
    </style>
</head>
<body>
    <div id="root"></div>
    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        /* ALL FROZEN DATA RETAINED (MANDALA, MORALS, LESSONS) */
        const ALL_SKILLS = [
            { id: 1, title: "Empathy", icon: "♥", summary: "The ability to map external internalities.", sub: "Mirror Neurons" },
            { id: 2, title: "Strategic Logic", icon: "⚛", summary: "First Principles thinking.", sub: "Quantum Reasoning" },
            { id: 3, title: "Iron Discipline", icon: "🛡", summary: "Subordination of impulse.", sub: "Neural Override" },
            { id: 4, title: "Mind Regulation", icon: "≋", summary: "Stimulus-response buffer.", sub: "Cortisol Control" },
            { id: 5, title: "Total Integrity", icon: "⚓", summary: "Absolute alignment.", sub: "Radical Honesty" },
            { id: 6, title: "Loyalty", icon: "🤝", summary: "Unwavering commitment to the code.", sub: "Tribal Bond" },
            { id: 7, title: "Fortitude", icon: "⛰", summary: "Endurance under pressure.", sub: "Pain Tolerance" },
            { id: 8, title: "Intuition", icon: "👁", summary: "Pattern recognition.", sub: "Heuristic Processing" },
            { id: 9, title: "Meta-Learning", icon: "📚", summary: "Learning how to learn.", sub: "Rapid Acquisition" },
            { id: 10, title: "Socratic Inquiry", icon: "❓", summary: "Relentless questioning.", sub: "Truth Seeking" },
            { id: 11, title: "Shadow Insight", icon: "🌑", summary: "Integrating the repressed.", sub: "Jungian Analysis" },
            { id: 12, title: "Kinetic Flow", icon: "🌀", summary: "Movement without friction.", sub: "Peak State" },
            { id: 13, title: "Dopamine Control", icon: "⚡", summary: "Reward system reclamation.", sub: "Boredom Mastery" },
            { id: 14, title: "Focus Depth", icon: "🎯", summary: "Single variable locking.", sub: "Monotasking" },
            { id: 15, title: "Presence", icon: "🕯", summary: "Total immersion.", sub: "Zero Point" },
            { id: 16, title: "Self-Sovereignty", icon: "👑", summary: "Internal validation governance.", sub: "Autonomy" },
            { id: 17, title: "Stoic Resolve", icon: "🏛", summary: "Event/Judgment separation.", sub: "Ataraxia" },
            { id: 18, title: "Vision", icon: "🔭", summary: "Long-path consequence mapping.", sub: "Long-path Logic" },
            { id: 19, title: "Adaptability", icon: "🦎", summary: "OS rewriting.", sub: "Neuroplasticity" },
            { id: 20, title: "Courage", icon: "🦁", summary: "Acting through fear.", sub: "Risk Assessment" },
            { id: 21, title: "Pragmatism", icon: "🛠", summary: "Outcome focus.", sub: "Reality Check" },
            { id: 22, title: "Asceticism", icon: "❄", summary: "Power in deprivation.", sub: "Cold Logic" },
            { id: 23, title: "Justice", icon: "⚖", summary: "Objective truth weighing.", sub: "Equity Protocol" },
            { id: 24, title: "Willpower", icon: "🔥", summary: "The raw fuel of drive.", sub: "Drive Matrix" }
        ];

        const DILEMMAS = [{ id: 1, title: "The Trolley Paradox", start: "A train heading for 5 victims. You stand at the lever.", nodes: [{ q: "S1: Pull lever?", options: [{t:"PULL"}, {t:"STAY"}] }, { q: "S2: Variable?", options: [{t:"SAVE CHILD"}, {t:"SAVE FIVE"}] }, { q: "S3: Jail?", options: [{t:"ACCEPT JAIL"}, {t:"PROTECT SELF"}] }, { q: "S4: Crowd?", options: [{t:"IGNORE"}, {t:"HESITATE"}] }, { q: "S5: Final Act?", options: [{t:"ACT"}, {t:"WITHDRAW"}] }], archetypes: { "ACT": { name: "Sovereign Architect", summary: "Logic over optics." }, "WITHDRAW": { name: "Stoic Guardian", summary: "Purity over arithmetic." } } }];
        ["Lifeboat Gamble", "AI Singularity", "Genetic Edit", "Corporate Spy", "Healer's Lie", "Sovereign City", "Memory Wipe", "Ghost in App", "Last Tree", "Martian Choice", "Digital Mirror", "Time Loop", "Final Witness"].forEach((t, i) => { DILEMMAS.push({ id: i+2, title: t, start: `Scenario ${t} briefing initiated.`, nodes: Array(5).fill({q: "Protocol decision point...", options:[{t:"A"},{t:"B"}]}), archetypes: {"A":{name:"Pathfinder"},"B":{name:"Warden"}} }); });

        const LESSON_TITLES = ["Stoicism", "Logic", "Socratic", "Cognitive", "Shadow", "Impulse", "Atomic", "Dopamine", "Buffer", "Thinking", "Values", "Honesty", "Identity", "Integration"];
        const LESSONS = LESSON_TITLES.map((title, i) => ({ id: i + 1, title, pages: Array.from({length: 10}, (_, p) => ({ h: `${title} | Phase 0${p+1}`, b: `Deep neural restructuring module for ${title}. Focus on level 1 architectural alignment.` })) }));

        const AFFIRMATIONS = [
            { t: "Stoicism", b: "I am the mountain. The wind of external chaos may blow, but my internal state remains unmoved." },
            { t: "Logic", b: "I discard analogy. I see the atoms of truth and rebuild reality from first principles." },
            { t: "Socratic", b: "I am comfortable with my own ignorance. My questions are the keys to my expansion." },
            { t: "Cognitive", b: "I see the map, not just the path. I recognize my triggers as data, not as commands." },
            { t: "Shadow", b: "I own my darkness. By integrating my hidden traits, I become a whole and unified force." },
            { t: "Impulse", b: "I own the gap. In the silence between stimulus and response, I choose my destiny." },
            { t: "Atomic", b: "I am the sum of my repetitions. 1% better today is 37x better by the end of the cycle." },
            { t: "Dopamine", b: "I master my rewards. I choose deep, difficult satisfaction over cheap, shallow stimulation." },
            { t: "Buffer", b: "My mind is a fortress. No external word enters my code without my explicit permission." },
            { t: "Thinking", b: "I am the observer of the thought, not the thought itself. I watch my mind with cold clarity." },
            { t: "Values", b: "My actions are the echo of my code. I do not bargain with my non-negotiable values." },
            { t: "Honesty", b: "Truth is my simplest weapon. By hiding nothing, I am burdened by nothing." },
            { t: "Identity", b: "I am the architect of my self. I act as the version of me that has already won." },
            { t: "Integration", b: "I am a unified operating system. Logic, Empathy, and Discipline move as one." }
        ];

        function App() {
            const [tab, setTab] = useState('dashboard');
            const [activeSkill, setActiveSkill] = useState(null);
            const [activeMoral, setActiveMoral] = useState(null);
            const [activeLesson, setActiveLesson] = useState(null);
            const [lessonPage, setLessonPage] = useState(0);
            const [moralStep, setMoralStep] = useState(0);
            const [moralHistory, setMoralHistory] = useState([]);
            const [moralAudit, setMoralAudit] = useState(null);
            const [stats, setStats] = useState({ kScore: 527, streak: 12, tier: "Adept" });
            const [completedTasks, setCompletedTasks] = useState([]);

            const handleMoralChoice = (opt) => {
                const newHistory = [...moralHistory, opt.t];
                setMoralHistory(newHistory);
                if (moralStep < activeMoral.nodes.length - 1) setMoralStep(moralStep + 1);
                else {
                    setMoralAudit(activeMoral.archetypes[newHistory[4]] || activeMoral.archetypes[Object.keys(activeMoral.archetypes)[0]]);
                    setStats(s => ({...s, kScore: s.kScore + 150}));
                }
            };

            return (
                <div className="max-w-md mx-auto h-screen flex flex-col relative bg-slate-950 overflow-hidden">
                    
                    {/* LESSON ENGINE OVERLAY - FROZEN */}
                    {activeLesson && (
                        <div className="fixed inset-0 z-[200] bg-slate-950 p-8 flex flex-col">
                            <div className="flex justify-between items-center mb-10"><span className="text-cyan-400 font-black text-xs uppercase tracking-widest">Protocol {lessonPage + 1}/10</span><button onClick={() => {setActiveLesson(null); setLessonPage(0);}} className="text-slate-500 font-bold text-xs">ABORT</button></div>
                            <div className="flex-1"><h2 className="text-4xl font-800 mb-6 text-white uppercase tracking-tighter leading-none">{activeLesson.pages[lessonPage].h}</h2><div className="glass p-8 rounded-[2.5rem] border-l-4 border-cyan-500 text-xl italic text-slate-200">"{activeLesson.pages[lessonPage].b}"</div></div>
                            <div className="flex gap-4 mt-8">{lessonPage > 0 && <button onClick={() => setLessonPage(p => p - 1)} className="flex-1 py-5 glass rounded-2xl font-black uppercase text-xs">Back</button>}{lessonPage < 9 ? ( <button onClick={() => setLessonPage(p => p + 1)} className="flex-2 py-5 bg-cyan-500 text-slate-950 rounded-2xl font-black uppercase text-xs">Next Phase</button> ) : ( <button onClick={() => {setStats(s => ({...s, kScore: s.kScore + 500})); setActiveLesson(null); setLessonPage(0);}} className="flex-2 py-5 bg-green-500 text-slate-950 rounded-2xl font-black uppercase text-xs">Finalize</button> )}</div>
                        </div>
                    )}

                    {/* MORAL FLOW LAB OVERLAY - FROZEN */}
                    {activeMoral && (
                        <div className="fixed inset-0 z-[100] bg-slate-950 p-6 flex flex-col overflow-hidden">
                            <div className="flex justify-between items-center mb-6"><span className="text-red-500 font-black text-[10px] uppercase tracking-widest">Logic Stream</span><button onClick={() => {setActiveMoral(null); setMoralHistory([]); setMoralStep(0); setMoralAudit(null);}} className="text-slate-500 font-bold">X</button></div>
                            <div className="flex-1 overflow-y-auto pr-2">
                                <div className="glass p-5 rounded-3xl text-center border-red-500/20 mb-4 branch-node"><p className="text-sm italic font-medium">"{activeMoral.start}"</p></div>
                                {moralHistory.map((h, i) => ( <React.Fragment key={i}><div className="flow-line"></div><div className="glass px-5 py-2 rounded-full border-cyan-500/50 text-[10px] font-black text-cyan-400 mx-auto w-fit branch-node">{h}</div></React.Fragment> ))}
                                {!moralAudit ? ( <div className="mt-4 branch-node"><div className="flow-line"></div><div className="glass p-6 rounded-[2.5rem] border-red-500/30 text-center"><p className="text-sm font-bold mb-6">{activeMoral.nodes[moralStep].q}</p><div className="flex gap-4">{activeMoral.nodes[moralStep].options.map((o, idx) => ( <button key={idx} onClick={() => handleMoralChoice(o)} className="flex-1 py-4 bg-red-500/10 border border-red-500/40 rounded-xl text-red-400 font-black text-[10px] uppercase">{o.t}</button> ))}</div></div></div>
                                ) : ( <div className="mt-4 branch-node"><div className="flow-line"></div><div className="glass p-8 rounded-[3rem] border-l-8 border-green-500 shadow-2xl"><h3 className="text-2xl font-800 text-white mb-4 uppercase">{moralAudit.name}</h3><p className="text-sm text-slate-300 italic mb-6">"{moralAudit.summary}"</p><button onClick={() => {setActiveMoral(null); setMoralHistory([]); setMoralStep(0); setMoralAudit(null);}} className="mt-8 w-full py-4 bg-cyan-500 text-slate-950 rounded-2xl font-black text-xs uppercase">Integrate</button></div></div> )}
                            </div>
                        </div>
                    )}

                    {/* MANDALA DOSSIER OVERLAY - FROZEN */}
                    {activeSkill && (
                        <div className="fixed inset-0 z-[300] bg-slate-950/95 flex items-center justify-center p-6 backdrop-blur-md branch-node">
                            <div className="glass p-8 rounded-[3rem] border border-cyan-500/30 w-full text-center shadow-2xl">
                                <span className="text-6xl mb-6 block">{activeSkill.icon}</span><h3 className="text-3xl font-800 text-white mb-4 uppercase">{activeSkill.title}</h3><p className="text-slate-300 italic mb-6 leading-relaxed">"{activeSkill.summary}"</p><div className="p-4 bg-slate-900/50 rounded-2xl mb-8"><p className="text-white font-bold">{activeSkill.sub}</p></div><button onClick={() => setActiveSkill(null)} className="w-full py-4 bg-slate-800 rounded-2xl font-black uppercase text-xs">Return</button>
                            </div>
                        </div>
                    )}

                    <header className="p-6 flex justify-between items-center bg-slate-950 border-b border-white/5 z-50">
                        <span className="font-black italic text-cyan-400 text-2xl tracking-tighter">K-SCORE OS</span>
                        <div className="glass px-3 py-1 rounded-full text-[11px] font-black text-amber-400">⚡ {stats.kScore}</div>
                    </header>

                    <main className="view-container">
                        {tab === 'dashboard' && (
                            <div className="p-6 space-y-6 text-center"><div className="w-48 h-48 rounded-full glow-ring flex flex-col items-center justify-center relative mb-6 mx-auto"><div className="absolute inset-0 rounded-full border-t-4 border-cyan-400 mandala-rotate opacity-40"></div><h1 className="text-4xl font-800 tracking-tighter italic">K-SCORE</h1><p className="text-cyan-400 font-black text-[10px] tracking-widest mt-1 uppercase">Tier: {stats.tier}</p></div></div>
                        )}
                        
                        {tab === 'tree' && (
                            <div className="h-full w-full flex flex-col items-center justify-center relative min-h-[550px] overflow-hidden">
                                <div className="absolute w-full h-full flex items-center justify-center scale-90 sm:scale-100"><div className="absolute w-56 h-56 border border-white/5 rounded-full mandala-rotate"></div><div className="absolute w-[340px] h-[340px] border border-cyan-400/5 rounded-full mandala-rotate-rev"></div><div className="z-10 w-28 h-28 glass rounded-full flex flex-col items-center justify-center border-2 border-cyan-400 node-pulse"><span className="text-2xl font-black italic">CORE</span></div>{ALL_SKILLS.map((data, i) => { const isInner = i < 8; const total = isInner ? 8 : 16; const index = isInner ? i : i - 8; const radius = isInner ? 115 : 175; const angle = (index * (360 / total) - 90) * (Math.PI / 180); const x = Math.cos(angle) * radius; const y = Math.sin(angle) * radius; return ( <div key={data.id} onClick={() => setActiveSkill(data)} style={{ transform: `translate(${x}px, ${y}px)` }} className={`absolute glass ${isInner ? 'w-12 h-12' : 'w-10 h-10'} rounded-xl flex items-center justify-center cursor-pointer border border-white/10 hover:border-cyan-400 transition-all z-20 group active:scale-90`}><span className={`${isInner ? 'text-2xl' : 'text-xl'} group-hover:scale-110`}>{data.icon}</span></div> ); })}</div>
                            </div>
                        )}

                        {tab === 'moral' && (
                            <div className="p-6 space-y-4">
                                <h2 className="text-3xl font-800 text-red-500 uppercase tracking-tighter mb-6">Moral Labs</h2>
                                {DILEMMAS.map(d => ( <div key={d.id} onClick={() => setActiveMoral(d)} className="glass p-7 rounded-[2.5rem] border-l-4 border-red-500 cursor-pointer active:scale-95 shadow-xl transition-all"><h4 className="font-bold text-lg uppercase tracking-tight">{d.title}</h4><p className="text-[10px] text-slate-500 uppercase mt-2 tracking-widest">5-Stage Visual Flow</p></div> ))}
                            </div>
                        )}

                        {tab === 'learn' && (
                            <div className="p-6 space-y-4">
                                <h2 className="text-3xl font-800 text-cyan-400 uppercase tracking-tighter mb-6">Curriculum</h2>
                                {LESSONS.map(l => ( <div key={l.id} onClick={() => {setActiveLesson(l); setLessonPage(0);}} className="glass p-6 rounded-3xl border-l-4 border-cyan-500 cursor-pointer active:scale-95 transition-all"><h4 className="font-bold text-lg uppercase tracking-tight">{l.id}. {l.title}</h4><p className="text-[10px] text-slate-500 uppercase mt-2 tracking-widest">10 Page Protocol</p></div> ))}
                            </div>
                        )}

                        {tab === 'task' && (
                            <div className="p-6 space-y-4">
                                <h2 className="text-3xl font-800 text-cyan-400 uppercase tracking-tighter mb-6 drop-shadow-[0_0_10px_#22d3ee]">Daily Protocol</h2>
                                {[ {id:'t1',t:'Neural Deconstruction',d:'Finish 1 Moral Lab.',x:150}, {id:'t2',t:'Stoic Hardening',d:'Complete 1 Lesson Protocol.',x:500} ].map(task => ( <div key={task.id} onClick={() => !completedTasks.includes(task.id) && (setCompletedTasks([...completedTasks,task.id]), setStats(s=>({...s,kScore:s.kScore+task.x})))} className={`glass p-6 rounded-[2rem] border-l-4 transition-all active:scale-95 cursor-pointer ${completedTasks.includes(task.id) ? 'border-green-500 opacity-60' : 'border-slate-700'}`}><div className="flex justify-between items-start"><div><h4 className={`font-bold text-lg uppercase ${completedTasks.includes(task.id) ? 'line-through text-slate-500' : 'text-white'}`}>{task.t}</h4><p className="text-xs text-slate-400 mt-1">{task.d}</p></div><div className={`px-2 py-1 rounded-full text-[9px] font-black ${completedTasks.includes(task.id) ? 'bg-green-500 text-slate-950' : 'bg-slate-800 text-cyan-400'}`}>{completedTasks.includes(task.id) ? 'SYNCED' : `+${task.x} XP`}</div></div></div> ))}
                            </div>
                        )}

                        {tab === 'mind' && (
                            <div className="p-6 space-y-4">
                                <h2 className="text-3xl font-800 text-cyan-400 uppercase tracking-tighter mb-6 drop-shadow-[0_0_10px_#22d3ee]">Neural Affirmations</h2>
                                {AFFIRMATIONS.map((a, i) => (
                                    <div key={i} className="glass p-7 rounded-[2.5rem] border-l-4 border-cyan-500 shadow-2xl relative overflow-hidden active:scale-[0.98] transition-all">
                                        <p className="text-[10px] text-cyan-400 font-black uppercase tracking-widest mb-2">{a.t} Protocol</p>
                                        <p className="text-lg font-bold text-white italic leading-tight">"{a.b}"</p>
                                    </div>
                                ))}
                            </div>
                        )}
                    </main>

                    <nav className="fixed bottom-0 left-0 right-0 h-24 bg-slate-950 border-t border-white/10 flex justify-around items-center px-2 z-[60] backdrop-blur-xl">
                        {['Dash', 'Moral', 'Learn', 'Tree', 'Task', 'Mind'].map((t) => (
                            <button key={t} onClick={() => setTab(t.toLowerCase() === 'dash' ? 'dashboard' : t.toLowerCase())} 
                                    className={`flex-1 h-full font-black text-[10px] uppercase ${tab.includes(t.toLowerCase()) || (t === 'Dash' && tab === 'dashboard') ? 'tab-active' : 'text-slate-600'}`}>{t}</button>
                        ))}
                    </nav>
                </div>
            );
        }
        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
