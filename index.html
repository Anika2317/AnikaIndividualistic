<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>K-Score App</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>
<body class="bg-slate-950 text-white min-h-screen flex items-center justify-center">
    <div id="root"></div>

    <script type="text/babel">
        function App() {
            return (
                <div className="text-center p-10 bg-slate-900 border border-cyan-500/30 rounded-3xl shadow-2xl">
                    <h1 className="text-cyan-400 text-5xl font-black mb-4">K-SCORE</h1>
                    <p className="text-gray-400 uppercase tracking-widest">System Active</p>
                    <div className="mt-6 p-4 bg-slate-800 rounded-xl">
                        <p className="text-2xl">Current Score: <span className="text-cyan-300">527</span></p>
                    </div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
