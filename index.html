<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>K-SCORE | Neural OS</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;800&display=swap');
        body { background: #020617; font-family: 'Plus Jakarta Sans', sans-serif; color: white; margin: 0; padding: 0; overflow: hidden; }
        .glass { background: rgba(15, 23, 42, 0.85); backdrop-filter: blur(20px); border: 1px solid rgba(255,255,255,0.1); }
        .mandala-rotate { animation: rotate 100s linear infinite; }
        @keyframes rotate { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
        .tab-active { color: #22d3ee !important; filter: drop-shadow(0 0 8px #22d3ee); border-top: 2px solid #22d3ee; }
        .view-container { height: calc(100vh - 160px); overflow-y: auto; -webkit-overflow-scrolling: touch; }
        .btn-press:active { transform: scale(0.95); opacity: 0.8; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState } = React;

        const SKILL_DATA = {
            logic: { title: "Strategic Logic", color: "text-cyan-400", summary: "First Principles thinking. Deconstructing reality to find objective truth.", sub: "Socratic Inquiry" },
            empathy: { title: "Radical Empathy", color: "text-pink-400", summary: "Cognitive mapping of others' internal worlds.", sub: "Shadow Work" },
            discipline: { title: "Iron Discipline", color: "text-orange-400", summary: "Subordinating impulse to the long-term strategic self.", sub: "Dopamine Control" },
            regulation: { title: "Regulation", color: "text-blue-400", summary: "The buffer zone between stimulus and response.", sub: "Stoic Breath" },
            integrity: { title: "Total Integrity", color: "text-green-400", summary: "Absolute alignment of values, words, and actions.", sub: "Radical Honesty" }
        };

        function App() {
            const [tab, setTab] = useState('dashboard');
            const [activeSkill, setActiveSkill] = useState(null);
            const [activeLesson, setActiveLesson] = useState(null);
            const [stats, setStats] = useState({ kScore: 527, xp: 420, level: 1, streak: 12 });
            const [completedLessons, setCompletedLessons] = useState([]);

            const addXP = (amt, id) => {
                if (id && completedLessons.includes(id)) return;
                setStats(s => ({...s, xp: s.xp + amt, kScore: s.kScore + Math.floor(amt/5)}));
                if (id) setCompletedLessons([...completedLessons, id]);
                setActiveLesson(null);
            };

            return (
                <div className="max-w-md mx-auto h-screen flex flex-col relative bg-slate-950">
                    
                    {/* SKILL DOSSIER OVERLAY */}
                    {activeSkill && (
                        <div className="fixed inset-0 z-[100] bg-slate-950/95 backdrop-blur-md flex items-center justify-center p-6">
                            <div className="glass p-8 rounded-[3rem] border border-cyan-500/30 w-full text-center shadow-2xl">
                                <h3 className={`text-3xl font-800 ${activeSkill.color} mb-4`}>{activeSkill.title}</h3>
                                <p className="text-slate-300 italic mb-6 leading-relaxed">"{activeSkill.summary}"</p>
                                <p className="text-[10px] font-black uppercase text-slate-500 tracking-[0.3em] mb-8">NEXUS: {activeSkill.sub}</p>
                                <button onClick={() => setActiveSkill(null)} className="w-full py-4 bg-slate-800 rounded-2xl font-black uppercase text-xs tracking-widest btn-press">Close Dossier</button>
                            </div>
                        </div>
                    )}

                    {/* LESSON STUDY OVERLAY */}
                    {activeLesson && (
                        <div className="fixed inset-0 z-[100] bg-slate-950 p-8 flex flex-col overflow-y-auto">
                            <button onClick={() => setActiveLesson(null)} className="mb-8 text-slate-500 font-bold uppercase text-xs tracking-widest flex items-center gap-2">← Back to Learn</button>
                            <h2 className="text-4xl font-800 mb-6 leading-tight">{activeLesson.title}</h2>
                            <div className="glass p-8 rounded-[2.5rem] text-lg leading-relaxed text-slate-200 border-l-4 border-cyan-500 mb-10 italic">
                                "{activeLesson.body}"
                            </div>
                            <button onClick={() => addXP(activeLesson.xp, activeLesson.id)} className="w-full py-5 bg-cyan-500 text-slate-950 rounded-2xl font-black text-xl shadow-lg btn-press">
                                {completedLessons.includes(activeLesson.id) ? 'ALREADY MASTERED' : `COMPLETE +${activeLesson.xp} XP`}
                            </button>
                        </div>
                    )}

                    {/* HEADER */}
                    <header className="p-6 flex justify-between items-center bg-slate-950 border-b border-white/5 z-50">
                        <span className="font-black italic text-cyan-400 tracking-tighter text-xl">K-SCORE OS</span>
                        <div className="flex gap-2">
                            <div className="glass px-3 py-1 rounded-full text-[10px] font-bold text-amber-400">⚡ {stats.kScore}</div>
                            <div className="bg-cyan-500 px-3 py-1 rounded-full text-[10px] font-black text-slate-900 uppercase">LVL {stats.level}</div>
                        </div>
                    </header>

                    <main className="view-container">
                        {tab === 'dashboard' && (
                            <div className="p-6 space-y-6">
                                <div className="glass p-10 rounded-[3rem] text-center border-b-4 border-cyan-500/20">
                                    <h1 className="text-5xl font-800 italic uppercase mb-2">ANIKA</h1>
                                    <p className="text-cyan-400 font-bold text-[10px] tracking-[0.4em] mb-6">{stats.streak} DAY STREAK</p>
                                    <div className="h-1.5 w-full bg-slate-900 rounded-full overflow-hidden">
                                        <div className="h-full bg-cyan-400" style={{width: '45%'}}></div>
                                    </div>
                                </div>
                                <div className="glass p-6 rounded-3xl">
                                    <p className="text-xs font-black uppercase text-slate-500 mb-2">Daily Directive</p>
                                    <p className="font-bold text-lg leading-tight">Master 3 Philosophy modules to unlock Level 2.</p>
                                </div>
                            </div>
                        )}

                        {tab === 'tree' && (
                            <div className="h-full w-full flex items-center justify-center relative pt-10">
                                <div className="absolute mandala-rotate w-80 h-80 border border-white/5 rounded-full"></div>
                                <div className="z-10 w-24 h-24 glass rounded-full flex flex-col items-center justify-center border-2 border-cyan-500 shadow-2xl">
                                    <span className="text-xl font-800 italic uppercase">CORE</span>
                                </div>
                                {Object.entries(SKILL_DATA).map(([key, data], i) => {
                                    const angle = (i * 72) * (Math.PI / 180);
                                    const x = Math.cos(angle) * 135;
                                    const y = Math.sin(angle) * 135;
                                    return (
                                        <div key={key} onClick={() => setActiveSkill(data)}
                                             style={{ transform: `translate(${x}px, ${y}px)` }}
                                             className="absolute glass w-16 h-16 rounded-2xl flex items-center justify-center cursor-pointer border border-white/10 hover:border-cyan-400 shadow-xl transition-all btn-press">
                                            <span className={`text-xl font-black ${data.color}`}>{key[0].toUpperCase()}</span>
                                        </div>
                                    );
                                })}
                            </div>
                        )}

                        {tab === 'lessons' && (
                            <div className="p-6 space-y-4">
                                <h2 className="text-2xl font-800 mb-6">Learning Path</h2>
                                {[
                                    { id: 1, title: 'The Control Dichotomy', xp: 150, body: 'We only control our thoughts and actions. Everything else is external noise.' },
                                    { id: 2, title: 'Jungian Shadow Integration', xp: 200, body: 'You must face the parts of yourself you have hidden to become a whole individual.' },
                                    { id: 3, title: 'First Principles Logic', xp: 180, body: 'Break every problem down into its fundamental truths and build from there.' }
                                ].map(l => (
                                    <div key={l.id} onClick={() => setActiveLesson(l)} className="glass p-6 rounded-3xl border-l-4 border-cyan-500 flex justify-between items-center btn-press">
                                        <div><h4 className="font-bold text-lg">{l.title}</h4><p className="text-xs text-slate-500 tracking-widest uppercase mt-1">+{l.xp} XP</p></div>
                                        {completedLessons.includes(l.id) && <span className="text-green-500 font-black">✓</span>}
                                    </div>
                                ))}
                            </div>
                        )}

                        {tab === 'challenges' && (
                            <div className="p-6 space-y-4">
                                <h2 className="text-2xl font-800 text-green-400">Daily Task</h2>
                                <div className="glass p-8 rounded-3xl text-center">
                                    <p className="font-bold text-slate-200 leading-relaxed mb-8 italic">"Log 10 minutes of disciplined meditation or reflection."</p>
                                    <button onClick={() => addXP(50)} className="w-full py-5 bg-green-500 text-slate-950 rounded-2xl font-black shadow-lg btn-press">LOG COMPLETION +50 XP</button>
                                </div>
                            </div>
                        )}
                    </main>

                    {/* FIXED NAVIGATION */}
                    <nav className="fixed bottom-0 left-0 right-0 max-w-md mx-auto h-24 bg-slate-950 border-t border-white/10 flex justify-around items-center px-2 z-[60]">
                        <button onClick={() => setTab('dashboard')} className={`flex flex-col items-center flex-1 h-full justify-center ${tab === 'dashboard' ? 'tab-active' : 'text-slate-600'}`}><span className="text-[9px] font-black uppercase">Dash</span></button>
                        <button onClick={() => setTab('dilemmas')} className={`flex flex-col items-center flex-1 h-full justify-center ${tab === 'dilemmas' ? 'tab-active' : 'text-slate-600'}`}><span className="text-[9px] font-black uppercase">Moral</span></button>
                        <button onClick={() => setTab('lessons')} className={`flex flex-col items-center flex-1 h-full justify-center ${tab === 'lessons' ? 'tab-active' : 'text-slate-600'}`}><span className="text-[9px] font-black uppercase">Learn</span></button>
                        <button onClick={() => setTab('tree')} className={`flex flex-col items-center flex-1 h-full justify-center ${tab === 'tree' ? 'tab-active' : 'text-slate-600'}`}><span className="text-[9px] font-black uppercase">Tree</span></button>
                        <button onClick={() => setTab('challenges')} className={`flex flex-col items-center flex-1 h-full justify-center ${tab === 'challenges' ? 'tab-active' : 'text-slate-600'}`}><span className="text-[9px] font-black uppercase">Task</span></button>
                        <button onClick={() => setTab('mind')} className={`flex flex-col items-center flex-1 h-full justify-center ${tab === 'mind' ? 'tab-active' : 'text-slate-600'}`}><span className="text-[9px] font-black uppercase">Mind</span></button>
                    </nav>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
