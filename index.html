<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>K-SCORE | Deep Evolution</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap');
        body { background: #020617; font-family: 'Plus Jakarta Sans', sans-serif; color: white; }
        .glass { background: rgba(15, 23, 42, 0.75); backdrop-filter: blur(16px); border: 1px solid rgba(255,255,255,0.1); }
        .interactive-card { transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1); }
        .interactive-card:active { transform: scale(0.98); }
        .neon-border { box-shadow: 0 0 15px rgba(34, 211, 238, 0.2); border: 1px solid rgba(34, 211, 238, 0.5); }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        const Icon = ({ name, className }) => {
            useEffect(() => { lucide.createIcons(); }, [name]);
            return <i data-lucide={name.toLowerCase().replace(/([a-z0-9])([A-Z])/g, '$1-$2')} className={className}></i>;
        };

        const LESSONS = [
            { id: 'l1', cat: 'Stoicism', title: 'The Inner Citadel', author: 'Marcus Aurelius', body: 'The mind is its own place, and in itself can make a heaven of hell, a hell of heaven. Your citadel is the only thing the world cannot take.', xp: 200 },
            { id: 'l2', cat: 'Existentialism', title: 'The Absurd', author: 'Albert Camus', body: 'The struggle itself toward the heights is enough to fill a man\'s heart. One must imagine Sisyphus happy.', xp: 250 },
            { id: 'l3', cat: 'Ethics', title: 'The Experience Machine', author: 'Robert Nozick', body: 'If there were a machine that could give you any experience you desired, would you plug in? Nozick argues we want to do certain things, not just have the experience of doing them.', xp: 300 }
        ];

        const DILEMMAS = [
            { 
                id: 'd1', 
                title: 'The Hospital Choice', 
                scenario: 'A surgeon has five patients who need organ transplants to live. A healthy traveler with no family comes in for a check-up. The surgeon could harvest the traveler’s organs to save the five. What is the right move?',
                options: [
                    { text: 'Save the 5 (Utilitarian)', feedback: 'You prioritized the "Greatest Good." This follows Jeremy Bentham’s logic that math defines morality.', xp: 150 },
                    { text: 'Protect the 1 (Deontology)', feedback: 'You prioritized individual rights. This follows Kant’s logic that humans are never a "means to an end."', xp: 150 }
                ]
            },
            {
                id: 'd2',
                title: 'The Heinz Dilemma',
                scenario: 'A man’s wife is dying. A druggist is charging 10x the cost for the only medicine that can save her. The man cannot afford it. Should he steal it?',
                options: [
                    { text: 'Steal it (Love/Justice)', feedback: 'You value the "Right to Life" over the "Right to Property."', xp: 200 },
                    { text: 'Obey Law (Order)', feedback: 'You value the "Social Contract" and the rule of law to prevent chaos.', xp: 200 }
                ]
            }
        ];

        function App() {
            const [tab, setTab] = useState('home');
            const [activeView, setActiveView] = useState(null); // { type, data, step }
            const [stats, setStats] = useState({ kScore: 0, level: 1, xp: 0 });
            const [completed, setCompleted] = useState([]);

            const handleAction = (xpGain) => {
                if (!completed.includes(activeView.data.id)) {
                    setStats(prev => {
                        const newXp = prev.xp + xpGain;
                        return { 
                            ...prev, 
                            xp: newXp, 
                            level: Math.floor(newXp / 500) + 1,
                            kScore: prev.kScore + Math.floor(xpGain / 10)
                        };
                    });
                    setCompleted([...completed, activeView.data.id]);
                }
            };

            const renderView = () => {
                if (activeView?.type === 'lesson') {
                    return (
                        <div className="fixed inset-0 z-[100] bg-slate-950 p-8 flex flex-col">
                            <button onClick={() => setActiveView(null)} className="mb-6 text-slate-500"><Icon name="ArrowLeft" /></button>
                            <div className="flex-1">
                                <span className="text-cyan-400 font-bold text-xs tracking-widest uppercase">{activeView.data.cat}</span>
                                <h2 className="text-4xl font-800 my-4 leading-tight">{activeView.data.title}</h2>
                                <p className="text-xl text-slate-300 glass p-6 rounded-3xl border-l-4 border-cyan-500 italic">"{activeView.data.body}"</p>
                            </div>
                            <button 
                                onClick={() => { handleAction(activeView.data.xp); setActiveView(null); }}
                                className={`w-full py-5 rounded-2xl font-black text-xl ${completed.includes(activeView.data.id) ? 'bg-slate-800 text-slate-500' : 'bg-cyan-500 text-slate-950'}`}
                            >
                                {completed.includes(activeView.data.id) ? 'ARCHIVED' : `EVOLVE +${activeView.data.xp} XP`}
                            </button>
                        </div>
                    );
                }

                if (activeView?.type === 'dilemma') {
                    const d = activeView.data;
                    return (
                        <div className="fixed inset-0 z-[100] bg-slate-950 p-8 flex flex-col">
                            <button onClick={() => setActiveView(null)} className="mb-6 text-slate-500"><Icon name="X" /></button>
                            <div className="flex-1">
                                <h2 className="text-3xl font-800 mb-6 text-amber-400">{d.title}</h2>
                                {activeView.step === 'choice' ? (
                                    <>
                                        <p className="text-2xl text-slate-200 mb-10 leading-relaxed">{d.scenario}</p>
                                        <div className="space-y-4">
                                            {d.options.map((opt, i) => (
                                                <button key={i} onClick={() => setActiveView({...activeView, step: 'result', choice: opt})} 
                                                    className="w-full p-5 glass rounded-2xl border-2 border-slate-700 font-bold hover:border-amber-400 text-left flex justify-between items-center">
                                                    {opt.text} <Icon name="ChevronRight" className="w-4 h-4" />
                                                </button>
                                            ))}
                                        </div>
                                    </>
                                ) : (
                                    <div className="animate-in fade-in duration-500">
                                        <h3 className="text-cyan-400 font-black text-sm uppercase mb-4 tracking-widest underline decoration-cyan-500/50 underline-offset-8">The Philosophy</h3>
                                        <p className="text-2xl text-slate-200 mb-10 leading-relaxed">{activeView.choice.feedback}</p>
                                        <button onClick={() => { handleAction(activeView.choice.xp); setActiveView(null); }} 
                                            className="w-full py-5 bg-amber-500 text-slate-950 rounded-2xl font-black text-xl">
                                            INTEGRATE INSIGHT
                                        </button>
                                    </div>
                                )}
                            </div>
                        </div>
                    );
                }

                switch(tab) {
                    case 'home': return (
                        <div className="p-6 space-y-6">
                            <div className="glass p-8 rounded-[2.5rem] text-center border-b-4 border-cyan-500/30">
                                <div className="w-20 h-20 bg-cyan-500/10 rounded-full mx-auto mb-4 flex items-center justify-center">
                                    <Icon name="Cpu" className="w-10 h-10 text-cyan-400" />
                                </div>
                                <h1 className="text-4xl font-800 italic uppercase">Anika</h1>
                                <p className="text-cyan-400 font-bold text-xs tracking-[0.3em] mt-2">LEVEL {stats.level} ANALYST</p>
                                <div className="mt-8 h-2 w-full bg-slate-800 rounded-full overflow-hidden">
                                    <div className="h-full bg-cyan-400 shadow-[0_0_10px_#22d3ee]" style={{width: `${(stats.xp % 500) / 5}%`}}></div>
                                </div>
                                <p className="text-[10px] text-slate-500 font-black mt-2 uppercase tracking-tighter">Next Level: {500 - (stats.xp % 500)} XP Required</p>
                            </div>
                            <div className="grid grid-cols-2 gap-4">
                                <div className="glass p-5 rounded-3xl text-center"><p className="text-[10px] text-slate-500 font-bold uppercase mb-1">XP</p><p className="text-2xl font-black text-cyan-400">{stats.xp}</p></div>
                                <div className="glass p-5 rounded-3xl text-center"><p className="text-[10px] text-slate-500 font-bold uppercase mb-1">Score</p><p className="text-2xl font-black text-amber-400">{stats.kScore}</p></div>
                            </div>
                        </div>
                    );
                    case 'lessons': return (
                        <div className="p-6 space-y-4">
                            <h2 className="text-2xl font-800 mb-6">Neural Pathways</h2>
                            {LESSONS.map(l => (
                                <div key={l.id} onClick={() => setActiveView({type: 'lesson', data: l})} 
                                    className={`glass p-5 rounded-2xl border-l-4 border-cyan-500 interactive-card cursor-pointer flex justify-between items-center ${completed.includes(l.id) ? 'opacity-40 grayscale' : ''}`}>
                                    <div><p className="text-[10px] text-cyan-500 font-bold uppercase mb-1">{l.cat}</p><h3 className="font-bold text-lg">{l.title}</h3></div>
                                    <Icon name={completed.includes(l.id) ? "CheckCircle" : "ChevronRight"} className={completed.includes(l.id) ? "text-green-500" : "text-slate-700"} />
                                </div>
                            ))}
                        </div>
                    );
                    case 'dilemmas': return (
                        <div className="p-6 space-y-4">
                            <h2 className="text-2xl font-800 mb-6 text-amber-400">Moral Scenarios</h2>
                            {DILEMMAS.map(d => (
                                <div key={d.id} onClick={() => setActiveView({type: 'dilemma', data: d, step: 'choice'})} 
                                    className={`glass p-6 rounded-3xl border-l-4 border-amber-500 interactive-card cursor-pointer ${completed.includes(d.id) ? 'opacity-40 grayscale' : ''}`}>
                                    <h3 className="font-bold text-xl">{d.title}</h3>
                                    <p className="text-sm text-slate-500 mt-2">Requires logical intervention...</p>
                                </div>
                            ))}
                        </div>
                    );
                    case 'affirmations': return (
                        <div className="p-6 space-y-6">
                            <h2 className="text-2xl font-800 mb-6">Mental Resets</h2>
                            {["I am the architect of my internal state.", "Discomfort is the indicator of growth.", "Logic over impulse, meaning over mood."].map((a, i) => (
                                <div key={i} className="glass p-8 rounded-3xl text-xl font-bold italic text-slate-200 border border-white/5">"{a}"</div>
                            ))}
                        </div>
                    );
                    case 'insights': return (
                        <div className="p-6 space-y-4">
                            <h2 className="text-2xl font-800 mb-6 text-purple-400">Deep Poetry</h2>
                            <div className="glass p-6 rounded-3xl border-l-4 border-purple-500">
                                <h3 className="font-bold text-xl italic">The Guest House</h3>
                                <p className="text-slate-500 text-sm mt-1">Rumi</p>
                            </div>
                        </div>
                    );
                }
            };

            return (
                <div className="max-w-md mx-auto min-h-screen pb-32">
                    <header className="p-6 flex justify-between items-center sticky top-0 bg-slate-950/80 backdrop-blur-md z-40 border-b border-white/5">
                        <span className="font-black tracking-tighter text-xl text-cyan-400">K-SCORE</span>
                        <div className="flex items-center gap-1 text-amber-400 font-black"><Icon name="Zap" className="w-4 h-4" /> {stats.kScore}</div>
                    </header>

                    <div className="animate-in fade-in slide-in-from-bottom-4 duration-500">
                        {renderView()}
                    </div>

                    <nav className="fixed bottom-0 left-0 right-0 max-w-md mx-auto h-24 bg-slate-950 border-t border-white/5 flex justify-around items-center px-4 z-50">
                        <button onClick={() => setTab('lessons')} className={`flex flex-col items-center ${tab === 'lessons' ? 'text-cyan-400' : 'text-slate-600'}`}><Icon name="Book" /><span className="text-[10px] font-bold mt-1 uppercase tracking-tighter">Learn</span></button>
                        <button onClick={() => setTab('dilemmas')} className={`flex flex-col items-center ${tab === 'dilemmas' ? 'text-cyan-400' : 'text-slate-600'}`}><Icon name="Scale" /><span className="text-[10px] font-bold mt-1 uppercase tracking-tighter">Moral</span></button>
                        <button onClick={() => setTab('home')} className={`-mt-10 bg-white p-4 rounded-full shadow-[0_0_20px_rgba(255,255,255,0.2)] ${tab === 'home' ? 'scale-110' : ''}`}><Icon name="Home" className="text-slate-950" /></button>
                        <button onClick={() => setTab('affirmations')} className={`flex flex-col items-center ${tab === 'affirmations' ? 'text-cyan-400' : 'text-slate-600'}`}><Icon name="Heart" /><span className="text-[10px] font-bold mt-1 uppercase tracking-tighter">Mind</span></button>
                        <button onClick={() => setTab('insights')} className={`flex flex-col items-center ${tab === 'insights' ? 'text-cyan-400' : 'text-slate-600'}`}><Icon name="Sparkles" /><span className="text-[10px] font-bold mt-1 uppercase tracking-tighter">Insight</span></button>
                    </nav>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
