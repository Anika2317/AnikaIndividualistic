<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>K-SCORE | Neural Evolution</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap');
        body { background: #020617; font-family: 'Plus Jakarta Sans', sans-serif; color: white; }
        .glass { background: rgba(15, 23, 42, 0.8); backdrop-filter: blur(12px); border: 1px solid rgba(255,255,255,0.1); }
        .duo-btn { border-bottom: 4px solid rgba(0,0,0,0.3); transition: all 0.1s; }
        .duo-btn:active { transform: translateY(2px); border-bottom-width: 0px; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        const Icon = ({ name, className }) => {
            useEffect(() => { lucide.createIcons(); }, [name]);
            return <i data-lucide={name.toLowerCase().replace(/([a-z0-9])([A-Z])/g, '$1-$2')} className={className}></i>;
        };

        function App() {
            const [tab, setTab] = useState('front');
            const [activeContent, setActiveContent] = useState(null);
            const [stats, setStats] = useState({ kScore: 527, level: 8, xp: 4200 });

            const finishTask = (xp) => {
                setStats(prev => ({ ...prev, xp: prev.xp + xp, kScore: prev.kScore + 10 }));
                setActiveContent(null);
            };

            const PageWrapper = ({ title, children }) => (
                <div className="p-6 animate-in fade-in slide-in-from-bottom-4 duration-500">
                    <h2 className="text-3xl font-800 mb-6 tracking-tight">{title}</h2>
                    {children}
                </div>
            );

            if (activeContent) {
                return (
                    <div className="fixed inset-0 z-[100] bg-slate-950 p-8 flex flex-col">
                        <button onClick={() => setActiveContent(null)} className="mb-8 text-slate-500"><Icon name="X" /></button>
                        <div className="flex-1 overflow-y-auto">
                            <h2 className="text-4xl font-800 mb-4">{activeContent.title}</h2>
                            <p className="text-slate-400 mb-8 leading-relaxed text-lg">{activeContent.body}</p>
                        </div>
                        <button onClick={() => finishTask(100)} className="w-full py-5 bg-cyan-500 rounded-2xl text-slate-900 font-black text-xl duo-btn">COMPLETE +100 XP</button>
                    </div>
                );
            }

            return (
                <div className="max-w-md mx-auto min-h-screen pb-32">
                    <header className="p-6 flex justify-between items-center sticky top-0 bg-slate-950/80 backdrop-blur-md z-50">
                        <span className="font-black tracking-tighter text-xl text-cyan-400">K-SCORE</span>
                        <div className="flex items-center gap-2 bg-slate-900 px-3 py-1 rounded-full border border-white/10">
                            <Icon name="Zap" className="w-4 h-4 text-amber-400" />
                            <span className="font-bold text-sm">{stats.kScore}</span>
                        </div>
                    </header>

                    {tab === 'front' && (
                        <div className="p-10 text-center space-y-8">
                            <div className="w-32 h-32 bg-gradient-to-tr from-cyan-600 to-blue-400 rounded-full mx-auto flex items-center justify-center shadow-[0_0_50px_rgba(6,182,212,0.3)]">
                                <Icon name="User" className="w-16 h-16 text-slate-950" />
                            </div>
                            <div>
                                <h1 className="text-4xl font-black mb-2 uppercase italic">Anika Seksaria</h1>
                                <p className="text-cyan-500 font-bold tracking-widest text-xs">LEVEL {stats.level} EVOLVED</p>
                            </div>
                            <button onClick={() => setTab('lessons')} className="w-full py-5 bg-white text-slate-950 rounded-2xl font-black text-xl duo-btn">RESUME PATHWAY</button>
                        </div>
                    )}

                    {tab === 'lessons' && (
                        <PageWrapper title="Lessons">
                            <div onClick={() => setActiveContent({title: 'Stoic Calm', body: 'Marcus Aurelius writes that the universe is change; life is what our thoughts make it.'})} className="glass p-6 rounded-3xl mb-4 border-l-4 border-cyan-500 cursor-pointer">
                                <h3 className="font-bold text-xl">The Meditations</h3>
                                <p className="text-slate-400 text-sm">Marcus Aurelius</p>
                            </div>
                        </PageWrapper>
                    )}

                    {tab === 'dilemmas' && (
                        <PageWrapper title="Dilemmas">
                            <div onClick={() => setActiveContent({title: 'The Train', body: 'One person or five? The classic trolley problem.'})} className="glass p-6 rounded-3xl mb-4 border-l-4 border-amber-500 cursor-pointer">
                                <h3 className="font-bold text-xl">Trolley Problem</h3>
                                <p className="text-slate-400 text-sm">Ethical Conflict</p>
                            </div>
                        </PageWrapper>
                    )}

                    {tab === 'affirmations' && (
                        <PageWrapper title="Affirmations">
                            <div className="h-[40vh] flex items-center justify-center text-center italic text-2xl text-slate-300 px-4">
                                "I am the architect of my own internal state."
                            </div>
                        </PageWrapper>
                    )}

                    {tab === 'insights' && (
                        <PageWrapper title="Insights">
                            <div className="glass p-6 rounded-3xl mb-4">
                                <p className="text-cyan-400 text-xs font-bold mb-2">POETRY</p>
                                <h3 className="font-bold text-xl italic">"Invictus"</h3>
                                <p className="text-slate-400 text-sm mt-2">I am the master of my fate...</p>
                            </div>
                        </PageWrapper>
                    )}

                    {tab === 'stats' && (
                        <PageWrapper title="Stats">
                            <div className="grid grid-cols-2 gap-4">
                                <div className="glass p-8 rounded-3xl text-center">
                                    <p className="text-slate-500 text-xs font-bold uppercase mb-2">Level</p>
                                    <p className="text-4xl font-black text-purple-500">{stats.level}</p>
                                </div>
                                <div className="glass p-8 rounded-3xl text-center">
                                    <p className="text-slate-500 text-xs font-bold uppercase mb-2">XP</p>
                                    <p className="text-4xl font-black text-cyan-500">{stats.xp}</p>
                                </div>
                            </div>
                        </PageWrapper>
                    )}

                    <nav className="fixed bottom-0 left-0 right-0 max-w-md mx-auto h-24 glass border-t border-white/10 flex justify-around items-center px-4 z-50">
                        <button onClick={() => setTab('lessons')} className={`flex flex-col items-center ${tab === 'lessons' ? 'text-cyan-400' : 'text-slate-500'}`}><Icon name="Book" /><span className="text-[10px] font-bold mt-1">LEARN</span></button>
                        <button onClick={() => setTab('dilemmas')} className={`flex flex-col items-center ${tab === 'dilemmas' ? 'text-cyan-400' : 'text-slate-500'}`}><Icon name="Scale" /><span className="text-[10px] font-bold mt-1">MORAL</span></button>
                        <button onClick={() => setTab('front')} className={`-mt-10 bg-white p-4 rounded-full shadow-xl ${tab === 'front' ? 'scale-110' : ''}`}><Icon name="Home" className="text-slate-950" /></button>
                        <button onClick={() => setTab('affirmations')} className={`flex flex-col items-center ${tab === 'affirmations' ? 'text-cyan-400' : 'text-slate-500'}`}><Icon name="Zap" /><span className="text-[10px] font-bold mt-1">MIND</span></button>
                        <button onClick={() => setTab('stats')} className={`flex flex-col items-center ${tab === 'stats' ? 'text-cyan-400' : 'text-slate-500'}`}><Icon name="BarChart" /><span className="text-[10px] font-bold mt-1">STATS</span></button>
                    </nav>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
