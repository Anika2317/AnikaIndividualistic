<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>K-SCORE | Neural OS</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;800&display=swap');
        body { background: #020617; font-family: 'Plus Jakarta Sans', sans-serif; color: white; overflow-x: hidden; }
        .glass { background: rgba(15, 23, 42, 0.7); backdrop-filter: blur(20px); border: 1px solid rgba(255,255,255,0.1); }
        .mandala-rotate { animation: rotate 60s linear infinite; }
        @keyframes rotate { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
        .node-pulse { animation: pulse 2s infinite; }
        @keyframes pulse { 0% { box-shadow: 0 0 0 0 rgba(34, 211, 238, 0.4); } 70% { box-shadow: 0 0 0 15px rgba(34, 211, 238, 0); } 100% { box-shadow: 0 0 0 0 rgba(34, 211, 238, 0); } }
        .tab-active { color: #22d3ee; filter: drop-shadow(0 0 8px #22d3ee); }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        const Icon = ({ name, className }) => {
            useEffect(() => { lucide.createIcons(); }, [name]);
            return <i data-lucide={name.toLowerCase().replace(/([a-z0-9])([A-Z])/g, '$1-$2')} className={className}></i>;
        };

        const SKILL_DATA = {
            logic: { 
                title: "Strategic Logic", 
                summary: "The ability to deconstruct complex arguments into their base components, removing emotional bias to find objective truth.",
                importance: "Without logic, you are a slave to the rhetoric of others. Mastering this allows you to build reality from first principles.",
                subSkills: ["Socratic Questioning", "First Principles", "Cognitive Bias Detection"]
            },
            empathy: { 
                title: "Radical Empathy", 
                summary: "Not just feeling for others, but cognitively mapping the internal world of an adversary or stranger.",
                importance: "Empathy is a diagnostic tool. It allows you to predict behavior and build high-integrity social bonds.",
                subSkills: ["Active Listening", "Perspective Shifting", "Compassionate Detachment"]
            },
            discipline: { 
                title: "Iron Discipline", 
                summary: "The subordination of the 'instant-gratification' self to the 'long-term' strategic self.",
                importance: "Discipline is the only bridge between a thought and a result. It is the core of personal agency.",
                subSkills: ["Dopamine Management", "Atomic Habits", "Pain Tolerance"]
            },
            regulation: { 
                title: "Emotional Regulation", 
                summary: "Creating a 'buffer zone' between a stimulus and your response.",
                importance: "If you cannot control your internal state, the external world will control you via your triggers.",
                subSkills: ["Stoic Breathwork", "Metacognition", "Response Inhibition"]
            },
            integrity: { 
                title: "Total Integrity", 
                summary: "Alignment between internal values, spoken words, and physical actions.",
                importance: "Integrity creates a unified self. It removes the 'leakage' of guilt and double-mindedness.",
                subSkills: ["Value Auditing", "Radical Honesty", "Ethical Consistency"]
            }
        };

        function App() {
            const [tab, setTab] = useState('tree');
            const [activeSkill, setActiveSkill] = useState(null);
            const [stats] = useState({ kScore: 527, streak: 12, level: 1 });

            const SkillModal = () => (
                <div className={`fixed inset-0 z-[100] glass flex items-center justify-center p-6 transition-all ${activeSkill ? 'opacity-100' : 'opacity-0 pointer-events-none'}`}>
                    <div className="bg-slate-950 w-full max-w-sm rounded-[3rem] p-8 border border-cyan-500/30 relative shadow-2xl">
                        <button onClick={() => setActiveSkill(null)} className="absolute top-6 right-6 text-slate-500"><Icon name="X" /></button>
                        {activeSkill && (
                            <div className="space-y-6">
                                <h2 className="text-3xl font-800 text-cyan-400">{activeSkill.title}</h2>
                                <div>
                                    <p className="text-[10px] font-black uppercase tracking-widest text-slate-500 mb-2">The Definition</p>
                                    <p className="text-slate-300 leading-relaxed italic">"{activeSkill.summary}"</p>
                                </div>
                                <div>
                                    <p className="text-[10px] font-black uppercase tracking-widest text-slate-500 mb-2">Why it Matters</p>
                                    <p className="text-slate-300 leading-relaxed">{activeSkill.importance}</p>
                                </div>
                                <div className="flex flex-wrap gap-2 pt-4">
                                    {activeSkill.subSkills.map(s => (
                                        <span key={s} className="px-3 py-1 bg-cyan-500/10 border border-cyan-500/20 rounded-full text-[10px] font-bold text-cyan-400 uppercase tracking-tighter">{s}</span>
                                    ))}
                                </div>
                                <button className="w-full py-4 bg-cyan-500 text-slate-950 rounded-2xl font-black mt-6 shadow-lg shadow-cyan-500/20">START TRAINING</button>
                            </div>
                        )}
                    </div>
                </div>
            );

            const renderTree = () => (
                <div className="relative h-[500px] w-full flex items-center justify-center">
                    {/* Background Ring */}
                    <div className="absolute w-80 h-80 border border-white/5 rounded-full mandala-rotate"></div>
                    <div className="absolute w-[400px] h-[400px] border border-cyan-500/5 rounded-full"></div>

                    {/* Core Hub */}
                    <div className="relative z-10 w-24 h-24 glass rounded-full flex flex-col items-center justify-center border-2 border-cyan-400/50 node-pulse">
                        <span className="text-[10px] font-black uppercase tracking-tighter text-slate-500">Core</span>
                        <span className="text-xl font-800 italic">ANIKA</span>
                    </div>

                    {/* Nodes Map */}
                    {Object.entries(SKILL_DATA).map(([key, data], i) => {
                        const angle = (i * 72) * (Math.PI / 180);
                        const x = Math.cos(angle) * 130;
                        const y = Math.sin(angle) * 130;
                        
                        return (
                            <div key={key} 
                                 onClick={() => setActiveSkill(data)}
                                 style={{ transform: `translate(${x}px, ${y}px)` }}
                                 className="absolute group cursor-pointer flex flex-col items-center">
                                <div className="w-14 h-14 rounded-2xl glass border border-white/10 group-hover:border-cyan-400 flex items-center justify-center transition-all group-hover:scale-110">
                                    <Icon name={key === 'logic' ? 'cpu' : key === 'empathy' ? 'heart' : key === 'discipline' ? 'shield' : key === 'regulation' ? 'wind' : 'anchor'} className="w-6 h-6 text-cyan-400" />
                                </div>
                                <span className="absolute -bottom-6 text-[8px] font-black uppercase tracking-widest whitespace-nowrap opacity-50 group-hover:opacity-100">{data.title}</span>
                                
                                {/* Outer Sub-Skills */}
                                {data.subSkills.map((sub, j) => {
                                    const subAngle = (i * 72 + (j - 1) * 20) * (Math.PI / 180);
                                    const sx = Math.cos(subAngle) * 60;
                                    const sy = Math.sin(subAngle) * 60;
                                    return (
                                        <div key={j} style={{ transform: `translate(${sx}px, ${sy}px)` }} className="absolute w-2 h-2 bg-slate-700 rounded-full"></div>
                                    );
                                })}
                            </div>
                        );
                    })}
                </div>
            );

            return (
                <div className="max-w-md mx-auto min-h-screen pb-32">
                    <SkillModal />
                    <header className="p-6 flex justify-between items-center border-b border-white/5 bg-slate-950/80 backdrop-blur-md sticky top-0 z-50">
                        <h1 className="text-xl font-black italic tracking-tighter text-cyan-400">K-SCORE OS</h1>
                        <div className="flex items-center gap-3">
                            <div className="glass px-3 py-1 rounded-full flex items-center gap-2">
                                <Icon name="Zap" className="w-3 h-3 text-amber-400" />
                                <span className="text-[10px] font-black">{stats.kScore}</span>
                            </div>
                            <div className="bg-cyan-500 px-3 py-1 rounded-full text-[10px] font-black text-slate-950">LVL {stats.level}</div>
                        </div>
                    </header>

                    <main className="p-6">
                        {tab === 'tree' ? (
                            <div className="space-y-6">
                                <div className="text-center">
                                    <h2 className="text-2xl font-800 mb-1">Neural Mandala</h2>
                                    <p className="text-xs text-slate-500 font-bold uppercase tracking-[0.2em]">Select a node to deconstruct</p>
                                </div>
                                {renderTree()}
                            </div>
                        ) : (
                            <div className="h-[60vh] flex flex-col items-center justify-center text-slate-600 space-y-4">
                                <Icon name="Construction" className="w-12 h-12" />
                                <p className="font-black uppercase tracking-widest text-xs">Loading Deep Archives...</p>
                                <p className="text-[10px] italic">25 lessons per tab currently initializing</p>
                            </div>
                        )}
                    </main>

                    <nav className="fixed bottom-0 left-0 right-0 max-w-md mx-auto h-24 glass border-t border-white/10 flex justify-around items-center px-4 z-[90]">
                        <button onClick={() => setTab('dashboard')} className={`flex flex-col items-center ${tab === 'dashboard' ? 'tab-active' : 'text-slate-600'}`}><Icon name="Home" className="w-5 h-5" /><span className="text-[7px] font-bold mt-1 uppercase">Dash</span></button>
                        <button onClick={() => setTab('dilemmas')} className={`flex flex-col items-center ${tab === 'dilemmas' ? 'tab-active' : 'text-slate-600'}`}><Icon name="Scale" className="w-5 h-5" /><span className="text-[7px] font-bold mt-1 uppercase">Moral</span></button>
                        <button onClick={() => setTab('lessons')} className={`flex flex-col items-center ${tab === 'lessons' ? 'tab-active' : 'text-slate-600'}`}><Icon name="Book" className="w-5 h-5" /><span className="text-[7px] font-bold mt-1 uppercase">Learn</span></button>
                        <button onClick={() => setTab('tree')} className={`flex flex-col items-center ${tab === 'tree' ? 'tab-active' : 'text-slate-600'}`}><Icon name="GitBranch" className="w-5 h-5" /><span className="text-[7px] font-bold mt-1 uppercase">Tree</span></button>
                        <button onClick={() => setTab('challenges')} className={`flex flex-col items-center ${tab === 'challenges' ? 'tab-active' : 'text-slate-600'}`}><Icon name="Zap" className="w-5 h-5" /><span className="text-[7px] font-bold mt-1 uppercase">Task</span></button>
                        <button onClick={() => setTab('mind')} className={`flex flex-col items-center ${tab === 'mind' ? 'tab-active' : 'text-slate-600'}`}><Icon name="Heart" className="w-5 h-5" /><span className="text-[7px] font-bold mt-1 uppercase">Mind</span></button>
                    </nav>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
