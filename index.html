<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>K-SCORE OS | Level 1</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap');
        body { background: #020617; font-family: 'Plus Jakarta Sans', sans-serif; color: white; overflow-x: hidden; }
        .glass { background: rgba(15, 23, 42, 0.7); backdrop-filter: blur(12px); border: 1px solid rgba(255,255,255,0.1); }
        .skill-node { transition: all 0.3s ease; border: 2px solid rgba(255,255,255,0.1); }
        .active-tab { color: #22d3ee !important; transform: translateY(-2px); }
        .progress-bar { transition: width 1s ease-in-out; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        const Icon = ({ name, className }) => {
            useEffect(() => { lucide.createIcons(); }, [name]);
            return <i data-lucide={name.toLowerCase().replace(/([a-z0-9])([A-Z])/g, '$1-$2')} className={className}></i>;
        };

        function App() {
            const [tab, setTab] = useState('dashboard');
            const [stats, setStats] = useState({ kScore: 527, xp: 420, level: 1, streak: 12, lessonCount: 0 });

            const renderView = () => {
                switch(tab) {
                    case 'dashboard': return (
                        <div className="p-6 space-y-6">
                            <div className="glass p-8 rounded-[2.5rem] text-center border-b-4 border-cyan-500/30">
                                <h1 className="text-4xl font-800 italic uppercase">ANIKA</h1>
                                <p className="text-cyan-400 font-bold text-[10px] tracking-[0.4em] mt-2">K-SCORE SYSTEM ACTIVE</p>
                                <div className="mt-8 flex justify-center gap-4">
                                    <div className="glass px-5 py-3 rounded-2xl">
                                        <p className="text-[10px] text-slate-500 font-bold uppercase">STREAK</p>
                                        <p className="text-xl font-black text-orange-400">{stats.streak}D</p>
                                    </div>
                                    <div className="glass px-5 py-3 rounded-2xl">
                                        <p className="text-[10px] text-slate-500 font-bold uppercase">K-SCORE</p>
                                        <p className="text-xl font-black text-cyan-400">{stats.kScore}</p>
                                    </div>
                                </div>
                            </div>
                            <div className="glass p-6 rounded-3xl border-l-4 border-cyan-500">
                                <h3 className="text-xs font-black uppercase text-cyan-500 mb-2">Today's Focus</h3>
                                <p className="text-lg font-bold">Complete 3 Psychology modules to advance.</p>
                            </div>
                        </div>
                    );
                    case 'dilemmas': return (
                        <div className="p-6 space-y-4">
                            <h2 className="text-2xl font-800 tracking-tight">Ethical Dilemmas</h2>
                            <div className="glass p-6 rounded-3xl border-l-4 border-amber-500">
                                <h3 className="font-bold text-xl">The Hospital Choice</h3>
                                <p className="text-slate-400 text-sm mt-2">Decide between the one and the many.</p>
                            </div>
                        </div>
                    );
                    case 'lessons': return (
                        <div className="p-6 space-y-4">
                            <h2 className="text-2xl font-800">Lessons</h2>
                            <p className="text-xs text-slate-500 font-bold uppercase">{stats.lessonCount}/23 Until Level 2</p>
                            <div className="glass p-5 rounded-2xl border-l-4 border-cyan-500">
                                <h4 className="font-bold text-lg">Introduction to Stoicism</h4>
                                <p className="text-xs text-slate-400 mt-1 italic">Micro-Lesson 1</p>
                            </div>
                        </div>
                    );
                    case 'tree': return (
                        <div className="p-6 space-y-6">
                            <h2 className="text-2xl font-800 tracking-tight text-cyan-400">Skill Tree</h2>
                            <div className="grid grid-cols-1 gap-4">
                                {['Logic', 'Empathy', 'Discipline', 'Regulation', 'Integrity'].map(skill => (
                                    <div key={skill} className="glass p-5 rounded-2xl flex items-center justify-between">
                                        <span className="font-bold uppercase text-xs tracking-widest">{skill}</span>
                                        <div className="h-2 w-32 bg-slate-800 rounded-full overflow-hidden">
                                            <div className="h-full bg-cyan-400 progress-bar" style={{width: '20%'}}></div>
                                        </div>
                                    </div>
                                ))}
                            </div>
                        </div>
                    );
                    case 'challenges': return (
                        <div className="p-6 space-y-4">
                            <h2 className="text-2xl font-800 tracking-tight text-green-400">Daily Challenges</h2>
                            <div className="glass p-6 rounded-3xl border border-green-500/20">
                                <p className="font-bold">Journal for 10 minutes about a moment you lacked integrity this week.</p>
                                <button className="mt-4 w-full py-3 bg-green-500/10 text-green-400 border border-green-500/30 rounded-xl font-black">LOG COMPLETION</button>
                            </div>
                        </div>
                    );
                    case 'mind': return (
                        <div className="p-6 space-y-4">
                            <h2 className="text-2xl font-800 tracking-tight text-pink-400">Affirmations</h2>
                            <div className="glass p-8 rounded-[2rem] text-center italic text-xl text-slate-200">
                                "My internal state is governed by logic, not circumstance."
                            </div>
                        </div>
                    );
                    default: return null;
                }
            };

            return (
                <div className="max-w-md mx-auto min-h-screen pb-32">
                    <header className="p-6 flex justify-between items-center sticky top-0 bg-slate-950/80 backdrop-blur-md z-50 border-b border-white/5">
                        <span className="font-black tracking-tighter text-xl text-cyan-400 italic">K-SCORE OS</span>
                        <div className="bg-slate-900 px-4 py-1 rounded-full text-[10px] font-black uppercase text-cyan-400 border border-cyan-400/20">LVL {stats.level}</div>
                    </header>

                    <div className="animate-in fade-in duration-500">
                        {renderView()}
                    </div>

                    <nav className="fixed bottom-0 left-0 right-0 max-w-md mx-auto h-24 bg-slate-950/90 backdrop-blur-xl border-t border-white/10 flex justify-around items-center px-2 z-50">
                        <button onClick={() => setTab('dashboard')} className={`flex flex-col items-center flex-1 ${tab === 'dashboard' ? 'active-tab' : 'text-slate-600'}`}>
                            <Icon name="Home" className="w-5 h-5" /><span className="text-[7px] font-black mt-1 uppercase">Dash</span>
                        </button>
                        <button onClick={() => setTab('dilemmas')} className={`flex flex-col items-center flex-1 ${tab === 'dilemmas' ? 'active-tab' : 'text-slate-600'}`}>
                            <Icon name="Scale" className="w-5 h-5" /><span className="text-[7px] font-black mt-1 uppercase">Moral</span>
                        </button>
                        <button onClick={() => setTab('lessons')} className={`flex flex-col items-center flex-1 ${tab === 'lessons' ? 'active-tab' : 'text-slate-600'}`}>
                            <Icon name="Book" className="w-5 h-5" /><span className="text-[7px] font-black mt-1 uppercase">Learn</span>
                        </button>
                        <button onClick={() => setTab('tree')} className={`flex flex-col items-center flex-1 ${tab === 'tree' ? 'active-tab' : 'text-slate-600'}`}>
                            <Icon name="GitBranch" className="w-5 h-5" /><span className="text-[7px] font-black mt-1 uppercase">Tree</span>
                        </button>
                        <button onClick={() => setTab('challenges')} className={`flex flex-col items-center flex-1 ${tab === 'challenges' ? 'active-tab' : 'text-slate-600'}`}>
                            <Icon name="Zap" className="w-5 h-5" /><span className="text-[7px] font-black mt-1 uppercase">Task</span>
                        </button>
                        <button onClick={() => setTab('mind')} className={`flex flex-col items-center flex-1 ${tab === 'mind' ? 'active-tab' : 'text-slate-600'}`}>
                            <Icon name="Heart" className="w-5 h-5" /><span className="text-[7px] font-black mt-1 uppercase">Mind</span>
                        </button>
                    </nav>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
