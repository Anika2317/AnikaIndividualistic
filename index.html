<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>K-Score App</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>body { background-color: #020617; }</style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel" src="KScoreApp.jsx"></script>

    <script type="text/babel">
        // This is the "Engine" that starts your app
        const root = ReactDOM.createRoot(document.getElementById('root'));
        
        const checkApp = setInterval(() => {
            // We look for KScoreApp inside the window object
            if (window.KScoreApp) {
                clearInterval(checkApp);
                root.render(<window.KScoreApp />);
                setTimeout(() => {
                    if (window.lucide) window.lucide.createIcons();
                }, 500);
            }
        }, 100);
    </script>
</body>
</html>
