<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>K-SCORE | Neural OS</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;800&display=swap');
        body { background: #020617; font-family: 'Plus Jakarta Sans', sans-serif; color: white; margin: 0; padding: 0; overflow: hidden; }
        .glass { background: rgba(15, 23, 42, 0.85); backdrop-filter: blur(25px); border: 1px solid rgba(255,255,255,0.1); }
        .mandala-rotate { animation: rotate 100s linear infinite; }
        @keyframes rotate { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
        .tab-active { color: #22d3ee !important; filter: drop-shadow(0 0 10px #22d3ee); border-top: 2px solid #22d3ee; }
        .view-container { height: calc(100vh - 160px); overflow-y: auto; }
        .btn-press:active { transform: scale(0.95); opacity: 0.8; }
        .page-transition { animation: slideIn 0.3s ease-out; }
        @keyframes slideIn { from { transform: translateX(20px); opacity: 0; } to { transform: translateX(0); opacity: 1; } }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState } = React;

        const SKILL_DATA = {
            logic: { title: "Strategic Logic", color: "text-cyan-400", summary: "Deconstructing reality via First Principles to find objective truth.", nexus: "Unlocks: Moral Deconstruction", sub: "Socratic Inquiry, Bias Detection" },
            empathy: { title: "Radical Empathy", color: "text-pink-400", summary: "Cognitive mapping of internal states to predict behavior.", nexus: "Unlocks: Shadow Integration", sub: "Mirroring, Perspective Shifting" },
            discipline: { title: "Iron Discipline", color: "text-orange-400", summary: "Subordinating immediate impulse to long-term strategy.", nexus: "Unlocks: Habit Persistence", sub: "Dopamine Control, Grit Scaling" },
            regulation: { title: "Regulation", color: "text-blue-400", summary: "The buffer zone between stimulus and response.", nexus: "Unlocks: Stoic Equilibrium", sub: "Metacognition, Pulse Control" },
            integrity: { title: "Total Integrity", color: "text-green-400", summary: "Alignment between internal values and external actions.", nexus: "Unlocks: Radical Honesty", sub: "Value Auditing, Code Consistency" }
        };

        const STOIC_PAGES = [
            { h: "01. The What", b: "The core of Stoicism: separating what we control from what we don't. Your mind is your only true kingdom." },
            { h: "02. The Who", b: "Epictetus (the slave), Marcus Aurelius (the Emperor), and Seneca (the Advisor). Wisdom across all social tiers." },
            { h: "03. The When", b: "Founded in 300 BC. Practiced through the fall of Rome and resurrected for modern high-performance psychology." },
            { h: "04. The Where", b: "Athens, Greece. Specifically the 'Stoa Poikile' (Painted Porch), where philosophers gathered in public." },
            { h: "05. The Why", b: "To achieve Ataraxia—mental unshakeability. If the world cannot touch your mind, it cannot make you suffer." },
            { h: "06. How: Step 1", b: "The Audit. Ask: 'Is this current problem 100% within my control?' If no, it is irrelevant." },
            { h: "07. How: Step 2", b: "Withdrawal. Mentally cut the strings to external outcomes (fame, money, opinions of others)." },
            { h: "08. How: Step 3", b: "Concentration. Put all energy into your own character and your current choice. This is where you win." },
            { h: "09. Exercise", b: "Pre-meditatio Malorum: Imagine the worst-case scenario. Realize your character is still yours even then." },
            { h: "10. Synthesis", b: "Mastery of the self is the only true freedom. You are now ready to begin Tier 1 practice. +500 XP." }
        ];

        function App() {
            const [tab, setTab] = useState('dashboard');
            const [activeSkill, setActiveSkill] = useState(null);
            const [studyMode, setStudyMode] = useState(false);
            const [currentPage, setCurrentPage] = useState(0);
            const [stats, setStats] = useState({ kScore: 527, level: 1, streak: 12 });
            const [isMastered, setIsMastered] = useState(false);

            const completeLesson = () => {
                if(!isMastered) setStats(s => ({...s, kScore: s.kScore + 100}));
                setIsMastered(true);
                setStudyMode(false);
                setCurrentPage(0);
            };

            return (
                <div className="max-w-md mx-auto h-screen flex flex-col relative bg-slate-950">
                    
                    {/* 10-PAGE LESSON MODAL */}
                    {studyMode && (
                        <div className="fixed inset-0 z-[100] bg-slate-950 p-8 flex flex-col">
                            <div className="flex justify-between items-center mb-10">
                                <span className="text-[10px] font-black text-cyan-400 tracking-widest uppercase">Slide {currentPage + 1} of 10</span>
                                <button onClick={() => {setStudyMode(false); setCurrentPage(0);}} className="text-slate-500 text-xs font-bold uppercase">Exit</button>
                            </div>
                            <div className="flex-1 page-transition">
                                <h2 className="text-4xl font-800 mb-6 text-white leading-tight uppercase tracking-tighter">{STOIC_PAGES[currentPage].h}</h2>
                                <div className="glass p-8 rounded-[2.5rem] border-l-4 border-cyan-500 text-xl leading-relaxed italic text-slate-200">
                                    "{STOIC_PAGES[currentPage].b}"
                                </div>
                            </div>
                            <div className="flex gap-4 mt-8">
                                {currentPage > 0 && (
                                    <button onClick={() => setCurrentPage(c => c - 1)} className="flex-1 py-4 glass rounded-2xl font-black text-xs uppercase">Back</button>
                                )}
                                {currentPage < 9 ? (
                                    <button onClick={() => setCurrentPage(c => c + 1)} className="flex-2 py-4 bg-cyan-500 text-slate-950 rounded-2xl font-black text-xs uppercase shadow-lg shadow-cyan-500/20">Next Slide</button>
                                ) : (
                                    <button onClick={completeLesson} className="flex-2 py-4 bg-green-500 text-slate-950 rounded-2xl font-black text-xs uppercase">Complete Module</button>
                                )}
                            </div>
                        </div>
                    )}

                    {/* SKILL DOSSIER MODAL */}
                    {activeSkill && (
                        <div className="fixed inset-0 z-[100] bg-slate-950/95 backdrop-blur-md flex items-center justify-center p-6">
                            <div className="glass p-8 rounded-[3.5rem] border border-cyan-500/30 w-full text-center shadow-2xl animate-in zoom-in-95">
                                <h3 className={`text-3xl font-800 ${activeSkill.color} mb-4 uppercase`}>{activeSkill.title}</h3>
                                <p className="text-slate-300 italic mb-6 leading-relaxed">"{activeSkill.summary}"</p>
                                <div className="p-4 glass rounded-2xl mb-8">
                                    <p className="text-[9px] font-black text-slate-500 uppercase tracking-widest mb-1">{activeSkill.nexus}</p>
                                    <p className="text-xs font-bold text-cyan-400 uppercase">{activeSkill.sub}</p>
                                </div>
                                <button onClick={() => setActiveSkill(null)} className="w-full py-4 bg-slate-800 rounded-2xl font-black text-xs uppercase tracking-widest btn-press">Close Interface</button>
                            </div>
                        </div>
                    )}

                    <header className="p-6 flex justify-between items-center bg-slate-950 border-b border-white/5 z-50">
                        <span className="font-black italic text-cyan-400 tracking-tighter text-xl">K-SCORE OS</span>
                        <div className="flex gap-2">
                            <div className="glass px-3 py-1 rounded-full text-[10px] font-bold text-amber-400">⚡ {stats.kScore}</div>
                            <div className="bg-cyan-500 px-3 py-1 rounded-full text-[10px] font-black text-slate-900 uppercase">LVL {stats.level}</div>
                        </div>
                    </header>

                    <main className="view-container">
                        {tab === 'dashboard' && (
                            <div className="p-6 space-y-6">
                                <div className="glass p-10 rounded-[3rem] text-center border-b-4 border-cyan-500/20">
                                    <h1 className="text-5xl font-800 italic uppercase mb-2 tracking-tighter">ANIKA</h1>
                                    <p className="text-cyan-400 font-bold text-[10px] tracking-[0.4em] mb-6 uppercase leading-tight">{stats.streak} DAY STREAK</p>
                                    <div className="h-1.5 w-full bg-slate-900 rounded-full overflow-hidden">
                                        <div className="h-full bg-cyan-400" style={{width: '45%'}}></div>
                                    </div>
                                </div>
                            </div>
                        )}

                        {tab === 'tree' && (
                            <div className="h-full w-full flex items-center justify-center relative pt-10">
                                <div className="absolute mandala-rotate w-80 h-80 border border-white/5 rounded-full"></div>
                                <div className="z-10 w-24 h-24 glass rounded-full flex flex-col items-center justify-center border-2 border-cyan-400/50 shadow-2xl">
                                    <span className="text-xl font-800 italic uppercase">CORE</span>
                                </div>
                                {Object.entries(SKILL_DATA).map(([key, data], i) => {
                                    const angle = (i * 72) * (Math.PI / 180);
                                    const x = Math.cos(angle) * 135;
                                    const y = Math.sin(angle) * 135;
                                    return (
                                        <div key={key} onClick={() => setActiveSkill(data)}
                                             style={{ transform: `translate(${x}px, ${y}px)` }}
                                             className="absolute glass w-16 h-16 rounded-2xl flex items-center justify-center cursor-pointer border border-white/10 hover:border-cyan-400 shadow-xl btn-press">
                                            <span className={`text-xl font-black ${data.color}`}>{key[0].toUpperCase()}</span>
                                        </div>
                                    );
                                })}
                            </div>
                        )}

                        {tab === 'lessons' && (
                            <div className="p-6 space-y-4">
                                <h2 className="text-2xl font-800 mb-6">Deep Curriculum</h2>
                                <div onClick={() => setStudyMode(true)} className="glass p-6 rounded-3xl border-l-4 border-cyan-500 flex justify-between items-center btn-press">
                                    <div>
                                        <h4 className="font-bold text-lg leading-tight uppercase tracking-tighter">The Control Dichotomy</h4>
                                        <p className="text-[10px] text-slate-500 font-black uppercase tracking-widest mt-1">10 Slide Module • +500 XP</p>
                                    </div>
                                    {isMastered && <span className="text-green-500 font-black">MASTERED</span>}
                                </div>
                            </div>
                        )}

                        {tab === 'challenges' && (
                            <div className="p-6 space-y-4">
                                <h2 className="text-2xl font-800 text-green-400">Daily Directive</h2>
                                <div className="glass p-8 rounded-3xl text-center shadow-xl">
                                    <p className="font-bold text-slate-200 leading-relaxed mb-8 italic">"Log 10 minutes of disciplined reflection today."</p>
                                    <button onClick={() => setStats(s => ({...s, kScore: s.kScore+50}))} className="w-full py-5 bg-green-500 text-slate-950 rounded-2xl font-black uppercase text-xs btn-press shadow-lg shadow-green-500/20">Log Completion +50 XP</button>
                                </div>
                            </div>
                        )}
                    </main>

                    <nav className="fixed bottom-0 left-0 right-0 max-w-md mx-auto h-24 bg-slate-950 border-t border-white/10 flex justify-around items-center px-1 z-[60]">
                        <button onClick={() => setTab('dashboard')} className={`flex flex-col items-center flex-1 h-full justify-center ${tab === 'dashboard' ? 'tab-active' : 'text-slate-600'}`}><span className="text-[9px] font-black uppercase">Dash</span></button>
                        <button onClick={() => setTab('dilemmas')} className={`flex flex-col items-center flex-1 h-full justify-center ${tab === 'dilemmas' ? 'tab-active' : 'text-slate-600'}`}><span className="text-[9px] font-black uppercase text-center">Moral</span></button>
                        <button onClick={() => setTab('lessons')} className={`flex flex-col items-center flex-1 h-full justify-center ${tab === 'lessons' ? 'tab-active' : 'text-slate-600'}`}><span className="text-[9px] font-black uppercase">Learn</span></button>
                        <button onClick={() => setTab('tree')} className={`flex flex-col items-center flex-1 h-full justify-center ${tab === 'tree' ? 'tab-active' : 'text-slate-600'}`}><span className="text-[9px] font-black uppercase">Tree</span></button>
                        <button onClick={() => setTab('challenges')} className={`flex flex-col items-center flex-1 h-full justify-center ${tab === 'challenges' ? 'tab-active' : 'text-slate-600'}`}><span className="text-[9px] font-black uppercase">Task</span></button>
                        <button onClick={() => setTab('mind')} className={`flex flex-col items-center flex-1 h-full justify-center ${tab === 'mind' ? 'tab-active' : 'text-slate-600'}`}><span className="text-[9px] font-black uppercase text-center">Mind</span></button>
                    </nav>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
