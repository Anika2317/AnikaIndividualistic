<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>K-SCORE | Neural OS</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;800&display=swap');
        body { background: #020617; font-family: 'Plus Jakarta Sans', sans-serif; color: white; margin: 0; padding: 0; overflow: hidden; }
        .glass { background: rgba(15, 23, 42, 0.85); backdrop-filter: blur(25px); border: 1px solid rgba(255,255,255,0.1); }
        .mandala-rotate { animation: rotate 100s linear infinite; }
        @keyframes rotate { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
        .tab-active { color: #22d3ee !important; filter: drop-shadow(0 0 10px #22d3ee); border-top: 2px solid #22d3ee; }
        .view-container { height: calc(100vh - 160px); overflow-y: auto; -webkit-overflow-scrolling: touch; }
        .node-pulse { animation: pulse 3s infinite; }
        @keyframes pulse { 0% { box-shadow: 0 0 0 0 rgba(34, 211, 238, 0.2); } 70% { box-shadow: 0 0 0 20px rgba(34, 211, 238, 0); } 100% { box-shadow: 0 0 0 0 rgba(34, 211, 238, 0); } }
        .flow-line { width: 2px; background: linear-gradient(to bottom, #22d3ee, transparent); height: 40px; margin: 0 auto; }
        .branch-enter { animation: branchPop 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards; }
        @keyframes branchPop { from { opacity: 0; transform: scale(0.8) translateY(-10px); } to { opacity: 1; transform: scale(1) translateY(0); } }
    </style>
</head>
<body>
    <div id="root"></div>
    <script type="text/babel">
        const { useState } = React;

        const LESSONS = [
            { id: 1, title: "Control Dichotomy", pages: [{h:"01. What",b:"Separating internal states from external noise."}, {h:"02. Who",b:"Marcus Aurelius."}, {h:"03. When",b:"300 BC."}, {h:"04. Where",b:"Athens."}, {h:"05. Why",b:"Ataraxia."}, {h:"06. How",b:"Audit stress."}, {h:"07. How",b:"Stop validation."}, {h:"08. How",b:"Own effort."}, {h:"09. Exercise",b:"Worst case prep."}, {h:"10. End",b:"Mastery. +500 XP"}] },
            { id: 2, title: "First Principles", pages: Array(10).fill({h:"Logic", b:"Break down to atoms."}) },
            { id: 3, title: "Socratic Method", pages: Array(10).fill({h:"Inquiry", b:"Question assumptions."}) },
            { id: 4, title: "Cognitive Mapping", pages: Array(10).fill({h:"Mapping", b:"Visualize the mind."}) },
            { id: 5, title: "Shadow Work", pages: Array(10).fill({h:"Jung", b:"Integrate darkness."}) },
            { id: 6, title: "Impulse Pause", pages: Array(10).fill({h:"Biology", b:"Master the gap."}) },
            { id: 7, title: "Atomic Habits", pages: Array(10).fill({h:"Systems", b:"1% daily compound."}) },
            { id: 8, title: "Dopamine Master", pages: Array(10).fill({h:"Reward", b:"Reclaim focus."}) },
            { id: 9, title: "Stimulus Buffer", pages: Array(10).fill({h:"Regulation", b:"Neutralize triggers."}) },
            { id: 10, title: "Metacognition", pages: Array(10).fill({h:"Awareness", b:"Watch thoughts."}) },
            { id: 11, title: "Value Alignment", pages: Array(10).fill({h:"Integrity", b:"Sync acts to code."}) },
            { id: 12, title: "Radical Honesty", pages: Array(10).fill({h:"Truth", b:"No social masks."}) },
            { id: 13, title: "Identity Design", pages: Array(10).fill({h:"Story", b:"Architect your self."}) },
            { id: 14, title: "The Integration", pages: Array(10).fill({h:"Whole", b:"Unified system."}) }
        ];

        const MORAL_FLOWS = [
            {
                id: 1,
                title: "The Trolley Paradox",
                start: "A train is accelerating toward 5 victims. You hold the lever.",
                steps: [
                    {
                        question: "Step 1: Do you pull the lever to kill 1 and save 5?",
                        options: [
                            { text: "Yes (Pull)", next: "util", label: "Utility Path" },
                            { text: "No (Wait)", next: "deon", label: "Duty Path" }
                        ]
                    }
                ],
                results: {
                    util: { archetype: "The Utilitarian", analysis: "You view life as a mathematical equation. You believe the 'Greater Good' justifies the heavy cost of individual sacrifice." },
                    deon: { archetype: "The Deontologist", analysis: "You believe rules are absolute. You refuse to 'play God,' believing that an evil act is never justified, even for a better outcome." }
                }
            }
        ];

        function App() {
            const [tab, setTab] = useState('dashboard');
            const [stats, setStats] = useState({ kScore: 527, xp: 420 });
            const [activeLesson, setActiveLesson] = useState(null);
            const [lessonPage, setLessonPage] = useState(0);
            const [activeFlow, setActiveFlow] = useState(null);
            const [flowStep, setFlowStep] = useState(0);
            const [flowPath, setFlowPath] = useState([]);
            const [finalResult, setFinalResult] = useState(null);

            const handleFlowOption = (option) => {
                setFlowPath([...flowPath, option.text]);
                if (activeFlow.results[option.next]) {
                    setFinalResult(activeFlow.results[option.next]);
                    setStats(s => ({...s, kScore: s.kScore + 50}));
                } else {
                    setFlowStep(flowStep + 1);
                }
            };

            return (
                <div className="max-w-md mx-auto h-screen flex flex-col relative bg-slate-950">
                    
                    {/* MORAL FLOW CHART MODAL */}
                    {activeFlow && (
                        <div className="fixed inset-0 z-[100] bg-slate-950 p-8 flex flex-col overflow-y-auto">
                            <div className="flex justify-between mb-8">
                                <span className="text-red-400 font-black text-xs uppercase tracking-widest">Ethical Lab</span>
                                <button onClick={() => {setActiveFlow(null); setFinalResult(null); setFlowPath([]);}} className="text-slate-500">Exit</button>
                            </div>

                            <div className="flex flex-col items-center space-y-4">
                                <div className="glass p-6 rounded-3xl w-full text-center border-red-500/20">
                                    <p className="text-xs text-slate-500 uppercase mb-2">Scenario</p>
                                    <p className="italic font-semibold leading-relaxed">"{activeFlow.start}"</p>
                                </div>

                                {flowPath.map((choice, i) => (
                                    <React.Fragment key={i}>
                                        <div className="flow-line"></div>
                                        <div className="glass px-4 py-2 rounded-full border-cyan-500/50 text-[10px] font-black text-cyan-400 branch-enter">
                                            {choice}
                                        </div>
                                    </React.Fragment>
                                ))}

                                {!finalResult ? (
                                    <React.Fragment>
                                        <div className="flow-line"></div>
                                        <div className="w-full space-y-4 branch-enter">
                                            <p className="text-center text-sm font-bold mb-4">{activeFlow.steps[flowStep].question}</p>
                                            {activeFlow.steps[flowStep].options.map((opt, idx) => (
                                                <button key={idx} onClick={() => handleFlowOption(opt)} className="w-full py-4 glass rounded-2xl border-red-500/20 text-red-400 font-black text-xs hover:bg-red-500/10 transition-all">
                                                    {opt.text}
                                                </button>
                                            ))}
                                        </div>
                                    </React.Fragment>
                                ) : (
                                    <React.Fragment>
                                        <div className="flow-line"></div>
                                        <div className="glass p-8 rounded-[2.5rem] border-l-4 border-cyan-400 w-full branch-enter">
                                            <p className="text-[10px] text-cyan-400 font-black uppercase mb-2">Neural Archetype</p>
                                            <h3 className="text-2xl font-800 mb-4">{finalResult.archetype}</h3>
                                            <p className="text-sm text-slate-300 leading-relaxed italic">"{finalResult.analysis}"</p>
                                            <button onClick={() => {setActiveFlow(null); setFinalResult(null); setFlowPath([]);}} className="mt-8 w-full py-4 bg-cyan-500 text-slate-950 rounded-2xl font-black text-xs uppercase">Integrate & Exit</button>
                                        </div>
                                    </React.Fragment>
                                )}
                            </div>
                        </div>
                    )}

                    {/* LESSON ENGINE (10 Pages) */}
                    {activeLesson && (
                        <div className="fixed inset-0 z-[100] bg-slate-950 p-8 flex flex-col">
                            <div className="flex justify-between items-center mb-10">
                                <span className="text-cyan-400 font-black text-xs">SLIDE {lessonPage + 1} / 10</span>
                                <button onClick={() => {setActiveLesson(null); setLessonPage(0);}} className="text-slate-500 font-bold uppercase text-xs">Exit</button>
                            </div>
                            <div className="flex-1">
                                <h2 className="text-4xl font-800 mb-6 text-white uppercase">{activeLesson.pages[lessonPage].h}</h2>
                                <div className="glass p-8 rounded-[2.5rem] border-l-4 border-cyan-500 text-xl italic text-slate-200">
                                    "{activeLesson.pages[lessonPage].b}"
                                </div>
                            </div>
                            <div className="flex gap-4 mt-8">
                                {lessonPage > 0 && <button onClick={() => setLessonPage(lessonPage - 1)} className="flex-1 py-5 glass rounded-2xl font-black uppercase text-xs">Back</button>}
                                {lessonPage < 9 ? (
                                    <button onClick={() => setLessonPage(lessonPage + 1)} className="flex-2 py-5 bg-cyan-500 text-slate-950 rounded-2xl font-black uppercase text-xs">Next</button>
                                ) : (
                                    <button onClick={() => {setActiveLesson(null); setStats(s => ({...s, kScore: s.kScore + 100}));}} className="flex-2 py-5 bg-green-500 text-slate-950 rounded-2xl font-black uppercase text-xs">Complete</button>
                                )}
                            </div>
                        </div>
                    )}

                    <header className="p-6 flex justify-between items-center bg-slate-950 border-b border-white/5 z-50">
                        <span className="font-black italic text-cyan-400 text-2xl tracking-tighter">K-SCORE OS</span>
                        <div className="glass px-3 py-1 rounded-full text-[11px] font-black text-amber-400">⚡ {stats.kScore}</div>
                    </header>

                    <main className="view-container">
                        {tab === 'dashboard' && (
                            <div className="p-6">
                                <div className="glass p-10 rounded-[3.5rem] text-center border-b-4 border-cyan-500/20">
                                    <h1 className="text-5xl font-800 uppercase italic tracking-tighter mb-2">ANIKA</h1>
                                    <p className="text-cyan-400 font-bold text-xs uppercase tracking-widest leading-tight">12 DAY STREAK 🔥</p>
                                </div>
                            </div>
                        )}
                        {tab === 'lessons' && (
                            <div className="p-6 space-y-4">
                                <h2 className="text-3xl font-800 mb-6 uppercase tracking-tighter">Curriculum</h2>
                                {LESSONS.map(l => (
                                    <div key={l.id} onClick={() => setActiveLesson(l)} className="glass p-6 rounded-3xl border-l-4 border-cyan-500 cursor-pointer active:scale-95 transition-all">
                                        <h4 className="font-bold text-lg">{l.id}. {l.title}</h4>
                                        <p className="text-[10px] text-slate-500 uppercase mt-2">10 Pages • +500 XP</p>
                                    </div>
                                ))}
                            </div>
                        )}
                        {tab === 'moral' && (
                            <div className="p-6 space-y-4">
                                <h2 className="text-3xl font-800 mb-6 uppercase tracking-tighter text-red-500">Ethical Flows</h2>
                                {MORAL_FLOWS.map(f => (
                                    <div key={f.id} onClick={() => setActiveFlow(f)} className="glass p-6 rounded-3xl border-l-4 border-red-500 cursor-pointer active:scale-95 transition-all">
                                        <h4 className="font-bold text-lg uppercase">{f.title}</h4>
                                        <p className="text-[10px] text-slate-500 mt-2 font-black uppercase tracking-widest">Open Logic Chart</p>
                                    </div>
                                ))}
                            </div>
                        )}
                        {tab === 'tree' && (
                            <div className="h-[450px] w-full flex items-center justify-center relative pt-10">
                                <div className="absolute mandala-rotate w-80 h-80 border border-white/5 rounded-full"></div>
                                <div className="z-10 w-24 h-24 glass rounded-full flex flex-col items-center justify-center border-2 border-cyan-400 node-pulse uppercase font-black text-xs">Core</div>
                                {['⚛', '♥', '🛡', '≋', '⚓'].map((icon, i) => {
                                    const angle = (i * 72) * (Math.PI / 180);
                                    return (
                                        <div key={i} style={{ transform: `translate(${Math.cos(angle)*130}px, ${Math.sin(angle)*130}px)` }}
                                             className="absolute glass w-14 h-14 rounded-2xl flex items-center justify-center border border-white/10 text-2xl">{icon}</div>
                                    );
                                })}
                            </div>
                        )}
                        {tab === 'task' && (
                            <div className="p-6">
                                <button onClick={() => setStats(s => ({...s, kScore: s.kScore + 50}))} className="w-full py-6 bg-green-500 text-slate-950 rounded-3xl font-black uppercase text-xs">Log Reflection +50 XP</button>
                            </div>
                        )}
                    </main>

                    <nav className="fixed bottom-0 left-0 right-0 h-24 bg-slate-950 border-t border-white/10 flex justify-around items-center px-2 z-[60] backdrop-blur-xl">
                        {['Dash', 'Moral', 'Learn', 'Tree', 'Task', 'Mind'].map((t) => (
                            <button key={t} onClick={() => setTab(t.toLowerCase() === 'dash' ? 'dashboard' : t.toLowerCase() === 'learn' ? 'lessons' : t.toLowerCase())} 
                                    className={`flex-1 h-full font-black text-[10px] uppercase ${tab.includes(t.toLowerCase()) || (t === 'Dash' && tab === 'dashboard') || (t === 'Learn' && tab === 'lessons') ? 'tab-active' : 'text-slate-600'}`}>{t}</button>
                        ))}
                    </nav>
                </div>
            );
        }
        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
