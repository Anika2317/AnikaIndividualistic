<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>K-SCORE | Neural OS</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;800&display=swap');
        body { background: #020617; font-family: 'Plus Jakarta Sans', sans-serif; color: white; margin: 0; padding: 0; overflow: hidden; }
        .glass { background: rgba(15, 23, 42, 0.85); backdrop-filter: blur(25px); border: 1px solid rgba(255,255,255,0.1); }
        .mandala-rotate { animation: rotate 100s linear infinite; }
        @keyframes rotate { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
        .tab-active { color: #22d3ee !important; filter: drop-shadow(0 0 10px #22d3ee); border-top: 2px solid #22d3ee; }
        .view-container { height: calc(100vh - 160px); overflow-y: auto; -webkit-overflow-scrolling: touch; }
        .btn-press:active { transform: scale(0.95); opacity: 0.8; }
    </style>
</head>
<body>
    <div id="root"></div>
    <script type="text/babel">
        const { useState } = React;

        const SKILL_DATA = {
            logic: { title: "Strategic Logic", icon: "⚛", color: "text-cyan-400", summary: "First Principles thinking. Deconstructing reality into atomic truths.", sub: "Socratic Inquiry" },
            empathy: { title: "Radical Empathy", icon: "♥", color: "text-pink-400", summary: "Cognitive mapping of others' internal worlds to predict behavior.", sub: "Shadow Work" },
            discipline: { title: "Iron Discipline", icon: "🛡", color: "text-orange-400", summary: "Subordinating impulse to long-term strategy.", sub: "Dopamine Control" },
            regulation: { title: "Mind Regulation", icon: "≋", color: "text-blue-400", summary: "The buffer zone between stimulus and response.", sub: "Metacognition" },
            integrity: { title: "Total Integrity", icon: "⚓", color: "text-green-400", summary: "Absolute alignment of values, words, and actions.", sub: "Radical Honesty" }
        };

        const LESSONS = [
            { id: 1, title: "The Control Dichotomy", pages: [{h:"01. What",b:"Separating controllable internal states from external noise."}, {h:"02. Who",b:"Marcus Aurelius & Epictetus."}, {h:"03. When",b:"300 BC Athens."}, {h:"04. Where",b:"The Painted Porch."}, {h:"05. Why",b:"To reach Ataraxia."}, {h:"06. Step 1",b:"Identify the stressor."}, {h:"07. Step 2",b:"Audit the control."}, {h:"08. Step 3",b:"Withdraw emotional energy."}, {h:"09. Exercise",b:"Imagine losing a comfort."}, {h:"10. End",b:"Self-mastery unlocked. +500 XP"}] },
            { id: 2, title: "First Principles", pages: [{h:"01. The What",b:"Breaking complex problems into fundamental truths."}, {h:"02. The Why",b:"Reasoning by analogy is lazy; first principles is engineering."}, {h:"03. The Who",b:"Aristotle and Elon Musk."}, {h:"04. Step 1",b:"Identify assumptions."}, {h:"05. Step 2",b:"Break down to physics."}, {h:"06. Step 3",b:"Reconstruct from scratch."}, {h:"07. Exercise",b:"Deconstruct your 'dream job' requirements."}, {h:"08. Deep Dive",b:"Why does this cost what it costs?"}, {h:"09. Strategy",b:"Find the hidden efficiency."}, {h:"10. Synthesis",b:"Logic over consensus. +500 XP"}] },
            { id: 3, title: "Socratic Method", pages: [{h:"01. The What",b:"The art of cooperative argumentative dialogue."}, {h:"02. The Who",b:"Socrates, the gadfly of Athens."}, {h:"03. The When",b:"470 BC."}, {h:"04. The Why",b:"To expose the limits of your own knowledge."}, {h:"05. Step 1",b:"Propose a definition."}, {h:"06. Step 2",b:"Find the contradiction."}, {h:"07. Step 3",b:"Refine the truth."}, {h:"08. Strategy",b:"Ask 'Why' five times."}, {h:"09. Exercise",b:"Question your most deeply held belief."}, {h:"10. Synthesis",b:"Wisdom begins in wonder. +500 XP"}] },
            { id: 4, title: "Cognitive Mapping", pages: [{h:"01. The What",b:"Visualizing another's internal world structure."}, {h:"02. The Who",b:"Edward Tolman & Aaron Beck."}, {h:"03. The Why",b:"To predict moves and understand triggers."}, {h:"04. Step 1",b:"Identify their core belief."}, {h:"05. Step 2",b:"Locate their value nodes."}, {h:"06. Step 3",b:"Map the defensive walls."}, {h:"07. Exercise",b:"Map a friend's reaction to stress."}, {h:"08. Deep Dive",b:"The architecture of personality."}, {h:"09. Strategy",b:"Find the bridge to their logic."}, {h:"10. Synthesis",b:"True Empathy is data. +500 XP"}] },
            { id: 5, title: "Shadow Work", pages: [{h:"01. The What",b:"Integrating the repressed parts of the psyche."}, {h:"02. The Who",b:"Carl Jung."}, {h:"03. The Why",b:"Until you make the unconscious conscious, it will direct your life."}, {h:"04. Step 1",b:"Identify a recurring trigger."}, {h:"05. Step 2",b:"Ask what part of you that trigger reflects."}, {h:"06. Step 3",b:"Stop projecting; own the trait."}, {h:"07. Exercise",b:"Write a letter to your 'dark' side."}, {h:"08. Deep Dive",b:"The Golden Shadow."}, {h:"09. Strategy",b:"Channel repressed energy."}, {h:"10. Synthesis",b:"Wholeness over 'goodness'. +500 XP"}] },
            { id: 6, title: "Impulse Pause", pages: [{h:"01. The What",b:"Mastering the 600ms gap in brain firing."}, {h:"02. Biology",b:"Amygdala vs Prefrontal Cortex."}, {h:"03. The Why",b:"Reacting is slavery; responding is freedom."}, {h:"04. Step 1",b:"Feel the physical surge."}, {h:"05. Step 2",b:"Name the emotion."}, {h:"06. Step 3",b:"Count to five."}, {h:"07. Exercise",b:"Wait 10 seconds before checking a notification."}, {h:"08. Deep Dive",b:"Dopamine loops."}, {h:"09. Strategy",b:"The 'Not Now' technique."}, {h:"10. Synthesis",b:"Discipline is the pause. +500 XP"}] },
            { id: 7, title: "Atomic Compounding", pages: [{h:"01. The What",b:"The power of 1% daily improvements."}, {h:"02. The Who",b:"James Clear & BJ Fogg."}, {h:"03. The Math",b:"1% better every day = 37x better in a year."}, {h:"04. Step 1",b:"Shrink the habit to two minutes."}, {h:"05. Step 2",b:"Optimize the environment."}, {h:"06. Step 3",b:"Stack habits."}, {h:"07. Exercise",b:"Do one pushup every time you enter a room."}, {h:"08. Deep Dive",b:"Identity-based habits."}, {h:"09. Strategy",b:"Don't break the chain."}, {h:"10. Synthesis",b:"Systems > Goals. +500 XP"}] },
            { id: 8, title: "Dopamine Hijack", pages: [{h:"01. The What",b:"Reclaiming attention from variable rewards."}, {h:"02. Biology",b:"The reward pathway and addiction."}, {h:"03. The Why",b:"Digital noise is literal brain damage."}, {h:"04. Step 1",b:"Recognize the 'pull'."}, {h:"05. Step 2",b:"Remove the easy access."}, {h:"06. Step 3",b:"Replace with high-effort reward."}, {h:"07. Exercise",b:"Phone-free for the first hour of the day."}, {h:"08. Deep Dive",b:"Dopamine detoxing."}, {h:"09. Strategy",b:"Boredom as a tool."}, {h:"10. Synthesis",b:"Attention is wealth. +500 XP"}] },
            { id: 9, title: "Stimulus Buffer", pages: [{h:"01. The What",b:"Neutralizing triggers through exposure."}, {h:"02. The Why",b:"Desensitization to emotional pain."}, {h:"03. Step 1",b:"Identify your weakest link."}, {h:"04. Step 2",b:"Controlled minor exposure."}, {h:"05. Step 3",b:"Observe the physical sensation."}, {h:"06. How",b:"Vagus nerve stimulation."}, {h:"07. Exercise",b:"Cold shower for 30 seconds."}, {h:"08. Deep Dive",b:"The Stress-Response curve."}, {h:"09. Strategy",b:"Metacognitive detachment."}, {h:"10. Synthesis",b:"You are the mountain. +500 XP"}] },
            { id: 10, title: "Metacognition", pages: [{h:"01. The What",b:"Awareness of your own thinking process."}, {h:"02. The Why",b:"You are not your thoughts; you are the observer."}, {h:"03. Step 1",b:"Listen to your internal monologue."}, {h:"04. Step 2",b:"Label the thought (e.g., 'Anxiety')."}, {h:"05. Step 3",b:"Ask if the thought is useful."}, {h:"06. How",b:"Mindfulness-based observation."}, {h:"07. Exercise",b:"Watch your thoughts for 3 minutes without judging."}, {h:"08. Deep Dive",b:"Cognitive defusion."}, {h:"09. Strategy",b:"The 'Sky and Clouds' analogy."}, {h:"10. Synthesis",b:"Mental clarity is power. +500 XP"}] },
            { id: 11, title: "Value Alignment", pages: [{h:"01. The What",b:"Matching actions to a core value set."}, {h:"02. The Why",b:"Cognitive dissonance is the root of misery."}, {h:"03. Step 1",b:"Define your top 3 non-negotiables."}, {h:"04. Step 2",b:"Audit your calendar."}, {h:"05. Step 3",b:"Delete misaligned tasks."}, {h:"06. How",b:"Value-based decision making."}, {h:"07. Exercise",b:"Say 'No' to one thing today for your values."}, {h:"08. Deep Dive",b:"The Hierarchy of Values."}, {h:"09. Strategy",b:"Integrity is a practice."}, {h:"10. Synthesis",b:"Alignment is peace. +500 XP"}] },
            { id: 12, title: "Radical Honesty", pages: [{h:"01. The What",b:"The practice of total transparency."}, {h:"02. The Who",b:"Brad Blanton."}, {h:"03. The Why",b:"Lying creates a split psyche and social friction."}, {h:"04. Step 1",b:"Stop the 'social lies'."}, {h:"05. Step 2",b:"State your actual feelings."}, {h:"06. Step 3",b:"Own your mistakes instantly."}, {h:"07. Exercise",b:"Tell one truth you've been hiding."}, {h:"08. Deep Dive",b:"The cost of secrets."}, {h:"09. Strategy",b:"Direct communication."}, {h:"10. Synthesis",b:"Truth sets you free. +500 XP"}] },
            { id: 13, title: "Identity Architecture", pages: [{h:"01. The What",b:"Deciding who you are instead of remembering it."}, {h:"02. The Why",b:"Self-narrative is the operating system of the soul."}, {h:"03. Step 1",b:"Destroy the old labels."}, {h:"04. Step 2",b:"Write the 'Future Self' profile."}, {h:"05. Step 3",b:"Act 'as if'."}, {h:"06. How",b:"Affirmation through action."}, {h:"07. Exercise",b:"Dress and speak like your 2.0 version today."}, {h:"08. Deep Dive",b:"The Psychology of Change."}, {h:"09. Strategy",b:"Narrative reframing."}, {h:"10. Synthesis",b:"You are the author. +500 XP"}] },
            { id: 14, title: "The Integration", pages: [{h:"01. The What",b:"Becoming a whole, unified individual."}, {h:"02. The Goal",b:"Harmony across all 5 Skill Tree dimensions."}, {h:"03. The Why",b:"A house divided against itself cannot stand."}, {h:"04. Step 1",b:"Review your K-Score progress."}, {h:"05. Step 2",b:"Identify the weakest link."}, {h:"06. Step 3",b:"Intensive focus on the gap."}, {h:"07. Exercise",b:"Connect one Lesson to one Dilemma."}, {h:"08. Deep Dive",b:"The individuated life."}, {h:"09. Strategy",b:"Holistic evolution."}, {h:"10. Synthesis",b:"Level 1 Mastery Attained. +1000 XP"}] }
        ];

        function App() {
            const [tab, setTab] = useState('dashboard');
            const [activeSkill, setActiveSkill] = useState(null);
            const [currentLesson, setCurrentLesson] = useState(null);
            const [lessonPage, setLessonPage] = useState(0);
            const [stats, setStats] = useState({ kScore: 527, xp: 420, level: 1, streak: 12 });
            const [mastered, setMastered] = useState([]);

            return (
                <div className="max-w-md mx-auto h-screen flex flex-col relative bg-slate-950">
                    
                    {/* FULL SCREEN 10-PAGE LESSON ENGINE */}
                    {currentLesson && (
                        <div className="fixed inset-0 z-[100] bg-slate-950 p-8 flex flex-col">
                            <div className="flex justify-between items-center mb-10">
                                <span className="text-cyan-400 font-black text-xs">PAGE {lessonPage + 1} / 10</span>
                                <button onClick={() => {setCurrentLesson(null); setLessonPage(0);}} className="text-slate-500 font-bold uppercase text-xs">Exit</button>
                            </div>
                            <div className="flex-1">
                                <h2 className="text-4xl font-800 mb-6 text-white uppercase">{currentLesson.pages[lessonPage].h}</h2>
                                <div className="glass p-8 rounded-[2.5rem] border-l-4 border-cyan-500 text-xl italic text-slate-200 shadow-2xl">
                                    "{currentLesson.pages[lessonPage].b}"
                                </div>
                            </div>
                            <div className="flex gap-4 mt-8">
                                {lessonPage > 0 && <button onClick={() => setLessonPage(p => p - 1)} className="flex-1 py-5 glass rounded-2xl font-black">BACK</button>}
                                {lessonPage < 9 ? (
                                    <button onClick={() => setLessonPage(p => p + 1)} className="flex-2 py-5 bg-cyan-500 text-slate-950 rounded-2xl font-black">NEXT</button>
                                ) : (
                                    <button onClick={() => {setMastered([...mastered, currentLesson.id]); setStats(s => ({...s, kScore: s.kScore + 100})); setCurrentLesson(null); setLessonPage(0);}} className="flex-2 py-5 bg-green-500 text-slate-950 rounded-2xl font-black uppercase">Mastered</button>
                                )}
                            </div>
                        </div>
                    )}

                    {/* SKILL DOSSIER */}
                    {activeSkill && (
                        <div className="fixed inset-0 z-[100] bg-slate-950/95 flex items-center justify-center p-6 backdrop-blur-md">
                            <div className="glass p-8 rounded-[3rem] border border-cyan-500/30 w-full text-center shadow-2xl">
                                <h3 className={`text-3xl font-800 ${activeSkill.color} mb-4 uppercase`}>{activeSkill.title}</h3>
                                <p className="text-slate-300 italic mb-6">"{activeSkill.summary}"</p>
                                <p className="text-[10px] font-black uppercase text-slate-500 tracking-widest mb-8">FOCUS: {activeSkill.sub}</p>
                                <button onClick={() => setActiveSkill(null)} className="w-full py-4 bg-slate-800 rounded-2xl font-black uppercase text-xs">Close</button>
                            </div>
                        </div>
                    )}

                    <header className="p-6 flex justify-between items-center bg-slate-950 border-b border-white/5 z-50">
                        <span className="font-black italic text-cyan-400 text-2xl">K-SCORE OS</span>
                        <div className="glass px-3 py-1 rounded-full text-[11px] font-black text-amber-400">⚡ {stats.kScore}</div>
                    </header>

                    <main className="view-container">
                        {tab === 'dashboard' && (
                            <div className="p-6">
                                <div className="glass p-10 rounded-[3.5rem] text-center border-b-4 border-cyan-500/20">
                                    <h1 className="text-5xl font-800 uppercase italic">ANIKA</h1>
                                    <p className="text-cyan-400 font-bold text-xs mt-2 uppercase">{stats.streak} DAY STREAK</p>
                                </div>
                            </div>
                        )}
                        {tab === 'tree' && (
                            <div className="h-[450px] w-full flex items-center justify-center relative pt-10">
                                <div className="absolute mandala-rotate w-80 h-80 border border-white/5 rounded-full"></div>
                                <div className="z-10 w-24 h-24 glass rounded-full flex flex-col items-center justify-center border-2 border-cyan-400">
                                    <span className="text-xl font-800 italic">CORE</span>
                                </div>
                                {Object.entries(SKILL_DATA).map(([key, data], i) => {
                                    const angle = (i * 72) * (Math.PI / 180);
                                    return (
                                        <div key={key} onClick={() => setActiveSkill(data)}
                                             style={{ transform: `translate(${Math.cos(angle)*135}px, ${Math.sin(angle)*135}px)` }}
                                             className="absolute glass w-16 h-16 rounded-2xl flex items-center justify-center cursor-pointer border border-white/10 hover:border-cyan-400 active:scale-90 transition-all">
                                            <span className={`text-2xl font-black ${data.color}`}>{data.icon}</span>
                                        </div>
                                    );
                                })}
                            </div>
                        )}
                        {tab === 'lessons' && (
                            <div className="p-6 space-y-4">
                                <h2 className="text-3xl font-800 tracking-tighter mb-6 uppercase">Curriculum</h2>
                                {LESSONS.map(l => (
                                    <div key={l.id} onClick={() => setCurrentLesson(l)} className="glass p-6 rounded-3xl border-l-4 border-cyan-500 cursor-pointer active:scale-95 transition-all">
                                        <h4 className="font-bold text-lg">{l.id}. {l.title}</h4>
                                        <p className="text-[10px] text-slate-500 uppercase mt-2">10 Pages • +500 XP {mastered.includes(l.id) && "✓"}</p>
                                    </div>
                                ))}
                            </div>
                        )}
                        {tab === 'tasks' && (
                            <div className="p-6">
                                <button onClick={() => setStats(s => ({...s, kScore: s.kScore+50}))} className="w-full py-6 bg-green-500 text-slate-950 rounded-3xl font-black uppercase text-xs shadow-lg shadow-green-500/20 active:scale-95 transition-all">Log Completion +50 XP</button>
                            </div>
                        )}
                    </main>

                    <nav className="fixed bottom-0 left-0 right-0 h-24 bg-slate-950 border-t border-white/10 flex justify-around items-center px-2 z-[60]">
                        {['Dash', 'Moral', 'Learn', 'Tree', 'Task', 'Mind'].map((t) => (
                            <button key={t} onClick={() => setTab(t.toLowerCase() === 'dash' ? 'dashboard' : t.toLowerCase() === 'learn' ? 'lessons' : t.toLowerCase() === 'task' ? 'tasks' : t.toLowerCase())} 
                                    className={`flex-1 h-full font-black text-[10px] uppercase ${tab.includes(t.toLowerCase()) || (t === 'Dash' && tab === 'dashboard') || (t === 'Task' && tab === 'tasks') || (t === 'Learn' && tab === 'lessons') ? 'tab-active' : 'text-slate-600'}`}>{t}</button>
                        ))}
                    </nav>
                </div>
            );
        }
        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
