<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>K-SCORE | Neural OS</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;800&display=swap');
        body { background: #020617; font-family: 'Plus Jakarta Sans', sans-serif; color: white; margin: 0; padding: 0; overflow: hidden; }
        .glass { background: rgba(15, 23, 42, 0.85); backdrop-filter: blur(25px); border: 1px solid rgba(255,255,255,0.1); }
        .mandala-rotate { animation: rotate 100s linear infinite; }
        @keyframes rotate { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
        .tab-active { color: #22d3ee !important; filter: drop-shadow(0 0 10px #22d3ee); border-top: 2px solid #22d3ee; }
        .view-container { height: calc(100vh - 160px); overflow-y: auto; -webkit-overflow-scrolling: touch; }
        .node-pulse { animation: pulse 3s infinite; }
        @keyframes pulse { 0% { box-shadow: 0 0 0 0 rgba(34, 211, 238, 0.2); } 70% { box-shadow: 0 0 0 20px rgba(34, 211, 238, 0); } 100% { box-shadow: 0 0 0 0 rgba(34, 211, 238, 0); } }
    </style>
</head>
<body>
    <div id="root"></div>
    <script type="text/babel">
        const { useState } = React;

        const SKILL_DATA = {
            logic: { title: "Strategic Logic", icon: "⚛", color: "text-cyan-400", summary: "First Principles thinking. Deconstructing reality into atomic truths.", sub: "Socratic Inquiry" },
            empathy: { title: "Radical Empathy", icon: "♥", color: "text-pink-400", summary: "Cognitive mapping of others' internal worlds to predict behavior.", sub: "Shadow Work" },
            discipline: { title: "Iron Discipline", icon: "🛡", color: "text-orange-400", summary: "Subordinating impulse to long-term strategy.", sub: "Dopamine Control" },
            regulation: { title: "Mind Regulation", icon: "≋", color: "text-blue-400", summary: "The buffer zone between stimulus and response.", sub: "Metacognition" },
            integrity: { title: "Total Integrity", icon: "⚓", color: "text-green-400", summary: "Absolute alignment of values, words, and actions.", sub: "Radical Honesty" }
        };

        const LESSONS_DATA = [
            { id: 1, title: "Control Dichotomy", pages: [
                {h: "01. What", b: "The core Stoic realization: We only control our mind and our effort."},
                {h: "02. Who", b: "Epictetus, Marcus Aurelius, and Seneca."},
                {h: "03. When", b: "300 BC Athens to the Fall of Rome."},
                {h: "04. Where", b: "The Stoa Poikile, or the Painted Porch."},
                {h: "05. Why", b: "To achieve total mental independence from external chaos."},
                {h: "06. How: Start", b: "Label every frustration as 'Controllable' or 'Not Controllable'."},
                {h: "07. How: Middle", b: "Cease all emotional investment in things you cannot change."},
                {h: "08. How: End", b: "Double down on your own character choices."},
                {h: "09. Exercise", b: "Pre-meditatio Malorum: Imagine losing a possession today."},
                {h: "10. Synthesis", b: "Invincibility comes from owning only the self. +500 XP"}
            ]},
            { id: 2, title: "First Principles", pages: [
                {h: "01. What", b: "Breaking a problem down to the physics and rebuilding from scratch."},
                {h: "02. Who", b: "Aristotle and Elon Musk."},
                {h: "03. When", b: "Classic Logic era revived by modern engineering."},
                {h: "04. Where", b: "Scientific circles and Silicon Valley."},
                {h: "05. Why", b: "To avoid the trap of 'reasoning by analogy' (imitating others)."},
                {h: "06. How: Start", b: "Identify the current assumptions you are making."},
                {h: "07. How: Middle", b: "Deconstruct them until you hit a basic, undeniable fact."},
                {h: "08. How: End", b: "Reconstruct your solution using only those core facts."},
                {h: "09. Exercise", b: "Analyze why you follow your current career/school path."},
                {h: "10. Synthesis", b: "Truth is found in atoms, not opinions. +500 XP"}
            ]},
            { id: 3, title: "Socratic Method", pages: [
                {h: "01. What", b: "Cooperative argumentative dialogue to stimulate critical thinking."},
                {h: "02. Who", b: "Socrates, the Gadfly of Athens."},
                {h: "03. When", b: "5th Century BC."},
                {h: "04. Where", b: "The Agora (public square) of Athens."},
                {h: "05. Why", b: "To expose the 'Aporia' (confusion) in false certainties."},
                {h: "06. How: Start", b: "Propose a broad definition of a concept like 'Justice'."},
                {h: "07. How: Middle", b: "Find an exception or contradiction to that definition."},
                {h: "08. How: End", b: "Refine the definition to include the new data."},
                {h: "09. Exercise", b: "Ask 'Why' 5 times to your most basic belief."},
                {h: "10. Synthesis", b: "The unexamined life is not worth living. +500 XP"}
            ]},
            { id: 4, title: "Cognitive Mapping", pages: [
                {h: "01. What", b: "Mental visualization of another's psychology and triggers."},
                {h: "02. Who", b: "Edward Tolman and Aaron Beck."},
                {h: "03. When", b: "Mid-20th Century behavioral psychology."},
                {h: "04. Where", b: "Clinical research and modern therapy."},
                {h: "05. Why", b: "To predict behavior and resolve conflicts before they start."},
                {h: "06. How: Start", b: "Observe someone's reaction to a minor negative event."},
                {h: "07. How: Middle", b: "Infer their 'Core Belief' based on that reaction."},
                {h: "08. How: End", b: "Map out the path that avoids their 'threat nodes'."},
                {h: "09. Exercise", b: "Draw the mental map of your biggest adversary."},
                {h: "10. Synthesis", b: "Empathy is simply high-fidelity data. +500 XP"}
            ]},
            { id: 5, title: "Shadow Work", pages: [
                {h: "01. What", b: "Integrating the repressed or rejected parts of the psyche."},
                {h: "02. Who", b: "Carl Jung."},
                {h: "03. When", b: "1940s Analytic Psychology."},
                {h: "04. Where", b: "Zurich, Switzerland and the global mind."},
                {h: "05. Why", b: "Whatever you suppress will eventually erupt and control you."},
                {h: "06. How: Start", b: "Note what you hate most in other people."},
                {h: "07. How: Middle", b: "Identify where you possess that same trait in secret."},
                {h: "08. How: End", b: "Accept the energy of that trait and use it productively."},
                {h: "09. Exercise", b: "Confess your 'darkest' ambition to your journal."},
                {h: "10. Synthesis", b: "Wholeness requires the light and the dark. +500 XP"}
            ]},
            { id: 6, title: "Impulse Pause", pages: [
                {h: "01. What", b: "Exploiting the 600ms gap between stimulus and reaction."},
                {h: "02. Who", b: "Viktor Frankl and modern neuroscientists."},
                {h: "03. When", b: "The bridge between psychology and biology."},
                {h: "04. Where", b: "The Prefrontal Cortex vs the Amygdala."},
                {h: "05. Why", b: "Reacting is a biological reflex; responding is a human power."},
                {h: "06. How: Start", b: "Feel the 'heat' of an impulse in your chest or throat."},
                {h: "07. How: Middle", b: "Insert a physical count of three seconds."},
                {h: "08. How: End", b: "Choose the action that aligns with your 5-year self."},
                {h: "09. Exercise", b: "Wait 10 seconds before replying to a notification."},
                {h: "10. Synthesis", b: "Freedom lives in the gap. +500 XP"}
            ]},
            { id: 7, title: "Atomic Habits", pages: [
                {h: "01. What", b: "Small, repeatable actions that compound into massive results."},
                {h: "02. Who", b: "James Clear."},
                {h: "03. When", b: "2018 (Peak Productivity era)."},
                {h: "04. Where", b: "Your daily environment."},
                {h: "05. Why", b: "Willpower is finite; systems are infinite."},
                {h: "06. How: Start", b: "Shrink a habit until it takes less than 2 minutes."},
                {h: "07. How: Middle", b: "Use 'Habit Stacking' (After X, I will do Y)."},
                {h: "08. How: End", b: "Change your environment to make cues invisible."},
                {h: "09. Exercise", b: "Set your gym clothes out before you sleep."},
                {h: "10. Synthesis", b: "You are the sum of your repetitions. +500 XP"}
            ]},
            { id: 8, title: "Dopamine Hijack", pages: [
                {h: "01. What", b: "Reclaiming your reward system from cheap stimulation."},
                {h: "02. Who", b: "Andrew Huberman and modern neuro-researchers."},
                {h: "03. When", b: "The era of the attention economy."},
                {h: "04. Where", b: "The Nucleus Accumbens."},
                {h: "05. Why", b: "Variable rewards (social media) destroy your focus baseline."},
                {h: "06. How: Start", b: "Eliminate 'easy' dopamine in the first 2 hours of the day."},
                {h: "07. How: Middle", b: "Engage in 'High Effort' rewards (reading, working out)."},
                {h: "08. How: End", b: "Reset your baseline through deliberate boredom."},
                {h: "09. Exercise", b: "Delete your most addictive app for 24 hours."},
                {h: "10. Synthesis", b: "Attention is your only real currency. +500 XP"}
            ]},
            { id: 9, title: "Stimulus Buffer", pages: [
                {h: "01. What", b: "Building a mental firewall against external triggers."},
                {h: "02. Who", b: "Albert Ellis (REBT)."},
                {h: "03. When", b: "1950s cognitive shift."},
                {h: "04. Where", b: "The space between your ear and your thought."},
                {h: "05. Why", b: "To stop being a puppet to other people's words."},
                {h: "06. How: Start", b: "Identify your top 3 emotional triggers."},
                {h: "07. How: Middle", b: "Reframe the trigger as 'neutral data' (like wind)."},
                {h: "08. How: End", b: "Respond to the data, not the emotion."},
                {h: "09. Exercise", b: "Intentionally read a comment you disagree with."},
                {h: "10. Synthesis", b: "You cannot be offended without your consent. +500 XP"}
            ]},
            { id: 10, title: "Metacognition", pages: [
                {h: "01. What", b: "The ability to observe your thoughts as a third party."},
                {h: "02. Who", b: "Jon Kabat-Zinn and eastern philosophy."},
                {h: "03. When", b: "Ancient wisdom meets modern neuroscience."},
                {h: "04. Where", b: "The Default Mode Network of the brain."},
                {h: "05. Why", b: "If you can see the thought, you are not the thought."},
                {h: "06. How: Start", b: "Label thoughts as they arrive (e.g., 'Worrying')."},
                {h: "07. How: Middle", b: "Don't judge the labels; just watch them pass."},
                {h: "08. How: End", b: "Return to the present physical sensation."},
                {h: "09. Exercise", b: "Sit for 5 minutes watching thoughts like clouds."},
                {h: "10. Synthesis", b: "Awareness is the end of automation. +500 XP"}
            ]},
            { id: 11, title: "Value Alignment", pages: [
                {h: "01. What", b: "Syncing your daily schedule with your true internal values."},
                {h: "02. Who", b: "Viktor Frankl (Logotherapy)."},
                {h: "03. When", b: "Post-WWII existentialism."},
                {h: "04. Where", b: "Your calendar and your checkbook."},
                {h: "05. Why", b: "Dissonance (acting against values) is the root of anxiety."},
                {h: "06. How: Start", b: "Write down your top 3 non-negotiable values."},
                {h: "07. How: Middle", b: "Audit your last 24 hours. Did you live them?"},
                {h: "08. How: End", b: "Delete one task today that violates your values."},
                {h: "09. Exercise", b: "Say 'No' to a social invite that drains you."},
                {h: "10. Synthesis", b: "Alignment is the highest form of peace. +500 XP"}
            ]},
            { id: 12, title: "Radical Honesty", pages: [
                {h: "01. What", b: "Total transparency about internal states to others."},
                {h: "02. Who", b: "Brad Blanton."},
                {h: "03. When", b: "1990s counter-culture psychology."},
                {h: "04. Where", b: "Your social and intimate relationships."},
                {h: "05. Why", b: "Lying (even social ones) creates a split in your psyche."},
                {h: "06. How: Start", b: "Stop saying 'I'm fine' when you are not."},
                {h: "07. How: Middle", b: "Express your actual feeling without blaming others."},
                {h: "08. How: End", b: "Observe the trust that honesty builds."},
                {h: "09. Exercise", b: "Tell a friend one true thing you've been hiding."},
                {h: "10. Synthesis", b: "Truth simplifies your entire life. +500 XP"}
            ]},
            { id: 13, title: "Identity Design", pages: [
                {h: "01. What", b: "The architectural construction of your self-narrative."},
                {h: "02. Who", b: "Maxwell Maltz and Benjamin Hardy."},
                {h: "03. When", b: "Modern self-transformation era."},
                {h: "04. Where", b: "The story you tell yourself about who you are."},
                {h: "05. Why", b: "You can only act in accordance with your identity."},
                {h: "06. How: Start", b: "Identify the old labels you use (e.g., 'I am lazy')."},
                {h: "07. How: Middle", b: "Write the profile of your 'Future Self' (Level 10)."},
                {h: "08. How: End", b: "Act 'as if' you are that future version right now."},
                {h: "09. Exercise", b: "Dress as the person you want to become tomorrow."},
                {h: "10. Synthesis", b: "You are the author, not the reader. +500 XP"}
            ]},
            { id: 14, title: "The Integration", pages: [
                {h: "01. What", b: "Fusing all 5 Skill Tree dimensions into a unified life."},
                {h: "02. Who", b: "The Indiviudated Self (Anika)."},
                {h: "03. When", b: "The transition to Level 2."},
                {h: "04. Where", b: "Your total daily experience."},
                {h: "05. Why", b: "Fragmented growth is unstable; unity is strength."},
                {h: "06. How: Start", b: "Review your K-Score progress across all tabs."},
                {h: "07. How: Middle", b: "Identify the dimension (e.g. Logic) you've neglected."},
                {h: "08. How: End", b: "Bridge that gap through intensive focus."},
                {h: "09. Exercise", b: "Synthesize one Logic lesson with one Empathy task."},
                {h: "10. Synthesis", b: "You are now whole. Tier 1 Mastery complete. +1000 XP"}
            ]}
        ];

        function App() {
            const [tab, setTab] = useState('dashboard');
            const [activeSkill, setActiveSkill] = useState(null);
            const [currentLesson, setCurrentLesson] = useState(null);
            const [lessonPage, setLessonPage] = useState(0);
            const [stats, setStats] = useState({ kScore: 527, xp: 420, level: 1, streak: 12 });
            const [mastered, setMastered] = useState([]);

            return (
                <div className="max-w-md mx-auto h-screen flex flex-col relative bg-slate-950">
                    
                    {/* LESSON STUDY OVERLAY (10 PAGES) */}
                    {currentLesson && (
                        <div className="fixed inset-0 z-[100] bg-slate-950 p-8 flex flex-col">
                            <div className="flex justify-between items-center mb-10">
                                <span className="text-cyan-400 font-black text-xs uppercase tracking-tighter">Lesson {currentLesson.id} • Slide {lessonPage + 1} / 10</span>
                                <button onClick={() => {setCurrentLesson(null); setLessonPage(0);}} className="text-slate-500 font-bold uppercase text-xs">Exit</button>
                            </div>
                            <div className="flex-1">
                                <h2 className="text-4xl font-800 mb-6 text-white uppercase tracking-tighter">{currentLesson.pages[lessonPage].h}</h2>
                                <div className="glass p-8 rounded-[2.5rem] border-l-4 border-cyan-500 text-xl italic text-slate-200 shadow-2xl">
                                    "{currentLesson.pages[lessonPage].b}"
                                </div>
                            </div>
                            <div className="flex gap-4 mt-8">
                                {lessonPage > 0 && <button onClick={() => setLessonPage(p => p - 1)} className="flex-1 py-5 glass rounded-2xl font-black uppercase text-xs">Back</button>}
                                {lessonPage < 9 ? (
                                    <button onClick={() => setLessonPage(p => p + 1)} className="flex-2 py-5 bg-cyan-500 text-slate-950 rounded-2xl font-black uppercase text-xs">Next Slide</button>
                                ) : (
                                    <button onClick={() => {setMastered([...mastered, currentLesson.id]); setStats(s => ({...s, kScore: s.kScore + 100})); setCurrentLesson(null); setLessonPage(0);}} className="flex-2 py-5 bg-green-500 text-slate-950 rounded-2xl font-black uppercase text-xs">Master Module</button>
                                )}
                            </div>
                        </div>
                    )}

                    {/* SKILL DOSSIER OVERLAY */}
                    {activeSkill && (
                        <div className="fixed inset-0 z-[100] bg-slate-950/95 flex items-center justify-center p-6 backdrop-blur-md">
                            <div className="glass p-8 rounded-[3rem] border border-cyan-500/30 w-full text-center shadow-2xl">
                                <h3 className={`text-3xl font-800 ${activeSkill.color} mb-4 uppercase tracking-tighter`}>{activeSkill.title}</h3>
                                <p className="text-slate-300 italic mb-6 leading-relaxed">"{activeSkill.summary}"</p>
                                <div className="p-5 glass rounded-3xl mb-8 border border-white/5">
                                    <p className="text-[10px] font-black text-slate-500 uppercase tracking-widest mb-1">SKILL FOCUS</p>
                                    <p className="text-xs font-bold text-cyan-400 uppercase tracking-tight">{activeSkill.sub}</p>
                                </div>
                                <button onClick={() => setActiveSkill(null)} className="w-full py-4 bg-slate-800 rounded-2xl font-black uppercase text-xs">Close Dossier</button>
                            </div>
                        </div>
                    )}

                    <header className="p-6 flex justify-between items-center bg-slate-950 border-b border-white/5 z-50">
                        <span className="font-black italic text-cyan-400 text-2xl tracking-tighter">K-SCORE OS</span>
                        <div className="glass px-3 py-1 rounded-full text-[11px] font-black text-amber-400 flex items-center gap-1">⚡ {stats.kScore}</div>
                    </header>

                    <main className="view-container">
                        {tab === 'dashboard' && (
                            <div className="p-6 space-y-6">
                                <div className="glass p-10 rounded-[3.5rem] text-center border-b-4 border-cyan-500/20">
                                    <h1 className="text-5xl font-800 uppercase italic tracking-tighter mb-2">ANIKA</h1>
                                    <p className="text-cyan-400 font-bold text-[10px] tracking-[0.4em] uppercase">{stats.streak} DAY STREAK</p>
                                </div>
                            </div>
                        )}
                        {tab === 'tree' && (
                            <div className="h-[450px] w-full flex items-center justify-center relative pt-10">
                                <div className="absolute mandala-rotate w-80 h-80 border border-white/5 rounded-full"></div>
                                <div className="z-10 w-24 h-24 glass rounded-full flex flex-col items-center justify-center border-2 border-cyan-400 node-pulse">
                                    <span className="text-xl font-800 italic uppercase">CORE</span>
                                </div>
                                {Object.entries(SKILL_DATA).map(([key, data], i) => {
                                    const angle = (i * 72) * (Math.PI / 180);
                                    return (
                                        <div key={key} onClick={() => setActiveSkill(data)}
                                             style={{ transform: `translate(${Math.cos(angle)*135}px, ${Math.sin(angle)*135}px)` }}
                                             className="absolute glass w-16 h-16 rounded-2xl flex items-center justify-center cursor-pointer border border-white/10 hover:border-cyan-400 active:scale-90 transition-all z-20">
                                            <span className={`text-2xl font-black ${data.color}`}>{data.icon}</span>
                                        </div>
                                    );
                                })}
                            </div>
                        )}
                        {tab === 'lessons' && (
                            <div className="p-6 space-y-4">
                                <h2 className="text-3xl font-800 tracking-tighter mb-6 uppercase">Curriculum</h2>
                                {LESSONS_DATA.map(l => (
                                    <div key={l.id} onClick={() => setCurrentLesson(l)} className="glass p-6 rounded-3xl border-l-4 border-cyan-500 cursor-pointer active:scale-95 transition-all">
                                        <h4 className="font-bold text-lg uppercase tracking-tight">{l.id}. {l.title}</h4>
                                        <p className="text-[10px] text-slate-500 uppercase mt-2 tracking-widest">10 Pages • +500 XP {mastered.includes(l.id) && "✓"}</p>
                                    </div>
                                ))}
                            </div>
                        )}
                        {tab === 'tasks' && (
                            <div className="p-6">
                                <button onClick={() => setStats(s => ({...s, kScore: s.kScore + 50}))} className="w-full py-6 bg-green-500 text-slate-950 rounded-3xl font-black uppercase text-xs shadow-lg shadow-green-500/20 active:scale-95 transition-all">Log Completion +50 XP</button>
                            </div>
                        )}
                    </main>

                    <nav className="fixed bottom-0 left-0 right-0 h-24 bg-slate-950 border-t border-white/10 flex justify-around items-center px-2 z-[60] backdrop-blur-xl">
                        {[
                            {id: 'dashboard', n: 'Dash'},
                            {id: 'moral', n: 'Moral'},
                            {id: 'lessons', n: 'Learn'},
                            {id: 'tree', n: 'Tree'},
                            {id: 'tasks', n: 'Task'},
                            {id: 'mind', n: 'Mind'}
                        ].map(t => (
                            <button key={t.id} onClick={() => setTab(t.id)} 
                                    className={`flex-1 h-full font-black text-[10px] uppercase ${tab === t.id ? 'tab-active' : 'text-slate-600'}`}>{t.n}</button>
                        ))}
                    </nav>
                </div>
            );
        }
        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
