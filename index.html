<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>K-SCORE | Individualistic</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap');
        body { background: #020617; font-family: 'Plus Jakarta Sans', sans-serif; color: white; }
        .glass { background: rgba(15, 23, 42, 0.7); backdrop-filter: blur(12px); border: 1px solid rgba(255,255,255,0.1); }
        .lesson-card { transition: all 0.2s; border-bottom: 4px solid rgba(0,0,0,0.3); }
        .lesson-card:active { transform: translateY(2px); border-bottom-width: 0px; }
        .completed { border-color: #22c55e !important; opacity: 0.8; }
        .page-entry { animation: slideUp 0.4s ease-out; }
        @keyframes slideUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        const Icon = ({ name, className }) => {
            useEffect(() => { lucide.createIcons(); }, [name]);
            return <i data-lucide={name.toLowerCase().replace(/([a-z0-9])([A-Z])/g, '$1-$2')} className={className}></i>;
        };

        const CONTENT = {
            lessons: [
                { id: 'stoic_1', cat: 'Stoicism', title: 'The Dichotomy of Control', author: 'Epictetus', body: 'The chief task in life is to identify what is under our control and what is not. We control our opinions, intentions, and desires. We do not control our reputation, our bodies, or the actions of others.', xp: 150 },
                { id: 'exist_1', cat: 'Existentialism', title: 'Existence Precedes Essence', author: 'Sartre', body: 'Man first of all exists, encounters himself, and defines himself afterwards. There is no pre-written script; you are the architect of your own meaning.', xp: 200 },
                { id: 'ethics_1', cat: 'Ethics', title: 'Categorical Imperative', author: 'Immanuel Kant', body: 'Act only according to that maxim whereby you can, at the same time, will that it should become a universal law. If everyone did what you are about to do, would the world function?', xp: 250 },
                { id: 'nietz_1', cat: 'Philosophy', title: 'Amor Fati', author: 'Nietzsche', body: 'My formula for greatness in a human being is amor fati: that one wants nothing to be different, not forward, not backward, not in all eternity. Not merely bear what is necessary, but love it.', xp: 200 },
                { id: 'psy_1', cat: 'Psychology', title: 'Shadow Integration', author: 'Carl Jung', body: 'Everyone carries a shadow, and the less it is embodied in the individual’s conscious life, the blacker and denser it is. To be whole, you must acknowledge your capacity for darkness.', xp: 300 }
            ],
            dilemmas: [
                { id: 'dil_1', title: 'The Trolley Problem', body: 'A runaway trolley is heading toward five people. You can pull a lever to switch it to a track with one person. Do you intervene?', choices: ['Switch Track (Utilitarian)', 'Do Nothing (Deontological)'], xp: 150 },
                { id: 'dil_2', title: 'The Ring of Gyges', body: 'If you had a ring that made you invisible and you could never be caught, would you still act justly?', choices: ['Yes, character matters', 'No, rules are for the seen'], xp: 150 }
            ],
            affirmations: [
                "My internal peace is my greatest power.",
                "I do not seek to be better than others, only better than I was yesterday.",
                "Discomfort is where my evolution happens.",
                "I am the observer of my thoughts, not the thoughts themselves."
            ],
            insights: [
                { title: 'The Guest House', author: 'Rumi', body: 'This being human is a guest house. Every morning a new arrival... The dark thought, the shame, the malice, meet them at the door laughing, and invite them in.' },
                { title: 'Ozymandias', author: 'Shelley', body: 'I met a traveller from an antique land... Look on my Works, ye Mighty, and despair! Nothing beside remains.' }
            ]
        };

        function App() {
            const [tab, setTab] = useState('home');
            const [activeItem, setActiveItem] = useState(null);
            const [completedIds, setCompletedIds] = useState([]);
            const [stats, setStats] = useState({ kScore: 0, level: 1, xp: 0 });

            const handleComplete = (item) => {
                if (!completedIds.includes(item.id)) {
                    setStats(prev => {
                        const newXp = prev.xp + item.xp;
                        const newLevel = Math.floor(newXp / 500) + 1;
                        return { ...prev, xp: newXp, level: newLevel, kScore: prev.kScore + Math.floor(item.xp / 10) };
                    });
                    setCompletedIds([...completedIds, item.id]);
                }
                setActiveItem(null);
            };

            if (activeItem) {
                return (
                    <div className="fixed inset-0 z-[100] bg-slate-950 p-8 flex flex-col page-entry">
                        <button onClick={() => setActiveItem(null)} className="mb-8 text-slate-500 hover:text-white transition-colors"><Icon name="X" /></button>
                        <div className="flex-1 overflow-y-auto">
                            <p className="text-cyan-500 font-bold uppercase text-xs tracking-widest mb-2">{activeItem.cat || 'Intellectual Choice'}</p>
                            <h2 className="text-4xl font-800 mb-6 leading-tight">{activeItem.title}</h2>
                            <div className="glass p-6 rounded-3xl text-lg leading-relaxed text-slate-200 mb-8 border-l-4 border-cyan-500">
                                {activeItem.body}
                            </div>
                        </div>
                        <button 
                            onClick={() => handleComplete(activeItem)}
                            className={`w-full py-5 rounded-2xl font-black text-xl lesson-card ${completedIds.includes(activeItem.id) ? 'bg-slate-800 text-slate-500' : 'bg-cyan-500 text-slate-950 shadow-[0_4px_20px_rgba(6,182,212,0.4)]'}`}
                        >
                            {completedIds.includes(activeItem.id) ? 'ALREADY COMPLETED' : `FINISH +${activeItem.xp} XP`}
                        </button>
                    </div>
                );
            }

            return (
                <div className="max-w-md mx-auto min-h-screen pb-32">
                    <header className="p-6 flex justify-between items-center sticky top-0 bg-slate-950/90 backdrop-blur-md z-50 border-b border-white/5">
                        <span className="font-black tracking-tighter text-xl text-cyan-400">K-SCORE</span>
                        <div className="flex items-center gap-2 bg-slate-900 px-3 py-1 rounded-full border border-white/10">
                            <Icon name="Zap" className="w-4 h-4 text-amber-400" />
                            <span className="font-bold text-sm">{stats.kScore}</span>
                        </div>
                    </header>

                    <div className="page-entry">
                        {tab === 'home' && (
                            <div className="p-6 space-y-6">
                                <div className="glass p-8 rounded-[2.5rem] text-center relative overflow-hidden">
                                    <h1 className="text-4xl font-800 italic uppercase mb-2">Anika</h1>
                                    <p className="text-cyan-400 font-bold tracking-widest text-xs mb-6 uppercase">Level {stats.level} • Evolver</p>
                                    <div className="h-2 w-full bg-slate-800 rounded-full mb-2">
                                        <div className="h-full bg-cyan-500 rounded-full transition-all duration-500" style={{width: `${(stats.xp % 500) / 5}%`}}></div>
                                    </div>
                                    <p className="text-[10px] text-slate-500 font-bold uppercase tracking-widest">XP: {stats.xp % 500} / 500 to Next Level</p>
                                </div>
                                <div className="grid grid-cols-2 gap-4">
                                    <div className="glass p-5 rounded-3xl text-center">
                                        <p className="text-[10px] text-slate-500 font-bold uppercase">Total XP</p>
                                        <p className="text-2xl font-black">{stats.xp}</p>
                                    </div>
                                    <div className="glass p-5 rounded-3xl text-center">
                                        <p className="text-[10px] text-slate-500 font-bold uppercase">Lessons Done</p>
                                        <p className="text-2xl font-black">{completedIds.length}</p>
                                    </div>
                                </div>
                                <button onClick={() => setTab('lessons')} className="w-full py-5 bg-white text-slate-950 rounded-2xl font-black text-xl lesson-card">RESUME PATH</button>
                            </div>
                        )}

                        {tab === 'lessons' && (
                            <div className="p-6 space-y-4">
                                <h2 className="text-2xl font-800 mb-6">Curriculum</h2>
                                {CONTENT.lessons.map(l => (
                                    <div key={l.id} onClick={() => setActiveItem(l)} 
                                         className={`glass p-5 rounded-2xl border-l-4 border-cyan-500 cursor-pointer ${completedIds.includes(l.id) ? 'completed' : ''}`}>
                                        <div className="flex justify-between items-center">
                                            <div>
                                                <p className="text-[10px] text-cyan-400 font-bold uppercase mb-1">{l.cat}</p>
                                                <h3 className="font-bold text-lg">{l.title}</h3>
                                            </div>
                                            {completedIds.includes(l.id) ? <Icon name="CheckCircle" className="text-green-500" /> : <Icon name="ChevronRight" className="text-slate-600" />}
                                        </div>
                                    </div>
                                ))}
                            </div>
                        )}

                        {tab === 'dilemmas' && (
                            <div className="p-6 space-y-4">
                                <h2 className="text-2xl font-800 mb-6">Moral Dilemmas</h2>
                                {CONTENT.dilemmas.map(d => (
                                    <div key={d.id} onClick={() => setActiveItem(d)} className="glass p-6 rounded-3xl border-l-4 border-amber-500 cursor-pointer">
                                        <h3 className="font-bold text-xl mb-2">{d.title}</h3>
                                        <p className="text-sm text-slate-400">Decide the outcome...</p>
                                    </div>
                                ))}
                            </div>
                        )}

                        {tab === 'affirmations' && (
                            <div className="p-6 space-y-4">
                                <h2 className="text-2xl font-800 mb-6">Daily Affirmations</h2>
                                {CONTENT.affirmations.map((a, i) => (
                                    <div key={i} className="glass p-6 rounded-2xl text-lg font-bold italic text-slate-300 border border-white/5">"{a}"</div>
                                ))}
                            </div>
                        )}

                        {tab === 'insights' && (
                            <div className="p-6 space-y-4">
                                <h2 className="text-2xl font-800 mb-6">Literary Insights</h2>
                                {CONTENT.insights.map((ins, i) => (
                                    <div key={i} onClick={() => setActiveItem({cat: 'Poetry', ...ins})} className="glass p-6 rounded-3xl border-l-4 border-purple-500 cursor-pointer">
                                        <h3 className="font-bold text-xl mb-1 italic">{ins.title}</h3>
                                        <p className="text-sm text-slate-500">{ins.author}</p>
                                    </div>
                                ))}
                            </div>
                        )}
                    </div>

                    <nav className="fixed bottom-0 left-0 right-0 max-w-md mx-auto h-24 bg-slate-950/80 backdrop-blur-xl border-t border-white/5 flex justify-around items-center px-4 z-50">
                        <button onClick={() => setTab('lessons')} className={`flex flex-col items-center ${tab === 'lessons' ? 'text-cyan-400' : 'text-slate-600'}`}><Icon name="Book" /><span className="text-[10px] font-bold mt-1 uppercase">Learn</span></button>
                        <button onClick={() => setTab('dilemmas')} className={`flex flex-col items-center ${tab === 'dilemmas' ? 'text-cyan-400' : 'text-slate-600'}`}><Icon name="Scale" /><span className="text-[10px] font-bold mt-1 uppercase">Moral</span></button>
                        <button onClick={() => setTab('home')} className={`-mt-10 bg-white p-4 rounded-full shadow-2xl transition-transform ${tab === 'home' ? 'scale-110' : ''}`}><Icon name="Home" className="text-slate-950" /></button>
                        <button onClick={() => setTab('affirmations')} className={`flex flex-col items-center ${tab === 'affirmations' ? 'text-cyan-400' : 'text-slate-600'}`}><Icon name="Heart" /><span className="text-[10px] font-bold mt-1 uppercase">Mind</span></button>
                        <button onClick={() => setTab('insights')} className={`flex flex-col items-center ${tab === 'insights' ? 'text-cyan-400' : 'text-slate-600'}`}><Icon name="Sparkles" /><span className="text-[10px] font-bold mt-1 uppercase">Insight</span></button>
                    </nav>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
