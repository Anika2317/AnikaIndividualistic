<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>K-SCORE | Neural OS</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;800&display=swap');
        body { background: #020617; font-family: 'Plus Jakarta Sans', sans-serif; color: white; margin: 0; padding: 0; overflow: hidden; }
        .glass { background: rgba(15, 23, 42, 0.85); backdrop-filter: blur(20px); border: 1px solid rgba(255,255,255,0.1); }
        .mandala-rotate { animation: rotate 100s linear infinite; }
        @keyframes rotate { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
        .tab-active { color: #22d3ee !important; filter: drop-shadow(0 0 8px #22d3ee); }
        .view-container { height: calc(100vh - 160px); overflow-y: auto; }
        .node-pulse { animation: pulse 2s infinite; }
        @keyframes pulse { 0% { box-shadow: 0 0 0 0 rgba(34, 211, 238, 0.4); } 70% { box-shadow: 0 0 0 15px rgba(34, 211, 238, 0); } 100% { box-shadow: 0 0 0 0 rgba(34, 211, 238, 0); } }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState } = React;

        const SKILL_DATA = {
            logic: { title: "Strategic Logic", icon: "L", color: "text-cyan-400", summary: "Deconstructing reality via First Principles.", sub: "Socratic Inquiry" },
            empathy: { title: "Radical Empathy", icon: "E", color: "text-pink-400", summary: "Cognitive mapping of internal worlds.", sub: "Perspective Shifting" },
            discipline: { title: "Iron Discipline", icon: "D", color: "text-orange-400", summary: "Subordinating impulse to strategy.", sub: "Dopamine Control" },
            regulation: { title: "Regulation", icon: "R", color: "text-blue-400", summary: "Buffer zone between stimulus and response.", sub: "Metacognition" },
            integrity: { title: "Total Integrity", icon: "I", color: "text-green-400", summary: "Alignment of values and actions.", sub: "Radical Honesty" }
        };

        function App() {
            const [tab, setTab] = useState('dashboard');
            const [activeSkill, setActiveSkill] = useState(null);
            const [stats, setStats] = useState({ kScore: 527, xp: 420, level: 1, streak: 12 });

            const addXP = (amt) => setStats(s => ({...s, xp: s.xp + amt, kScore: s.kScore + Math.floor(amt/5)}));

            return (
                <div className="max-w-md mx-auto h-screen flex flex-col relative overflow-hidden">
                    {/* Header */}
                    <header className="p-6 flex justify-between items-center bg-slate-950/90 border-b border-white/5 z-50">
                        <span className="font-black italic text-cyan-400 tracking-tighter">K-SCORE OS</span>
                        <div className="flex gap-2">
                            <div className="glass px-3 py-1 rounded-full text-[10px] font-bold text-amber-400 flex items-center gap-1">⚡ {stats.kScore}</div>
                            <div className="bg-cyan-500 px-3 py-1 rounded-full text-[10px] font-black text-slate-900 uppercase">LVL {stats.level}</div>
                        </div>
                    </header>

                    {/* Skill Modal */}
                    {activeSkill && (
                        <div className="fixed inset-0 z-[100] bg-slate-950/95 flex items-center justify-center p-6 backdrop-blur-md">
                            <div className="glass p-8 rounded-[3rem] border border-cyan-500/30 w-full text-center">
                                <h3 className={`text-3xl font-800 ${activeSkill.color} mb-2`}>{activeSkill.title}</h3>
                                <p className="text-slate-300 italic mb-4">"{activeSkill.summary}"</p>
                                <p className="text-[10px] font-black uppercase text-slate-500 tracking-widest mb-6">Mastering: {activeSkill.sub}</p>
                                <button onClick={() => setActiveSkill(null)} className="w-full py-4 bg-slate-800 rounded-2xl font-black text-xs uppercase tracking-widest">Close Dossier</button>
                            </div>
                        </div>
                    )}

                    <main className="view-container">
                        {tab === 'dashboard' && (
                            <div className="p-6 space-y-6 animate-in fade-in">
                                <div className="glass p-10 rounded-[3rem] text-center border-b-4 border-cyan-500/20">
                                    <h1 className="text-4xl font-800 italic uppercase mb-2">ANIKA</h1>
                                    <p className="text-cyan-400 font-bold text-[10px] tracking-[0.4em] mb-6">{stats.streak} DAY STREAK</p>
                                    <div className="h-1.5 w-full bg-slate-800 rounded-full overflow-hidden">
                                        <div className="h-full bg-cyan-400" style={{width: '45%'}}></div>
                                    </div>
                                </div>
                            </div>
                        )}

                        {tab === 'tree' && (
                            <div className="h-full w-full flex items-center justify-center relative pt-10">
                                <div className="absolute mandala-rotate w-80 h-80 border border-white/5 rounded-full"></div>
                                <div className="z-10 w-24 h-24 glass rounded-full flex flex-col items-center justify-center border-2 border-cyan-400/50 node-pulse">
                                    <span className="text-[8px] text-slate-500 font-black uppercase">Neural</span>
                                    <span className="text-xl font-800 italic">CORE</span>
                                </div>
                                {Object.entries(SKILL_DATA).map(([key, data], i) => {
                                    const angle = (i * 72) * (Math.PI / 180);
                                    const x = Math.cos(angle) * 135;
                                    const y = Math.sin(angle) * 135;
                                    return (
                                        <div key={key} onClick={() => setActiveSkill(data)}
                                             style={{ transform: `translate(${x}px, ${y}px)` }}
                                             className="absolute glass w-16 h-16 rounded-2xl flex items-center justify-center cursor-pointer border border-white/10 hover:border-cyan-400 transition-all z-20 shadow-xl">
                                            <span className={`text-xl font-black ${data.color}`}>{data.icon}</span>
                                        </div>
                                    );
                                })}
                            </div>
                        )}

                        {tab === 'dilemmas' && (
                            <div className="p-6 space-y-4 animate-in fade-in">
                                <h2 className="text-2xl font-800 text-amber-500">Moral Scenarios</h2>
                                <div className="glass p-6 rounded-3xl border-l-4 border-amber-500">
                                    <h4 className="font-bold text-lg">The Hospital Choice</h4>
                                    <p className="text-sm text-slate-400 mt-2 italic">Five patients vs One traveler.</p>
                                    <button onClick={() => addXP(100)} className="mt-4 w-full py-4 bg-amber-500/10 text-amber-500 rounded-xl font-black text-[10px] uppercase border border-amber-500/30">Begin Analysis</button>
                                </div>
                            </div>
                        )}

                        {tab === 'challenges' && (
                            <div className="p-6 space-y-4 animate-in fade-in">
                                <h2 className="text-2xl font-800 text-green-400">Daily Task</h2>
                                <div className="glass p-8 rounded-3xl text-center">
                                    <p className="font-bold text-slate-200 leading-relaxed mb-8 italic">"Log 10 minutes of disciplined reflection today."</p>
                                    <button onClick={() => addXP(50)} className="w-full py-5 bg-green-500 text-slate-950 rounded-2xl font-black shadow-lg">LOG COMPLETION</button>
                                </div>
                            </div>
                        )}
                        
                        {(tab === 'lessons' || tab === 'mind') && (
                            <div className="p-10 text-center text-slate-500 mt-20 italic animate-in fade-in">
                                Archives loading (23 modules required for Tier 2)
                            </div>
                        )}
                    </main>

                    {/* Bottom Navigation */}
                    <nav className="fixed bottom-0 left-0 right-0 max-w-md mx-auto h-24 bg-slate-950/95 border-t border-white/10 flex justify-around items-center px-1 z-[60]">
                        <button onClick={() => setTab('dashboard')} className={`flex flex-col items-center flex-1 transition-all ${tab === 'dashboard' ? 'tab-active' : 'text-slate-600'}`}><span className="text-[10px] font-black uppercase tracking-tighter">Dash</span></button>
                        <button onClick={() => setTab('dilemmas')} className={`flex flex-col items-center flex-1 transition-all ${tab === 'dilemmas' ? 'tab-active' : 'text-slate-600'}`}><span className="text-[10px] font-black uppercase tracking-tighter">Moral</span></button>
                        <button onClick={() => setTab('lessons')} className={`flex flex-col items-center flex-1 transition-all ${tab === 'lessons' ? 'tab-active' : 'text-slate-600'}`}><span className="text-[10px] font-black uppercase tracking-tighter">Learn</span></button>
                        <button onClick={() => setTab('tree')} className={`flex flex-col items-center flex-1 transition-all ${tab === 'tree' ? 'tab-active' : 'text-slate-600'}`}><span className="text-[10px] font-black uppercase tracking-tighter">Tree</span></button>
                        <button onClick={() => setTab('challenges')} className={`flex flex-col items-center flex-1 transition-all ${tab === 'challenges' ? 'tab-active' : 'text-slate-600'}`}><span className="text-[10px] font-black uppercase tracking-tighter">Task</span></button>
                        <button onClick={() => setTab('mind')} className={`flex flex-col items-center flex-1 transition-all ${tab === 'mind' ? 'tab-active' : 'text-slate-600'}`}><span className="text-[10px] font-black uppercase tracking-tighter">Mind</span></button>
                    </nav>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
