                    { title: "07. The Integrity Integrity", content: "Integrity doesn't mean 'never lie.' It means 'integrated'—your inside matches your outside. You say what you mean. You do what you say. You are consistent across contexts. People trust you because you're coherent. This is rare." },
                    { title: "08. The Difficult Choices", content: "Values alignment often requires leaving comfortable situations. The job that pays well but violates your values. The relationship that's easy but misaligned. The social circle you've outgrown. Alignment costs. But misalignment costs more—your soul." },
                    { title: "09. The Daily Alignment Check", content: "Each night, ask: 'Where did I compromise my values today? Where was I fully aligned?' Not as judgment—as data. Patterns emerge. You see where the pressure points are. Then you can make conscious changes." },
                    { title: "10. Mastery: The Integrated Self", content: "You know your values deeply. You live them daily. Your words match your actions. People feel your coherence—they trust you. You feel your coherence—you trust yourself. This is the foundation of everything. +500 XP." }
                ]
            },
            {
                id: 12,
                title: "Radical Honesty: The Vulnerability Superpower",
                category: "Integrity",
                pages: [
                    { title: "01. Radical Honesty Is Rare", content: "Most people perform all day. They hide insecurities, pretend confidence, fake interest. It's exhausting. Radical honesty means saying what's true, even when uncomfortable. Even when vulnerable. This honesty is the most powerful thing you can offer." },
                    { title: "02. The Cost of Pretense", content: "You manage your image constantly. 'Don't let them see you're scared.' 'Pretend everything's fine.' 'Never show weakness.' This pretense fractures you. You're always 'on.' You can never rest. And people never know the real you—so you're never truly known." },
                    { title: "03. Vulnerability Is Not Weakness", content: "Brené Brown: 'Vulnerability is the birthplace of innovation, creativity, and change.' When you're honest about struggles, others recognize themselves in you. Real connection becomes possible. Real leadership becomes possible. Only the brave are truly strong." },
                    { title: "04. The Permission to Not Know", content: "You don't have to have answers. You can say 'I don't know.' 'I'm scared.' 'I made a mistake.' 'I need help.' These statements aren't weakness; they're honesty. They're also attractive—people trust honest people more than perfect-seeming people." },
                    { title: "05. Speaking Your Truth, Gently", content: "Honesty isn't cruelty. You can be truthful and kind. 'I don't think this is working' (honest) vs. 'You're terrible' (cruel). Radical honesty = maximum truth + maximum compassion. Both. Not either-or." },
                    { title: "06. The Relationships That Can't Handle Honesty", content: "Some relationships require performance. Some people punish honesty. Recognize these. You can be kind to these relationships without being fully honest. But seek relationships where honesty is safe. These are your real relationships." },
                    { title: "07. Admitting Mistakes Builds Trust", content: "You mess up. Instead of hiding it, you say: 'I was wrong. Here's what I learned. Here's how I'll do it differently.' People don't trust perfection; they trust integrity. Admitting mistakes shows integrity. This builds loyalty." },
                    { title: "08. Honest Feedback Is a Gift", content: "Most people won't tell you the truth—your breath, your idea, your behavior. Real friends tell you. It's uncomfortable. But it's the only way you grow. Learn to both give and receive honest feedback. This is how you evolve." },
                    { title: "09. Practice: Tell One Hard Truth", content: "This week, tell someone one thing you've been holding back. It could be admitting a mistake, sharing a struggle, expressing a boundary. Start small. Notice: Most people respond with respect, not judgment. Your fear is bigger than their judgment." },
                    { title: "10. Mastery: The Authentic Human", content: "You don't perform anymore. You're honest about struggles, mistakes, limitations. You're also honest about strengths, dreams, joy. People know the real you—and they're drawn to it. This authenticity is your greatest power. +500 XP." }
                ]
            },
            {
                id: 13,
                title: "Building an Unshakeable Identity",
                category: "Integrity",
                pages: [
                    { title: "01. Identity Shapes Everything", content: "Your identity is the filter through which you see all of reality. 'I'm a victim' → sees injustice everywhere. 'I'm capable' → sees opportunity everywhere. Same world, different filters. Your identity literally creates your reality." },
                    { title: "02. You Have Multiple Identities", content: "You're different around parents, friends, colleagues. This is normal—but one identity should be consistent: your core self. The version of you that's true in private is your real identity. Everything else is adaptation." },
                    { title: "03. Identity Is Narrative", content: "Your identity is a story you tell yourself: 'I'm not creative.' 'I'm naturally anxious.' 'I'm not good with people.' These stories were written by past experiences. But stories can be rewritten. The narrative is real only if you believe it." },
                    { title: "04. The Identity-Behavior Loop", content: "Identity → Behavior → Results → Strengthened Identity. You see yourself as 'disciplined' → you act disciplined → you get results → you're even more disciplined. Or: you see yourself as 'lazy' → you act lazy → you get poor results → you're more lazy. The loop is real." },
                    { title: "05. Building Identity Through Micro-Decisions", content: "Each choice votes for an identity. Choosing the gym votes for 'I'm someone who prioritizes health.' Choosing the book votes for 'I'm someone who grows.' 100 small choices build identity faster than one big decision. Consistency matters more than intensity." },
                    { title: "06. Who Do You Want to Become?", content: "Not 'What do I want to achieve?' but 'Who do I want to be?' Identity precedes achievement. Decide: Are you someone who's disciplined? Creative? Courageous? Generous? Then act from that identity daily. The person comes before the results." },
                    { title: "07. The Identity You Defend Is the One You'll Maintain", content: "You defend your identity fiercely—even negative ones. 'I'm shy' → you turn down social invites (defending the identity). 'I'm not creative' → you don't try creative projects (defending it). Notice where you defend your identity, and you'll see what you're protecting." },
                    { title: "08. Shedding Old Identities", content: "You outgrow old identities. The 'shy' identity worked in childhood but now limits you. The 'victim' identity got sympathy but now disempowers you. You don't have to fight these—just stop defending them. Let them naturally fade as you build new ones." },
                    { title: "09. The Unshakeable Identity", content: "This identity isn't based on external success: status, money, appearance. It's based on internal values: integrity, growth, contribution. When you build identity on unchangeable values, not external circumstances, it becomes unshakeable." },
                    { title: "10. Mastery: The Deliberate Self", content: "You're intentionally building your identity through daily choices. You're not reacting to circumstances; you're acting from identity. You're becoming the person you decided to become. This is the highest form of power. +500 XP." }
                ]
            },
            {
                id: 14,
                title: "The Integration: Becoming Whole",
                category: "Synthesis",
                pages: [
                    { title: "01. What Does Wholeness Mean?", content: "Wholeness isn't perfection. It's integration: your thoughts align with your values, your words match your actions, your shadow is acknowledged, your strengths are developed, your vulnerability is strength. You're one person everywhere. This is rare and powerful." },
                    { title: "02. The Six Pillars You've Built", content: "Logic (First Principles, Socratic Method) → Your thinking is clear. Empathy (Cognitive Mapping, Shadow Work) → Your understanding of humans is deep. Discipline (Impulse Control, Atomic Habits, Dopamine) → Your actions are deliberate. Regulation (Stimulus-Response, Metacognition) → Your emotions are owned. Integrity (Values, Honesty, Identity) → Your self is coherent." },
                    { title: "03. The Synergy Effect", content: "Each pillar alone is powerful. Together, they create exponential power. Clear thinking + deep empathy + deliberate action + emotional mastery + coherent identity = unstoppable human. You're not just building skills; you're building an integrated person." },
                    { title: "04. The Daily Practice", content: "Morning: Clarify your values (Integrity) + set intentions (Identity). Throughout day: Apply First Principles (Logic) + observe your thoughts (Metacognition) + pause between stimulus and response (Regulation) + act deliberately (Discipline). Evening: Reflect on alignment (Integrity)." },
                    { title: "05. The Cascading Transformations", content: "Better thinking → clearer decisions → better results → stronger identity. Better regulation → less reactivity → stronger relationships → more success. Each pillar strengthens the others. You're not building separate skills; you're building a unified system." },
                    { title: "06. Mastery Is the Commitment", content: "You won't master all pillars in months. Years, maybe. But you don't need to be perfect. You need to be committed. One day of practice builds one day of mastery. One month of practice builds one month of mastery. Consistency compounds." },
                    { title: "07. The Obstacles Are the Path", content: "When you fail at discipline, you learn about your values. When you're triggered, you learn about your shadow. When you're dishonest, you learn about your identity. Every obstacle is feedback. Obstacles aren't stopping you; they're showing you where you need to integrate." },
                    { title: "08. You Can't Master Others Until You Master Yourself", content: "You can't lead without integrity. Can't inspire without clarity. Can't connect without empathy. The work starts internal. Master yourself, and influence others naturally. You become a model, not a poser." },
                    { title: "09. The Final Exercise: Your Integration Plan", content: "Write: 1. What's one value you haven't been living? 2. What's one belief that's holding you back? 3. What's one impulse you need to control? 4. What's one relationship you need to be more honest in? 5. Who do you want to become? Now, build one practice for each." },
                    { title: "10. You Are Whole. Now Build From There.", content: "You've integrated logic, empathy, discipline, regulation, and integrity. You're no longer fragmented. You know yourself. You trust yourself. You act from intention, not reaction. This is mastery. This is wholeness. This is freedom. +1000 XP. Welcome to the rest of your life." }
                ]
            }
        ];

        function App() {
            const [tab, setTab] = useState('dashboard');
            const [xp, setXp] = useState(527);
            const [level, setLevel] = useState(1);
            const [lessonPage, setLessonPage] = useState(-1);
            const [activeLessonId, setActiveLessonId] = useState(null);
            const [activeSkill, setActiveSkill] = useState(null);
            const [completedLessons, setCompletedLessons] = useState({});

            const skills = [
                { id: 'logic', title: 'Strategic Logic', icon: '⚛', color: '#06b6d4', desc: 'First Principles Thinking' },
                { id: 'empathy', title: 'Radical Empathy', icon: '♥', color: '#ec4899', desc: 'Cognitive Mapping' },
                { id: 'discipline', title: 'Iron Discipline', icon: '🛡', color: '#f97316', desc: 'Impulse Control' },
                { id: 'regulation', title: 'Mind Regulation', icon: '⚙', color: '#3b82f6', desc: 'Metacognition' },
                { id: 'integrity', title: 'Total Integrity', icon: '⚓', color: '#22c55e', desc: 'Values Alignment' }
            ];

            const startLesson = (lesson) => {
                setActiveLessonId(lesson.id);
                setLessonPage(0);
            };

            const completeLesson = () => {
                if (!completedLessons[activeLessonId]) {
                    setXp(xp + 500);
                    setCompletedLessons({...completedLessons, [activeLessonId]: true});
                }
                setLessonPage(-1);
                setActiveLessonId(null);
            };

            const currentLesson = LESSONS.find(l => l.id === activeLessonId);

            return (
                <div className="w-full h-screen flex flex-col bg-slate-950">
                    <header className="bg-slate-900 border-b border-slate-700 p-4 flex justify-between items-center">
                        <h1 className="text-2xl font-bold text-cyan-400">K-SCORE OS</h1>
                        <div className="flex gap-3">
                            <div className="bg-slate-800 px-3 py-1 rounded text-sm font-bold">⚡ {xp} XP</div>
                            <div className="bg-cyan-500 text-slate-900 px-3 py-1 rounded text-sm font-bold">LVL {level}</div>
                        </div>
                    </header>

                    <main className="flex-1 overflow-y-auto p-6">
                        {tab === 'dashboard' && (
                            <div className="space-y-6 max-w-2xl">
                                <div className="glass p-8 rounded-2xl text-center border-l-4 border-cyan-400">
                                    <h2 className="text-5xl font-black mb-2">ANIKA</h2>
                                    <p className="text-cyan-400 text-sm mb-4">12 DAY STREAK 🔥</p>
                                    <div className="w-full bg-slate-800 rounded-full h-2">
                                        <div className="bg-cyan-400 h-full rounded-full" style={{width: '45%'}}></div>
                                    </div>
                                    <p className="text-xs text-slate-400 mt-2">{xp} / 7000 XP to Level 3</p>
                                    <p className="text-xs text-slate-500 mt-4">{Object.keys(completedLessons).length} / 14 Lessons Complete</p>
                                </div>
                            </div>
                        )}

                        {tab === 'lessons' && (
                            <div className="max-w-4xl space-y-4">
                                <h2 className="text-3xl font-black mb-6">📚 Deep Curriculum (14 Lessons)</h2>
                                <div className="grid gap-4">
                                    {LESSONS.map(lesson => (
                                        <button
                                            key={lesson.id}
                                            onClick={() => startLesson(lesson)}
                                            className="glass p-6 rounded-xl border-l-4 border-cyan-400 hover:bg-slate-800 transition text-left"
                                        >
                                            <div className="flex justify-between items-start">
                                                <div>
                                                    <h3 className="text-xl font-bold mb-2">{lesson.id}. {lesson.title}</h3>
                                                    <p className="text-sm text-slate-400">{lesson.category} • 10 Pages</p>
                                                </div>
                                                <div className="text-right">
                                                    <p className="text-xs text-cyan-400">+500 XP</p>
                                                    {completedLessons[lesson.id] && <p className="text-green-400 text-sm">✓ Done</p>}
                                                </div>
                                            </div>
                                        </button>
                                    ))}
                                </div>
                            </div>
                        )}

                        {tab === 'tree' && (
                            <div className="max-w-2xl">
                                <h2 className="text-3xl font-black mb-8">⚛ Neural Mandala</h2>
                                <div className="grid grid-cols-2 gap-4">
                                    {skills.map(skill => (
                                        <button
                                            key={skill.id}
                                            onClick={() => setActiveSkill(skill)}
                                            className="glass p-6 rounded-xl border border-slate-700 hover:border-cyan-400 transition"
                                        >
                                            <div className="text-4xl mb-2">{skill.icon}</div>
                                            <h3 className="font-bold text-sm">{skill.title}</h3>
                                            <p className="text-xs text-slate-400 mt-1">{skill.desc}</p>
                                        </button>
                                    ))}
                                </div>
                            </div>
                        )}

                        {tab === 'tasks' && (
                            <div className="max-w-2xl space-y-4">
                                <h2 className="text-3xl font-black text-green-400 mb-6">✓ Daily Tasks</h2>
                                <div className="glass p-6 rounded-xl">
                                    <p className="mb-4">Log 10 minutes of reflection today</p>
                                    <button
                                        onClick={() => setXp(xp + 50)}
                                        className="w-full bg-green-500 text-slate-900 font-bold py-2 rounded-lg hover:bg-green-600"
                                    >
                                        Log Task +50 XP
                                    </button>
                                </div>
                            </div>
                        )}

                        {(tab === 'dilemmas' || tab === 'mind') && (
                            <div className="text-center text-slate-500 mt-20">Coming soon...</div>
                        )}
                    </main>

                    {lessonPage >= 0 && currentLesson && (
                        <div className="fixed inset-0 z-50 bg-slate-950 flex flex-col p-6 overflow-y-auto">
                            <div className="flex justify-between items-center mb-6">
                                <span className="text-cyan-400 font-bold text-sm">Lesson {currentLesson.id} • Page {lessonPage + 1} / 10</span>
                                <button
                                    onClick={() => {
                                        setLessonPage(-1);
                                        setActiveLessonId(null);
                                    }}
                                    className="text-slate-400 hover:text-white text-2xl font-bold"
                                >
                                    ✕
                                </button>
                            </div>

                            <h2 className="text-3xl font-black mb-6">{currentLesson.pages[lessonPage].title}</h2>

                            <div className="glass p-8 rounded-2xl mb-6 flex-1">
                                <p className="text-lg leading-relaxed text-slate-200">{currentLesson.pages[lessonPage].content}</p>
                            </div>

                            <div className="flex gap-4">
                                {lessonPage > 0 && (
                                    <button
                                        onClick={() => setLessonPage(lessonPage - 1)}
                                        className="flex-1 bg-slate-800 text-white font-bold py-3 rounded-lg hover:bg-slate-700"
                                    >
                                        ← Back
                                    </button>
                                )}
                                {lessonPage < 9 ? (
                                    <button
                                        onClick={() => setLessonPage(lessonPage + 1)}
                                        className="flex-1 bg-cyan-500 text-slate-950 font-bold py-3 rounded-lg hover:bg-cyan-600"
                                    >
                                        Next →
                                    </button>
                                ) : (
                                    <button
                                        onClick={completeLesson}
                                        className="flex-1 bg-green-500 text-slate-950 font-bold py-3 rounded-lg hover:bg-green-600"
                                    >
                                        Finish ✓
                                    </button>
                                )}
                            </div>
                        </div>
                    )}

                    {activeSkill && (
                        <div className="fixed inset-0 z-50 bg-slate-950/80 flex items-center justify-center p-6">
                            <div className="glass p-8 rounded-2xl max-w-sm text-center border border-cyan-400/20">
                                <div className="text-5xl mb-4">{activeSkill.icon}</div>
                                <h3 className="text-2xl font-black mb-2">{activeSkill.title}</h3>
                                <p className="text-slate-300 mb-6">{activeSkill.desc}</p>
                                <button
                                    onClick={() => setActiveSkill(null)}
                                    className="w-full bg-slate-800 text-white font-bold py-2 rounded-lg hover:bg-slate-700"
                                >
                                    Close
                                </button>
                            </div>
                        </div>
                    )}

                    <nav className="bg-slate-900 border-t border-slate-700 flex justify-around items-center h-20">
                        {[
                            { label: 'Dashboard', id: 'dashboard' },
                            { label: 'Dilemmas', id: 'dilemmas' },
                            { label: 'Lessons', id: 'lessons' },
                            { label: 'Skills', id: 'tree' },
                            { label: 'Tasks', id: 'tasks' },
                            { label: 'Mind', id: 'mind' }
                        ].map(item => (
                            <button
                                key={item.id}
                                onClick={() => setTab(item.id)}
                                className={`flex-1 py-2 text-xs font-bold transition ${
                                    tab === item.id ? 'active-nav' : 'text-slate-500'
                                }`}
                            >
                                {item.label}
                            </button>
                        ))}
                    </nav>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
