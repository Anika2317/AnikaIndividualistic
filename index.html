<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>K-SCORE | Neural OS</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;800&display=swap');
        body { background: #020617; font-family: 'Plus Jakarta Sans', sans-serif; color: white; margin: 0; padding: 0; overflow: hidden; }
        .glass { background: rgba(15, 23, 42, 0.85); backdrop-filter: blur(20px); border: 1px solid rgba(255,255,255,0.1); }
        .mandala-rotate { animation: rotate 100s linear infinite; }
        @keyframes rotate { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
        .tab-active { color: #22d3ee !important; filter: drop-shadow(0 0 8px #22d3ee); }
        .view-container { height: calc(100vh - 160px); overflow-y: auto; }
        .node-pulse { animation: pulse 2s infinite; }
        @keyframes pulse { 0% { box-shadow: 0 0 0 0 rgba(34, 211, 238, 0.4); } 70% { box-shadow: 0 0 0 15px rgba(34, 211, 238, 0); } 100% { box-shadow: 0 0 0 0 rgba(34, 211, 238, 0); } }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        const Icon = ({ name, className }) => {
            useEffect(() => { if(window.lucide) lucide.createIcons(); }, [name]);
            return <i data-lucide={name.toLowerCase().replace(/([a-z0-9])([A-Z])/g, '$1-$2')} className={className}></i>;
        };

        const SKILL_DATA = {
            logic: { title: "Strategic Logic", icon: "cpu", color: "text-cyan-400", summary: "Deconstructing reality via First Principles.", importance: "Without logic, you are a slave to mood.", sub: ["Socratic Inquiry", "Bias Detection", "Formal Logic"] },
            empathy: { title: "Radical Empathy", icon: "heart", color: "text-pink-400", summary: "Cognitive mapping of internal worlds.", importance: "Predict behavior via deep understanding.", sub: ["Active Listening", "Perspective Shifting", "Mirroring"] },
            discipline: { title: "Iron Discipline", icon: "shield", color: "text-orange-400", summary: "Subordinating impulse to strategy.", importance: "The bridge between a thought and a result.", sub: ["Dopamine Control", "Atomic Habits", "Grit"] },
            regulation: { title: "Regulation", icon: "wind", color: "text-blue-400", summary: "Buffer zone between stimulus and response.", importance: "Control your triggers, control your life.", sub: ["Stoic Breath", "Metacognition", "Vagus Nerve Control"] },
            integrity: { title: "Total Integrity", icon: "anchor", color: "text-green-400", summary: "Alignment of values and actions.", importance: "Removes the leakage of double-mindedness.", sub: ["Radical Honesty", "Value Auditing", "Boundary Setting"] }
        };

        function App() {
            const [tab, setTab] = useState('dashboard');
            const [activeSkill, setActiveSkill] = useState(null);
            const [stats, setStats] = useState({ kScore: 527, xp: 420, level: 1, streak: 12 });

            const addXP = (amt) => setStats(s => ({...s, xp: s.xp + amt, kScore: s.kScore + Math.floor(amt/5)}));

            const SkillModal = () => (
                <div className={`fixed inset-0 z-[100] glass flex items-center justify-center p-6 transition-all ${activeSkill ? 'opacity-100' : 'opacity-0 pointer-events-none'}`}>
                    <div className="bg-slate-950 w-full max-w-sm rounded-[3rem] p-8 border border-cyan-500/30 relative shadow-2xl">
                        <button onClick={() => setActiveSkill(null)} className="absolute top-6 right-6 text-slate-500"><Icon name="X" /></button>
                        {activeSkill && (
                            <div className="space-y-6">
                                <h2 className={`text-3xl font-800 ${activeSkill.color}`}>{activeSkill.title}</h2>
                                <div>
                                    <p className="text-[10px] font-black uppercase tracking-widest text-slate-500 mb-2 underline decoration-cyan-500/20">Summary</p>
                                    <p className="text-slate-300 italic leading-relaxed">"{activeSkill.summary}"</p>
                                </div>
                                <div>
                                    <p className="text-[10px] font-black uppercase tracking-widest text-slate-500 mb-2 underline decoration-cyan-500/20">Importance</p>
                                    <p className="text-slate-400 text-sm leading-relaxed">{activeSkill.importance}</p>
                                </div>
                                <div className="flex flex-wrap gap-2 pt-4">
                                    {activeSkill.sub.map(s => (
                                        <span key={s} className="px-3 py-1 bg-cyan-500/10 border border-cyan-500/20 rounded-full text-[10px] font-bold text-cyan-400 uppercase tracking-tighter">{s}</span>
                                    ))}
                                </div>
                                <button onClick={() => setActiveSkill(null)} className="w-full py-5 bg-cyan-500 text-slate-950 rounded-2xl font-black mt-4 shadow-lg shadow-cyan-500/20">INITIATE TRAINING</button>
                            </div>
                        )}
                    </div>
                </div>
            );

            return (
                <div className="max-w-md mx-auto h-screen flex flex-col relative overflow-hidden">
                    <SkillModal />
                    <header className="p-6 flex justify-between items-center bg-slate-950/90 border-b border-white/5 z-50">
                        <span className="font-black italic text-cyan-400 tracking-tighter">K-SCORE OS</span>
                        <div className="flex gap-2">
                            <div className="glass px-3 py-1 rounded-full text-[10px] font-bold text-amber-400 flex items-center gap-1">⚡ {stats.kScore}</div>
                            <div className="bg-cyan-500 px-3 py-1 rounded-full text-[10px] font-black text-slate-900 uppercase tracking-tighter">LVL {stats.level}</div>
                        </div>
                    </header>

                    <main className="view-container">
                        {tab === 'dashboard' && (
                            <div className="p-6 space-y-6 animate-in fade-in">
                                <div className="glass p-10 rounded-[3rem] text-center border-b-4 border-cyan-500/20 shadow-2xl">
                                    <h1 className="text-5xl font-800 italic uppercase mb-2 tracking-tighter">ANIKA</h1>
                                    <p className="text-cyan-400 font-bold text-[10px] tracking-[0.4em] mb-6 uppercase tracking-[0.4em]">{stats.streak} DAY STREAK</p>
                                    <div className="h-1.5 w-full bg-slate-800 rounded-full overflow-hidden">
                                        <div className="h-full bg-cyan-400 shadow-[0_0_10px_#22d3ee]" style={{width: '45%'}}></div>
                                    </div>
                                </div>
                            </div>
                        )}

                        {tab === 'tree' && (
                            <div className="h-full w-full flex items-center justify-center relative pt-10">
                                <div className="absolute mandala-rotate w-[340px] h-[340px] border border-white/5 rounded-full"></div>
                                <div className="absolute mandala-rotate w-[280px] h-[280px] border border-cyan-500/5 rounded-full" style={{animationDirection: 'reverse'}}></div>
                                
                                <div className="z-10 w-24 h-24 glass rounded-full flex flex-col items-center justify-center border-2 border-cyan-400/50 node-pulse">
                                    <span className="text-[8px] text-slate-500 font-black uppercase tracking-widest">Neural</span>
                                    <span className="text-xl font-800 italic">CORE</span>
                                </div>

                                {Object.entries(SKILL_DATA).map(([key, data], i) => {
                                    const angle = (i * 72) * (Math.PI / 180);
                                    const x = Math.cos(angle) * 140;
                                    const y = Math.sin(angle) * 140;
                                    return (
                                        <div key={key} onClick={() => setActiveSkill(data)}
                                             style={{ transform: `translate(${x}px, ${y}px)` }}
                                             className="absolute glass w-16 h-16 rounded-[1.25rem] flex items-center justify-center cursor-pointer border border-white/10 hover:border-cyan-400 transition-all z-20 shadow-2xl hover:scale-110 active:scale-95">
                                            <Icon name={data.icon} className={`w-7 h-7 ${data.color}`} />
                                        </div>
                                    );
                                })}
                            </div>
                        )}

                        {tab === 'dilemmas' && (
                            <div className="p-6 space-y-4 animate-in fade-in">
                                <h2 className="text-2xl font-800 text-amber-500 tracking-tight">Moral Library</h2>
                                <div className="glass p-7 rounded-[2rem] border-l-4 border-amber-500">
                                    <h4 className="font-bold text-xl">The Hospital Choice</h4>
                                    <p className="text-sm text-slate-400 mt-2 italic leading-relaxed">A surgeon must decide between the one and the many. High-consequence logic required.</p>
                                    <button onClick={() => addXP(100)} className="mt-6 w-full py-4 bg-amber-500 text-slate-950 rounded-xl font-black text-[10px] uppercase shadow-lg shadow-amber-500/20">Begin Analysis</button>
                                </div>
                            </div>
                        )}

                        {tab === 'challenges' && (
                            <div className="p-6 space-y-4 animate-in fade-in">
                                <h2 className="text-2xl font-800 text-green-400 tracking-tight">Daily Task</h2>
                                <div className="glass p-8 rounded-[2rem] text-center border-t-2 border-green-500/20">
                                    <Icon name="Zap" className="w-8 h-8 text-green-500 mx-auto mb-4" />
                                    <p className="font-bold text-slate-200 text-lg leading-relaxed mb-8 italic">"Log 10 minutes of disciplined reflection today."</p>
                                    <button onClick={() => addXP(50)} className="w-full py-5 bg-green-500 text-slate-950 rounded-2xl font-black shadow-lg shadow-green-500/20 active:scale-95 transition-all">LOG COMPLETION</button>
                                </div>
                            </div>
                        )}

                        {(tab === 'lessons' || tab === 'mind') && (
                            <div className="p-10 text-center text-slate-500 mt-20 italic animate-in fade-in">
                                <Icon name="Database" className="w-10 h-10 mx-auto mb-4 opacity-20" />
                                Archives initializing... (25 modules required)
                            </div>
                        )}
                    </main>

                    <nav className="fixed bottom-0 left-0 right-0 max-w-md mx-auto h-24 bg-slate-950/95 border-t border-white/10 flex justify-around items-center px-1 z-[60] backdrop-blur-xl">
                        <button onClick={() => setTab('dashboard')} className={`flex flex-col items-center flex-1 transition-all ${tab === 'dashboard' ? 'tab-active' : 'text-slate-600'}`}>
                            <Icon name="Home" className="w-5 h-5" /><span className="text-[7px] font-black mt-1 uppercase">Dash</span>
                        </button>
                        <button onClick={() => setTab('dilemmas')} className={`flex flex-col items-center flex-1 transition-all ${tab === 'dilemmas' ? 'tab-active' : 'text-slate-600'}`}>
                            <Icon name="Scale" className="w-5 h-5" /><span className="text-[7px] font-black mt-1 uppercase text-center">Moral</span>
                        </button>
                        <button onClick={() => setTab('lessons')} className={`flex flex-col items-center flex-1 transition-all ${tab === 'lessons' ? 'tab-active' : 'text-slate-600'}`}>
                            <Icon name="Book" className="w-5 h-5" /><span className="text-[7px] font-black mt-1 uppercase">Learn</span>
                        </button>
                        <button onClick={() => setTab('tree')} className={`flex flex-col items-center flex-1 transition-all ${tab === 'tree' ? 'tab-active' : 'text-slate-600'}`}>
                            <Icon name="GitBranch" className="w-5 h-5" /><span className="text-[7px] font-black mt-1 uppercase">Tree</span>
                        </button>
                        <button onClick={() => setTab('challenges')} className={`flex flex-col items-center flex-1 transition-all ${tab === 'challenges' ? 'tab-active' : 'text-slate-600'}`}>
                            <Icon name="Zap" className="w-5 h-5" /><span className="text-[7px] font-black mt-1 uppercase">Task</span>
                        </button>
                        <button onClick={() => setTab('mind')} className={`flex flex-col items-center flex-1 transition-all ${tab === 'mind' ? 'tab-active' : 'text-slate-600'}`}>
                            <Icon name="Heart" className="w-5 h-5" /><span className="text-[7px] font-black mt-1 uppercase text-center">Mind</span>
                        </button>
                    </nav>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
