<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>K-SCORE OS | Level 1</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap');
        body { background: #020617; font-family: 'Plus Jakarta Sans', sans-serif; color: white; overflow: hidden; }
        .glass { background: rgba(15, 23, 42, 0.7); backdrop-filter: blur(12px); border: 1px solid rgba(255,255,255,0.1); }
        .active-tab { color: #22d3ee !important; transform: translateY(-2px); filter: drop-shadow(0 0 5px #22d3ee); }
        .mandala-rotate { animation: rotate 100s linear infinite; }
        @keyframes rotate { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
        .node-pulse { animation: pulse 2s infinite; }
        @keyframes pulse { 0% { box-shadow: 0 0 0 0 rgba(34, 211, 238, 0.4); } 70% { box-shadow: 0 0 0 15px rgba(34, 211, 238, 0); } 100% { box-shadow: 0 0 0 0 rgba(34, 211, 238, 0); } }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        const Icon = ({ name, className }) => {
            useEffect(() => { if(window.lucide) lucide.createIcons(); }, [name]);
            return <i data-lucide={name.toLowerCase().replace(/([a-z0-9])([A-Z])/g, '$1-$2')} className={className}></i>;
        };

        const SKILL_DATA = {
            logic: { title: "Strategic Logic", icon: "cpu", color: "text-cyan-400", summary: "Deconstructing reality via First Principles.", importance: "Without logic, you are a slave to mood.", sub: "Socratic Inquiry" },
            empathy: { title: "Radical Empathy", icon: "heart", color: "text-pink-400", summary: "Cognitive mapping of internal worlds.", importance: "Predict behavior via understanding.", sub: "Perspective Shifting" },
            discipline: { title: "Iron Discipline", icon: "shield", color: "text-orange-400", summary: "Subordinating impulse to strategy.", importance: "The bridge between thought and result.", sub: "Dopamine Control" },
            regulation: { title: "Regulation", icon: "wind", color: "text-blue-400", summary: "Buffer zone between stimulus and response.", importance: "Control your triggers, control your life.", sub: "Metacognition" },
            integrity: { title: "Total Integrity", icon: "anchor", color: "text-green-400", summary: "Alignment of values and actions.", importance: "Removes the leakage of double-mindedness.", sub: "Radical Honesty" }
        };

        function App() {
            const [tab, setTab] = useState('dashboard');
            const [activeSkill, setActiveSkill] = useState(null);
            const [stats, setStats] = useState({ kScore: 527, xp: 420, level: 1, streak: 12 });

            const addXP = (amount) => {
                setStats(prev => ({ 
                    ...prev, 
                    xp: prev.xp + amount, 
                    kScore: prev.kScore + Math.floor(amount/5) 
                }));
            };

            const renderView = () => {
                switch(tab) {
                    case 'dashboard': return (
                        <div className="p-6 space-y-6 animate-in fade-in">
                            <div className="glass p-8 rounded-[2.5rem] text-center border-b-4 border-cyan-500/30">
                                <h1 className="text-4xl font-800 italic uppercase">ANIKA</h1>
                                <p className="text-cyan-400 font-bold text-[10px] tracking-[0.4em] mt-2 leading-tight">SYSTEM ACTIVE</p>
                                <div className="mt-8 flex justify-center gap-4">
                                    <div className="glass px-5 py-3 rounded-2xl">
                                        <p className="text-[10px] text-slate-500 font-bold uppercase tracking-widest">Streak</p>
                                        <p className="text-xl font-black text-orange-400">{stats.streak}D</p>
                                    </div>
                                    <div className="glass px-5 py-3 rounded-2xl">
                                        <p className="text-[10px] text-slate-500 font-bold uppercase tracking-widest">K-Score</p>
                                        <p className="text-xl font-black text-cyan-400">{stats.kScore}</p>
                                    </div>
                                </div>
                            </div>
                        </div>
                    );
                    case 'dilemmas': return (
                        <div className="p-6 space-y-4 animate-in fade-in">
                            <h2 className="text-2xl font-800">Ethical Dilemmas</h2>
                            <div className="glass p-6 rounded-3xl border-l-4 border-amber-500 hover:bg-slate-800/50 cursor-pointer transition-all">
                                <h3 className="font-bold text-xl">The Hospital Choice</h3>
                                <p className="text-slate-400 text-sm mt-2">A surgeon must decide the fate of 5 patients vs 1 traveler.</p>
                                <button onClick={() => addXP(100)} className="mt-4 px-4 py-2 bg-amber-500/10 text-amber-500 rounded-lg text-xs font-black border border-amber-500/30">BEGIN ANALYSIS</button>
                            </div>
                        </div>
                    );
                    case 'lessons': return (
                        <div className="p-6 space-y-4 animate-in fade-in">
                            <h2 className="text-2xl font-800 tracking-tight">Lessons</h2>
                            <p className="text-[10px] text-slate-500 font-black uppercase tracking-widest">0/25 Modules to Next Tier</p>
                            <div className="glass p-5 rounded-2xl border-l-4 border-cyan-500 flex justify-between items-center cursor-pointer hover:bg-slate-800/50 transition-all">
                                <div><h4 className="font-bold text-lg">Introduction to Stoicism</h4><p className="text-xs text-slate-400">Philosophy 1.1</p></div>
                                <Icon name="Play" className="w-5 h-5 text-cyan-400" />
                            </div>
                        </div>
                    );
                    case 'tree': return (
                        <div className="h-full w-full flex items-center justify-center relative pt-10 animate-in fade-in">
                            <div className="absolute mandala-rotate w-80 h-80 border border-white/5 rounded-full"></div>
                            <div className="z-10 w-24 h-24 glass rounded-full flex flex-col items-center justify-center border-2 border-cyan-400/50 node-pulse">
                                <span className="text-[8px] text-slate-500 font-black uppercase">Neural</span>
                                <span className="text-xl font-800 italic">CORE</span>
                            </div>
                            {Object.entries(SKILL_DATA).map(([key, data], i) => {
                                const angle = (i * 72) * (Math.PI / 180);
                                const x = Math.cos(angle) * 135;
                                const y = Math.sin(angle) * 135;
                                return (
                                    <div key={key} onClick={() => setActiveSkill(data)}
                                         style={{ transform: `translate(${x}px, ${y}px)` }}
                                         className="absolute glass w-16 h-16 rounded-2xl flex items-center justify-center cursor-pointer border border-white/10 hover:border-cyan-400 transition-all z-20 shadow-xl">
                                        <Icon name={data.icon} className={`w-6 h-6 ${data.color}`} />
                                    </div>
                                );
                            })}
                        </div>
                    );
                    case 'challenges': return (
                        <div className="p-6 space-y-4 animate-in fade-in">
                            <h2 className="text-2xl font-800 tracking-tight text-green-400">Daily Challenges</h2>
                            <div className="glass p-6 rounded-3xl border border-green-500/20">
                                <p className="font-bold text-slate-200">Journal for 10 minutes about a moment you lacked integrity this week.</p>
                                <button onClick={() => addXP(50)} className="mt-6 w-full py-4 bg-green-500 text-slate-950 rounded-2xl font-black hover:scale-105 active:scale-95 transition-all">LOG COMPLETION +50 XP</button>
                            </div>
                        </div>
                    );
                    case 'mind': return (
                        <div className="p-6 space-y-4 animate-in fade-in">
                            <h2 className="text-2xl font-800 tracking-tight text-pink-400">Mindset Affirmations</h2>
                            <div className="glass p-8 rounded-[2rem] text-center">
                                <Icon name="Quote" className="w-8 h-8 text-pink-500/30 mx-auto mb-4" />
                                <p className="italic text-xl text-slate-200 font-semibold leading-relaxed">"My internal state is governed by logic, not circumstance."</p>
                            </div>
                        </div>
                    );
                    default: return null;
                }
            };

            return (
                <div className="max-w-md mx-auto min-h-screen pb-32">
                    {activeSkill && (
                        <div className="fixed inset-0 z-[100] bg-slate-950/90 flex items-center justify-center p-6 backdrop-blur-md">
                            <div className="glass p-8 rounded-[3rem] border border-cyan-500/30 w-full text-center">
                                <h3 className={`text-3xl font-800 ${activeSkill.color} mb-2`}>{activeSkill.title}</h3>
                                <p className="text-slate-300 italic mb-4">"{activeSkill.summary}"</p>
                                <p className="text-[10px] font-black uppercase text-slate-500 tracking-widest mb-6">Focus: {activeSkill.sub}</p>
                                <button onClick={() => setActiveSkill(null)} className="w-full py-4 bg-slate-800 rounded-2xl font-black text-xs uppercase tracking-widest">Close Dossier</button>
                            </div>
                        </div>
                    )}

                    <header className="p-6 flex justify-between items-center sticky top-0 bg-slate-950/80 backdrop-blur-md z-50 border-b border-white/5">
                        <span className="font-black tracking-tighter text-xl text-cyan-400 italic">K-SCORE OS</span>
                        <div className="flex items-center gap-2">
                            <div className="bg-slate-900 px-3 py-1 rounded-full text-[10px] font-black text-cyan-400 border border-cyan-400/20">LVL {stats.level}</div>
                            <div className="text-amber-400 font-black text-xs flex items-center gap-1"><Icon name="Zap" className="w-4 h-4" /> {stats.kScore}</div>
                        </div>
                    </header>

                    {renderView()}

                    <nav className="fixed bottom-0 left-0 right-0 max-w-md mx-auto h-24 bg-slate-950/90 backdrop-blur-xl border-t border-white/10 flex justify-around items-center px-1 z-50">
                        <button onClick={() => setTab('dashboard')} className={`flex flex-col items-center flex-1 transition-all ${tab === 'dashboard' ? 'active-tab' : 'text-slate-600'}`}>
                            <Icon name="Home" className="w-5 h-5" /><span className="text-[7px] font-black mt-1 uppercase">Dash</span>
                        </button>
                        <button onClick={() => setTab('dilemmas')} className={`flex flex-col items-center flex-1 transition-all ${tab === 'dilemmas' ? 'active-tab' : 'text-slate-600'}`}>
                            <Icon name="Scale" className="w-5 h-5" /><span className="text-[7px] font-black mt-1 uppercase text-center">Moral</span>
                        </button>
                        <button onClick={() => setTab('lessons')} className={`flex flex-col items-center flex-1 transition-all ${tab === 'lessons' ? 'active-tab' : 'text-slate-600'}`}>
                            <Icon name="Book" className="w-5 h-5" /><span className="text-[7px] font-black mt-1 uppercase">Learn</span>
                        </button>
                        <button onClick={() => setTab('tree')} className={`flex flex-col items-center flex-1 transition-all ${tab === 'tree' ? 'active-tab' : 'text-slate-600'}`}>
                            <Icon name="GitBranch" className="w-5 h-5" /><span className="text-[7px] font-black mt-1 uppercase">Tree</span>
                        </button>
                        <button onClick={() => setTab('challenges')} className={`flex flex-col items-center flex-1 transition-all ${tab === 'challenges' ? 'active-tab' : 'text-slate-600'}`}>
                            <Icon name="Zap" className="w-5 h-5" /><span className="text-[7px] font-black mt-1 uppercase">Task</span>
                        </button>
                        <button onClick={() => setTab('mind')} className={`flex flex-col items-center flex-1 transition-all ${tab === 'mind' ? 'active-tab' : 'text-slate-600'}`}>
                            <Icon name="Heart" className="w-5 h-5" /><span className="text-[7px] font-black mt-1 uppercase text-center">Mind</span>
                        </button>
                    </nav>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
