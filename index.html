<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>K-SCORE | Neural Evolution</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap');
        body { background: #0f172a; font-family: 'Plus Jakarta Sans', sans-serif; color: white; overflow-x: hidden; }
        .duo-card { transition: all 0.2s ease; border-bottom: 4px solid rgba(0,0,0,0.3); }
        .duo-card:active { transform: translateY(2px); border-bottom-width: 0px; margin-bottom: 4px; }
        .glass-modal { background: rgba(15, 23, 42, 0.95); backdrop-filter: blur(20px); }
        .progress-glow { box-shadow: 0 0 15px rgba(34, 211, 238, 0.4); }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        const Icon = ({ name, className }) => {
            useEffect(() => { lucide.createIcons(); }, [name]);
            return <i data-lucide={name.toLowerCase().replace(/([a-z0-9])([A-Z])/g, '$1-$2')} className={className}></i>;
        };

        const LESSON_DATA = [
            { id: 1, title: 'Stoic Control', author: 'Marcus Aurelius', content: 'The first step to wisdom is realizing you cannot control the world, only your response to it. Your mind is your only true kingdom.', xp: 100, color: 'border-blue-500' },
            { id: 2, title: 'The Shadow', author: 'Dostoevsky', content: 'Dostoevsky teaches us that we often choose suffering just to prove our own independence. To be whole, you must face your own darkness.', xp: 200, color: 'border-purple-500' }
        ];

        const DILEMMA_DATA = [
            { id: 1, title: 'The Silent Truth', scenario: 'You witness a friend cheating on a test. They need the grade to keep their scholarship. Do you report them or stay silent?', choices: ['Report (Integrity)', 'Stay Silent (Loyalty)'], xp: 150 }
        ];

        function App() {
            const [view, setView] = useState('home'); 
            const [activeItem, setActiveItem] = useState(null);
            const [stats, setStats] = useState({ kScore: 0, level: 1, xp: 0 });

            const handleComplete = (xpValue) => {
                setStats(prev => {
                    const totalXp = prev.xp + xpValue;
                    const newLevel = Math.floor(totalXp / 500) + 1;
                    return {
                        ...prev,
                        xp: totalXp,
                        level: newLevel,
                        kScore: prev.kScore + Math.floor(xpValue / 5)
                    };
                });
                setView('home');
                setActiveItem(null);
            };

            return (
                <div className="max-w-md mx-auto min-h-screen pb-24">
                    {/* Header: Progress & Level */}
                    <div className="p-6 sticky top-0 bg-[#0f172a]/80 backdrop-blur-md z-40 border-b border-white/10">
                        <div className="flex justify-between items-center mb-4">
                            <div className="flex items-center gap-2">
                                <div className="bg-cyan-500 p-2 rounded-lg font-black text-slate-900 leading-none">LVL {stats.level}</div>
                                <span className="text-xs font-bold text-slate-400">PATH TO EVOLUTION</span>
                            </div>
                            <div className="flex items-center gap-1 text-amber-400 font-black">
                                <Icon name="Zap" className="w-4 h-4" /> {stats.kScore}
                            </div>
                        </div>
                        <div className="h-3 w-full bg-slate-800 rounded-full overflow-hidden progress-glow">
                            <div 
                                className="h-full bg-gradient-to-r from-cyan-400 to-blue-500 transition-all duration-700" 
                                style={{width: `${(stats.xp % 500) / 5}%`}}
                            ></div>
                        </div>
                    </div>

                    {/* Main Feed */}
                    {view === 'home' && (
                        <main className="p-6 space-y-6">
                            <h2 className="text-xs font-black text-slate-500 uppercase tracking-[0.2em]">Lessons</h2>
                            {LESSON_DATA.map(lesson => (
                                <button 
                                    key={lesson.id}
                                    onClick={() => { setActiveItem(lesson); setView('lesson-view'); }}
                                    className={`w-full duo-card p-5 bg-slate-800 rounded-2xl text-left border-l-8 ${lesson.color} hover:bg-slate-700 transition-colors`}
                                >
                                    <div className="flex justify-between items-center">
                                        <div>
                                            <h3 className="font-bold text-lg">{lesson.title}</h3>
                                            <p className="text-sm text-slate-400">{lesson.author}</p>
                                        </div>
                                        <Icon name="ChevronRight" className="text-slate-500" />
                                    </div>
                                </button>
                            ))}

                            <h2 className="text-xs font-black text-slate-500 uppercase tracking-[0.2em] mt-8">Dilemmas</h2>
                            {DILEMMA_DATA.map(dilemma => (
                                <button 
                                    key={dilemma.id}
                                    onClick={() => { setActiveItem(dilemma); setView('dilemma-view'); }}
                                    className="w-full duo-card p-5 bg-slate-800 rounded-2xl text-left border-l-8 border-amber-500 hover:bg-slate-700 transition-colors"
                                >
                                    <div className="flex justify-between items-center">
                                        <div>
                                            <h3 className="font-bold text-lg">{dilemma.title}</h3>
                                            <p className="text-sm text-slate-400">Decision Required</p>
                                        </div>
                                        <Icon name="Scale" className="text-amber-500" />
                                    </div>
                                </button>
                            ))}
                        </main>
                    )}

                    {/* Lesson Modal */}
                    {view === 'lesson-view' && activeItem && (
                        <div className="fixed inset-0 z-50 glass-modal p-8 flex flex-col">
                            <button onClick={() => setView('home')} className="self-start p-2 bg-slate-800 rounded-full mb-8">
                                <Icon name="X" />
                            </button>
                            <div className="flex-1">
                                <p className="text-cyan-400 font-black text-xs uppercase mb-2 tracking-widest">{activeItem.author}</p>
                                <h2 className="text-4xl font-black mb-6">{activeItem.title}</h2>
                                <div className="text-xl leading-relaxed text-slate-300 bg-slate-900/50 p-6 rounded-3xl border border-white/5">
                                    {activeItem.content}
                                </div>
                            </div>
                            <button 
                                onClick={() => handleComplete(activeItem.xp)}
                                className="w-full py-5 bg-cyan-500 rounded-3xl text-slate-900 font-black text-xl shadow-[0_6px_0_#0891b2] active:translate-y-1 active:shadow-none transition-all mt-8"
                            >
                                FINISH +{activeItem.xp} XP
                            </button>
                        </div>
                    )}

                    {/* Dilemma Modal */}
                    {view === 'dilemma-view' && activeItem && (
                        <div className="fixed inset-0 z-50 glass-modal p-8 flex flex-col">
                            <button onClick={() => setView('home')} className="self-start p-2 bg-slate-800 rounded-full mb-8">
                                <Icon name="X" />
                            </button>
                            <div className="flex-1">
                                <h2 className="text-4xl font-black mb-8 text-amber-400">{activeItem.title}</h2>
                                <p className="text-2xl font-bold text-slate-200 mb-12">{activeItem.scenario}</p>
                                <div className="space-y-4">
                                    {activeItem.choices.map(choice => (
                                        <button 
                                            key={choice}
                                            onClick={() => handleComplete(activeItem.xp)}
                                            className="w-full py-5 bg-slate-800 border-2 border-slate-700 rounded-2xl font-black text-lg hover:border-amber-400 transition-all active:scale-95"
                                        >
                                            {choice}
                                        </button>
                                    ))}
                                </div>
                            </div>
                        </div>
                    )}

                    {/* Navigation Bar */}
                    <nav className="fixed bottom-0 left-0 right-0 max-w-md mx-auto h-24 bg-slate-900/90 backdrop-blur-xl border-t border-white/5 flex justify-around items-center px-10">
                        <button onClick={() => setView('home')} className="flex flex-col items-center gap-1 text-cyan-400">
                            <Icon name="Home" className="w-7 h-7" />
                            <span className="text-[10px] font-black uppercase">Home</span>
                        </button>
                        <button className="flex flex-col items-center gap-1 text-slate-500 opacity-50 cursor-not-allowed">
                            <Icon name="Trophy" className="w-7 h-7" />
                            <span className="text-[10px] font-black uppercase">Stats</span>
                        </button>
                        <button className="flex flex-col items-center gap-1 text-slate-500 opacity-50 cursor-not-allowed">
                            <Icon name="Settings" className="w-7 h-7" />
                            <span className="text-[10px] font-black uppercase">Tools</span>
                        </button>
                    </nav>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
